      async function loadRefList(page = 1) {
        const status   = document.getElementById("ref-list-status").value;
        const searchId = parseInt(document.getElementById("ref-list-search").value) || null;
        const container = document.getElementById("ref-list-container");
        container.innerHTML = `<div style="color:var(--hint);text-align:center;font-size:12px">Загрузка…</div>`;
        try {
          const res = await fetch("/app/api/admin/referral/list", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ initData, page, status: status || null, searchId }),
          });
          if (!res.ok) throw new Error();
          const data = await res.json();
          if (!data.referrals.length) {
            container.innerHTML = `<div style="color:var(--hint);text-align:center;font-size:13px;padding:10px 0">Ничего не найдено</div>`;
          } else {
            const STATUS_LABELS = { active: "✅ Активен", pending: "⏳ Ожидает", fraud: "🚨 Фрод" };
            const STATUS_COLORS = { active: "var(--green)", pending: "var(--hint)", fraud: "var(--danger)" };
            container.innerHTML = data.referrals.map(r => `
              <div class="sub-sub-row" style="gap:10px;flex-wrap:wrap;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(120,120,128,0.1)">
                <div style="flex:1;min-width:0">
                  <div style="font-size:12px;font-weight:700">🔗 ${esc(String(r.referrer_telegram_id))} → ${esc(String(r.referred_telegram_id))}</div>
                  <div style="font-size:11px;color:${STATUS_COLORS[r.status] || "var(--hint)"}">
                    ${STATUS_LABELS[r.status] || r.status}
                    ${r.fraud_reason ? ` · ${esc(r.fraud_reason)}` : ""}
                  </div>
                  <div style="font-size:10px;color:var(--hint)">${r.created_at.slice(0,10)}${r.activated_at ? ` · активирован ${r.activated_at.slice(0,10)}` : ""}</div>
                </div>
                <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
                  ${r.status !== "active"  ? `<button class="action-btn ref-adj-btn" data-id="${r.id}" data-status="active"  style="font-size:11px;padding:5px 8px">✅</button>` : ""}
                  ${r.status !== "pending" ? `<button class="action-btn ref-adj-btn" data-id="${r.id}" data-status="pending" style="font-size:11px;padding:5px 8px;background:rgba(120,120,128,0.12);color:var(--hint)">⏳</button>` : ""}
                  ${r.status !== "fraud"   ? `<button class="action-btn ref-adj-btn" data-id="${r.id}" data-status="fraud"   style="font-size:11px;padding:5px 8px;background:rgba(255,59,48,0.12);color:var(--danger)">🚨</button>` : ""}
                </div>
              </div>`).join("");
            // Pagination
            const pages = Math.ceil(data.total / data.page_size);
            const pag   = document.getElementById("ref-list-pagination");
            pag.innerHTML = pages > 1
              ? Array.from({ length: Math.min(pages, 10) }, (_, i) => i + 1).map(p =>
                  `<button class="tab-chip${p === page ? " active" : ""}" data-ref-page="${p}" style="padding:4px 10px;font-size:11px">${p}</button>`
                ).join("")
              : "";
            pag.querySelectorAll("[data-ref-page]").forEach(btn =>
              btn.addEventListener("click", () => loadRefList(parseInt(btn.dataset.refPage)))
            );
          }
          // Status-adjust buttons
          container.querySelectorAll(".ref-adj-btn").forEach(btn =>
            btn.addEventListener("click", async () => {
              const id     = parseInt(btn.dataset.id);
              const status = btn.dataset.status;
              const reason = status === "fraud" ? (prompt("Причина фрода (необязательно):") || "") : "";
              try {
                const r2 = await fetch("/app/api/admin/referral/adjust", {
                  method: "POST", headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ initData, referralId: id, status, reason }),
                });
                if (!r2.ok) throw new Error();
                showToast("✅ Статус изменён");
                loadRefList(page);
              } catch { showToast("❌ Ошибка"); }
            })
          );
        } catch { container.innerHTML = `<div style="color:var(--hint);text-align:center">Ошибка загрузки</div>`; }
      }

      document.getElementById("ref-list-search-btn")?.addEventListener("click", () => loadRefList(1));

      // Top-referrer manual grant shortcut
      window.adminRefGrant = function(uid) {
        document.getElementById("ref-grant-uid").value = uid;
        document.getElementById("ref-grant-uid").scrollIntoView({ behavior: "smooth", block: "center" });
      };

      // Milestone add
      document.getElementById("ref-ms-add")?.addEventListener("click", () => {
        const list = document.getElementById("ref-ms-list");
        const idx  = list.querySelectorAll("[data-ms-idx]").length;
        const div  = document.createElement("div");
        div.className = "dyn-benefit-row";
        div.dataset.msIdx = idx;
        div.style.cssText = "display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px";
        div.innerHTML = `
          <input type="number" class="ms-count" value="1" min="1" style="width:60px;border:1.5px solid rgba(120,120,128,0.2);border-radius:8px;padding:5px 8px;font-size:12px;background:var(--bg);color:var(--text)" placeholder="#"/>
          <select class="ms-type" style="flex:1;min-width:100px;border:1.5px solid rgba(120,120,128,0.2);border-radius:8px;padding:5px 8px;font-size:12px;background:var(--bg);color:var(--text)">
            <option value="premium_days">⭐ Дни Premium</option>
            <option value="badge">🏅 Значок</option>
          </select>
          <input type="text" class="ms-value" value="" style="width:70px;border:1.5px solid rgba(120,120,128,0.2);border-radius:8px;padding:5px 8px;font-size:12px;background:var(--bg);color:var(--text)" placeholder="Значение"/>
          <input type="text" class="ms-label" value="" style="flex:2;min-width:120px;border:1.5px solid rgba(120,120,128,0.2);border-radius:8px;padding:5px 8px;font-size:12px;background:var(--bg);color:var(--text)" placeholder="Описание"/>
          <button class="dyn-del-btn" onclick="this.closest('[data-ms-idx]').remove()" title="Удалить">✕</button>
        `;
        list.appendChild(div);
      });

      // Save config
      document.getElementById("ref-cfg-save")?.addEventListener("click", async btn => {
        const saveBtn = document.getElementById("ref-cfg-save");
        saveBtn.disabled = true; saveBtn.textContent = "Сохраняем…";
        try {
          // Collect milestones from DOM
          const milestones = [...document.querySelectorAll("#ref-ms-list [data-ms-idx]")].map(row => ({
            count: parseInt(row.querySelector(".ms-count").value) || 1,
            type:  row.querySelector(".ms-type").value,
            value: row.querySelector(".ms-type").value === "premium_days"
              ? parseInt(row.querySelector(".ms-value").value) || 0
              : row.querySelector(".ms-value").value.trim(),
            label: row.querySelector(".ms-label").value.trim(),
          }));
          const body = {
            initData,
            isEnabled:           document.getElementById("ref-cfg-enabled").checked,
            referrerRewardDays:  parseInt(document.getElementById("ref-cfg-ref-days").value) || 0,
            refereeRewardDays:   parseInt(document.getElementById("ref-cfg-new-days").value) || 0,
            minAccountAgeDays:   parseInt(document.getElementById("ref-cfg-min-age").value)  || 0,
            maxReferralsPerDay:  parseInt(document.getElementById("ref-cfg-max-day").value)  || 50,
            milestones,
          };
          const res = await fetch("/app/api/admin/referral/config/update", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!res.ok) throw new Error();
          referralAdminConfig = await res.json();
          showToast("✅ Настройки реферальной программы сохранены");
        } catch { showToast("❌ Ошибка при сохранении"); }
        finally { saveBtn.disabled = false; saveBtn.textContent = "💾 Сохранить настройки"; }
      });
    }

  </script>
</body>
</html>
