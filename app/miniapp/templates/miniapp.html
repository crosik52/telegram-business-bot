    function renderReferralSection() {
      if (!referralData) return "";
      const d = referralData;
      if (!d.enabled) return `<div class="ref-empty" style="margin-top:16px">🔗 Реферальная программа временно недоступна</div>`;

      const lvl    = d.level    || { name: "Bronze", emoji: "🥉", color: "#CD7F32" };
      const nextLv = d.next_level;
      const nextMs = d.next_milestone;
      const active = d.active_count || 0;

      let progPct = 100, progLabel = "Максимальный уровень!";
      if (nextLv) {
        const span = nextLv.min - lvl.min;
        progPct  = Math.min(100, Math.round((active - lvl.min) / span * 100));
        progLabel = `${active} / ${nextLv.min} до уровня ${nextLv.name} ${nextLv.emoji}`;
      }

      const milestonesHtml = (d.milestones || []).map(m => {
        const done   = active >= m.count;
        const isNext = !done && (!nextMs || m.count === nextMs.count);
        const pct    = Math.min(100, Math.round(active / m.count * 100));
        const icon   = m.type === "premium_days" ? "⭐" : "🏅";
        return `
          <div class="ref-milestone${done ? " done" : ""}${isNext ? " next" : ""}">
            <div class="ref-m-icon">${icon}</div>
            <div class="ref-m-body">
              <div class="ref-m-label">${esc(m.label)}</div>
              <div class="ref-m-sub">${m.count} активных рефералов</div>
              ${!done ? `<div class="ref-m-prog">
                <div class="ref-m-track"><div class="ref-m-fill" style="width:${pct}%"></div></div>
                <div class="ref-m-count">${active}/${m.count}</div>
              </div>` : ""}
            </div>
            ${done ? `<div class="ref-m-done">✅</div>` : ""}
          </div>`;
      }).join("");

      const recentHtml = d.recent_referrals?.length
        ? d.recent_referrals.map(r => {
            const name    = r.referred_first_name || ("ID " + r.referred_telegram_id);
            const sub     = r.referred_username ? "@" + r.referred_username : ("#" + r.referred_telegram_id);
            const initials = name.split(/\s+/).map(w => w[0]).join("").slice(0, 2).toUpperCase();
            const bg      = colorFor(String(r.referred_telegram_id));
            const statusLabel = r.status === "active" ? "Активен" : "Ожидает";
            const statusCls   = r.status === "active" ? "ref-status-active" : "ref-status-pending";
            return `
              <div class="ref-recent-row">
                <div class="ref-recent-avatar" style="background:${bg}">${esc(initials)}</div>
                <div style="flex:1;min-width:0">
                  <div class="ref-recent-name">${esc(name)}</div>
                  <div style="font-size:10.5px;color:var(--hint);margin-top:1px">${esc(sub)}</div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">
                  <span class="ref-recent-status ${statusCls}">${statusLabel}</span>
                  <span style="font-size:10px;color:var(--hint)">${r.created_at?.slice(0,10) || ""}</span>
                </div>
              </div>`;
          }).join("")
        : `<div class="ref-empty">Пока нет приглашённых</div>`;

      const REWARD_ICONS = { welcome: "🎁", per_activation: "⭐", milestone: "🏆" };
      const rewardHtml = d.reward_logs?.length
        ? d.reward_logs.map(r => `
            <div class="ref-reward-row">
              <div class="ref-reward-icon">${REWARD_ICONS[r.reward_type] || "🎁"}</div>
              <div class="ref-reward-label">${esc(r.label)}</div>
              <div class="ref-reward-date">${r.granted_at?.slice(0,10) || ""}</div>
            </div>`).join("")
        : `<div class="ref-empty">История наград пуста</div>`;

      return `
        <div style="margin-top:20px">
          <!-- Hero -->
          <div class="ref-hero">
            <div class="ref-hero-label">Реферальная программа</div>
            <div class="ref-level-row">
              <div class="ref-level-badge">${esc(lvl.emoji || "🥉")}</div>
              <div>
                <div class="ref-level-name">${esc(lvl.name)}</div>
                <div class="ref-level-sub">Уровень участника</div>
              </div>
            </div>
            ${nextLv ? `
            <div class="ref-prog-wrap">
              <div class="ref-prog-track"><div class="ref-prog-fill" style="width:${progPct}%"></div></div>
              <div class="ref-prog-label">${esc(progLabel)}</div>
            </div>` : `<div class="ref-prog-label" style="color:rgba(255,255,255,0.7);margin-bottom:12px">💎 Максимальный уровень — Diamond!</div>`}
            <div class="ref-link-wrap">
              <div class="ref-link-text" id="refLinkText">${esc(d.ref_link)}</div>
              <button class="ref-copy-btn" id="refCopyBtn">📋 Копировать</button>
            </div>
            <button class="ref-share-btn" id="refShareBtn">🚀 Поделиться ссылкой</button>
          </div>

          <!-- Stats -->
          <div class="ref-stats-row">
            <div class="ref-stat-card"><div class="ref-stat-val">${d.total_invited}</div><div class="ref-stat-lbl">Приглашено</div></div>
            <div class="ref-stat-card"><div class="ref-stat-val" style="color:var(--green)">${d.active_count}</div><div class="ref-stat-lbl">Активных</div></div>
            <div class="ref-stat-card"><div class="ref-stat-val" style="color:var(--hint)">${d.pending_count}</div><div class="ref-stat-lbl">Ожидают</div></div>
          </div>

          ${(d.referrer_reward_days || d.referee_reward_days) ? `
          <div style="background:rgba(20,184,166,0.1);border-radius:14px;padding:12px 14px;margin-bottom:4px;font-size:12.5px;color:var(--text);line-height:1.6">
            ${d.referrer_reward_days ? `⭐ <b>Ты</b> получаешь +${d.referrer_reward_days} дн. Premium за каждого активного реферала<br>` : ""}
            ${d.referee_reward_days  ? `🎁 <b>Друг</b> получает +${d.referee_reward_days} дн. Premium при регистрации` : ""}
          </div>` : ""}

          <div class="ref-section-title">Награды за количество</div>
          <div class="ref-milestone-list">${milestonesHtml}</div>

          <div class="ref-section-title">Последние рефералы</div>
          <div class="ref-recent-list">${recentHtml}</div>

          <div class="ref-section-title">История начислений</div>
          <div class="ref-reward-list">${rewardHtml}</div>
        </div>
      `;
    }

    // Robust copy — works in Telegram WebView where navigator.clipboard is
    // blocked (no secure-context focus). Falls back to execCommand('copy').
    function copyTextRobust(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text).catch(() => _execCommandCopy(text));
      }
      _execCommandCopy(text);
    }
    function _execCommandCopy(text) {
      try {
        const el = document.createElement("textarea");
        el.value = text;
        el.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
        document.body.appendChild(el);
        el.focus();
        el.select();
        el.setSelectionRange(0, el.value.length);
        document.execCommand("copy");
        document.body.removeChild(el);
      } catch (_) {}
    }

    // ── AI Analysis modal ─────────────────────────────────────────────────────
    let _aiCurrentChatId   = null;
    let _aiCurrentChatName = "";

    function openAiAnalysisForChat() {
      toastMessage("🤖 Нажмите «Анализ» рядом с нужным контактом");
    }

    function openAiAnalysisModal(chatId, name) {
      _aiCurrentChatId   = chatId;
      _aiCurrentChatName = name;
      let overlay = document.getElementById("aiModalOverlay");
      if (!overlay) {
        overlay = document.createElement("div");
        overlay.id = "aiModalOverlay";
        overlay.className = "ai-modal-overlay";
        document.body.appendChild(overlay);
      }
      overlay.style.display = "flex";
      overlay.innerHTML = `
        <div class="ai-modal-header">
          <button class="ai-modal-back" onclick="closeAiModal()">‹</button>
          <div>
            <div class="ai-modal-title">🤖 AI Анализ отношений</div>
            <div class="ai-modal-sub">${esc(name)}</div>
          </div>
        </div>
        <div class="ai-modal-body" id="aiModalBody">
          <div class="ai-loading-wrap">
            <div class="ai-loading-spinner"></div>
            <div style="font-size:14px;font-weight:600;color:var(--hint)">Анализируем переписку…</div>
            <div style="font-size:12px;color:var(--hint);text-align:center;max-width:240px;line-height:1.5">Наш AI читает историю чата и строит отчёт. Занимает ~15 секунд</div>
          </div>
        </div>`;
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
      _runAiAnalysis(chatId, name);
    }

    function closeAiModal() {
      const overlay = document.getElementById("aiModalOverlay");
      if (overlay) overlay.style.display = "none";
    }

    async function _runAiAnalysis(chatId, name) {
      const body = document.getElementById("aiModalBody");
      if (!body) return;
      try {
        const res = await fetch("/app/api/ai/relationship_analysis", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ initData: currentInitData, chatId, contactName: name }),
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({}));
          if (err.detail === "vip_required") {
            body.innerHTML = `<div class="ai-loading-wrap">
              <div style="font-size:36px">💎</div>
              <div style="font-size:15px;font-weight:700;text-align:center">AI Анализ — VIP функция</div>
              <div style="font-size:13px;color:var(--hint);text-align:center;max-width:260px;line-height:1.55">Для доступа к AI анализу отношений нужна VIP подписка</div>
              <button onclick="closeAiModal();switchMainTab('donate');setTimeout(()=>{document.querySelector('.sub-tier-tab[data-tier=vip]')?.click();},300)"
                style="margin-top:8px;border:none;border-radius:14px;padding:13px 24px;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#c47800,#9c4cc4);color:#fff">
                💎 Перейти на VIP
              </button>
            </div>`;
            return;
          }
          const MSGS = {
            no_messages:      "📭 В этом чате пока нет сообщений для анализа",
            no_connection:    "❌ Бизнес-аккаунт не подключён",
            ai_not_configured:"⚙️ AI сервис временно недоступен",
            analysis_failed:  "❌ Ошибка анализа. Попробуй позже.",
            gemini_timeout:   "⏱ Анализ занял слишком долго. Попробуй ещё раз.",
          };
          const errText = MSGS[err.detail] || (err.detail ? `❌ ${err.detail}` : "Ошибка. Попробуй позже.");
          body.innerHTML = `<div class="ai-loading-wrap">
            <div style="font-size:36px">😔</div>
            <div style="font-size:13px;font-weight:600;color:var(--hint);text-align:center;word-break:break-word;max-width:280px">${errText}</div>
          </div>`;
          return;
        }
        const data = await res.json();
        body.innerHTML = renderAiReport(data, name);
        _drawEmotionChart(data.ai?.emotions);
      } catch (e) {
        body.innerHTML = `<div class="ai-loading-wrap">
          <div style="font-size:36px">😔</div>
          <div style="font-size:14px;font-weight:600;color:var(--hint)">Ошибка соединения</div>
        </div>`;
      }
    }

    function renderAiReport(data, name) {
      const ai    = data.ai    || {};
      const stats = data.stats || {};
      const esc2 = s => String(s || "").replace(/</g,"&lt;").replace(/>/g,"&gt;");

      // ── 1. General score ─────────────────────────────────────────────────
      const gs      = ai.general_score || {};
      const score   = Math.min(10, Math.max(0, gs.score || 5));
      const scorePct = score * 10;
      const scoreColor = score >= 7 ? "#34c759" : score >= 5 ? "#ff9500" : "#ff3b30";

      // ── 2. Balance ───────────────────────────────────────────────────────
      const bal = ai.balance || {};
      const initMap = { user: "Вы", contact: esc2(name), equal: "Поровну" };

      // ── 3. Interest ──────────────────────────────────────────────────────
      const int_ = ai.interest || {};
      const intPct = Math.round(int_.probability || 0);
      const intColor = intPct >= 60 ? "#34c759" : intPct >= 35 ? "#ff9500" : "#ff3b30";
      const indicators = (int_.indicators || []).slice(0, 8);

      // ── 4. Style / 5. Personality ─────────────────────────────────────
      const style = ai.style || {};
      const pers  = ai.personality || {};

      // ── 7. Emotions — drawn by canvas ─────────────────────────────────
      const emo = ai.emotions || {};

      // ── 8/9. Flags ───────────────────────────────────────────────────
      const redFlags   = (ai.red_flags   || []).slice(0, 8);
      const greenFlags = (ai.green_flags || []).slice(0, 8);

      // ── 10. Stats (local) ─────────────────────────────────────────────
      const media = stats.media || {};
      const mediaItems = [
        ["📷", "Фото",     media.photo       || 0],
        ["🎥", "Видео",    media.video       || 0],
        ["🎙", "Голос",    media.voice       || 0],
        ["⭕", "Кружки",   media.video_note  || 0],
        ["😊", "Стикеры",  media.sticker     || 0],
        ["📎", "Файлы",    media.document    || 0],
      ].filter(([,, n]) => n > 0);

      const flagsHtml = (arr, ico, color) => arr.length
        ? arr.map(f => `<div class="ai-flag-row"><span class="ai-flag-ico">${ico}</span><span style="color:${color}">${esc2(f)}</span></div>`).join("")
        : `<div style="color:var(--hint);font-size:13px;padding:6px 0">Не обнаружено</div>`;

      const tagCloud = (tags, cls="") => (tags||[]).map(t => `<span class="ai-tag ${cls}">${esc2(t)}</span>`).join("");

      const indicatorHtml = indicators.map(ind => {
        const lvl = (ind.level || "medium").toLowerCase();
        const barColor = lvl === "high" ? "#34c759" : lvl === "low" ? "#ff3b30" : "#ff9500";
        const barPct   = lvl === "high" ? 85 : lvl === "low" ? 25 : 55;
        return `<div class="ai-indicator-row">
          <span class="ai-indicator-name">${esc2(ind.name)}</span>
          <div class="ai-indicator-bar-track">
            <div class="ai-indicator-bar-fill" style="width:${barPct}%;background:${barColor}"></div>
          </div>
          <span class="ai-indicator-val" style="color:${barColor}">${esc2(ind.value||"")}</span>
        </div>`;
      }).join("");

      return `
        <!-- 1. General score -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">🧠</span><span class="ai-sec-label">Общая оценка общения</span></div>
          <div class="ai-sec-body" style="display:flex;gap:16px;align-items:flex-start">
            <div>
              <div class="ai-score-num" style="color:${scoreColor}">${score.toFixed(1)}</div>
              <div style="font-size:10px;color:var(--hint);margin-top:2px">из 10</div>
            </div>
            <div style="flex:1">
              <div class="ai-score-track"><div class="ai-score-fill" style="width:${scorePct}%;background:linear-gradient(90deg,#5856d6,${scoreColor})"></div></div>
              <div class="ai-score-label">${esc2(gs.label || "")}</div>
              <div class="ai-score-desc">${esc2(gs.description || "")}</div>
            </div>
          </div>
        </div>

        <!-- 2. Balance -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">⚖️</span><span class="ai-sec-label">Баланс отношений</span></div>
          <div class="ai-sec-body">
            <div class="ai-balance-grid">
              <div class="ai-balance-card"><div class="ai-balance-val">${initMap[bal.initiates_first] || esc2(bal.initiates_first)||"—"}</div><div class="ai-balance-lbl">Чаще начинает</div></div>
              <div class="ai-balance-card"><div class="ai-balance-val">${esc2(bal.ends_conversation)||"—"}</div><div class="ai-balance-lbl">Чаще заканчивает</div></div>
              <div class="ai-balance-card"><div class="ai-balance-val">${esc2(bal.avg_response_time_user)||"—"}</div><div class="ai-balance-lbl">Ответ — Вы</div></div>
              <div class="ai-balance-card"><div class="ai-balance-val">${esc2(bal.avg_response_time_contact)||"—"}</div><div class="ai-balance-lbl">Ответ — ${esc2(name)}</div></div>
              <div class="ai-balance-card"><div class="ai-balance-val">${esc2(bal.ignores_more)||"—"}</div><div class="ai-balance-lbl">Чаще игнорирует</div></div>
              <div class="ai-balance-card"><div class="ai-balance-val">${esc2(bal.longer_messages)||"—"}</div><div class="ai-balance-lbl">Пишет длиннее</div></div>
            </div>
          </div>
        </div>

        <!-- 3. Interest -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">❤️</span><span class="ai-sec-label">Заинтересованность ${esc2(name)}</span></div>
          <div class="ai-sec-body" style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap">
            <div style="text-align:center">
              <div class="ai-interest-pct" style="color:${intColor}">${intPct}%</div>
              <div style="font-size:10px;color:var(--hint);margin-top:3px">вероятность</div>
            </div>
            <div style="flex:1;min-width:160px">${indicatorHtml}</div>
          </div>
        </div>

        <!-- 4. Style -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">💬</span><span class="ai-sec-label">Стиль общения</span></div>
          <div class="ai-sec-body">
            <div class="ai-tag-lbl">Вы</div>
            <div class="ai-tags">${tagCloud(style.user_tags) || '<span style="color:var(--hint);font-size:12px">нет данных</span>'}</div>
            <div class="ai-tag-lbl" style="margin-top:10px">${esc2(name)}</div>
            <div class="ai-tags">${tagCloud(style.contact_tags, "contact") || '<span style="color:var(--hint);font-size:12px">нет данных</span>'}</div>
          </div>
        </div>

        <!-- 5. Personality -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">🧩</span><span class="ai-sec-label">Особенности личности</span></div>
          <div class="ai-sec-body">
            <div class="ai-tag-lbl">Вы</div>
            <div class="ai-tags">${tagCloud(pers.user_traits) || '<span style="color:var(--hint);font-size:12px">нет данных</span>'}</div>
            <div class="ai-tag-lbl" style="margin-top:10px">${esc2(name)}</div>
            <div class="ai-tags">${tagCloud(pers.contact_traits, "contact") || '<span style="color:var(--hint);font-size:12px">нет данных</span>'}</div>
          </div>
        </div>

        <!-- 6. Dynamics -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">📈</span><span class="ai-sec-label">Динамика отношений</span></div>
          <div class="ai-sec-body">
            ${(() => { const dyn = ai.dynamics||{}; const trendIco = dyn.trend==="growing"?"📈":dyn.trend==="declining"?"📉":"➡️";
              return `<div style="font-size:28px;margin-bottom:6px">${trendIco}</div>
              <div style="font-size:14px;font-weight:700">${esc2(dyn.trend_description||"")}</div>
              <div style="font-size:12.5px;color:var(--hint);margin-top:6px;line-height:1.55">${esc2(dyn.activity_note||"")}</div>
              <div style="font-size:12px;color:var(--hint);margin-top:10px">Период: ${esc2(stats.first_message_date||"?")} — ${esc2(stats.last_message_date||"?")} · ${stats.days_span||0} дн. · ${stats.messages_per_day||0} сообщ/день</div>`; })()}
          </div>
        </div>

        <!-- 7. Emotions (canvas pie) -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">😊</span><span class="ai-sec-label">Анализ эмоций</span></div>
          <div class="ai-sec-body">
            <div class="ai-pie-wrap">
              <canvas id="aiEmoPie" width="120" height="120"></canvas>
              <div class="ai-pie-legend" id="aiEmoPieLegend"></div>
            </div>
          </div>
        </div>

        <!-- 8. Red flags -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">🚩</span><span class="ai-sec-label">Красные флаги</span></div>
          <div class="ai-sec-body">${flagsHtml(redFlags, "🚩", "var(--danger)")}</div>
        </div>

        <!-- 9. Green flags -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">💚</span><span class="ai-sec-label">Зелёные флаги</span></div>
          <div class="ai-sec-body">${flagsHtml(greenFlags, "✅", "#34c759")}</div>
        </div>

        <!-- 10. Stats -->
        <div class="ai-sec">
          <div class="ai-sec-head"><span class="ai-sec-ico">📊</span><span class="ai-sec-label">Статистика переписки</span></div>
          <div class="ai-sec-body">
            <div class="ai-stats-grid">
              <div class="ai-stat-cell"><div class="ai-stat-cell-val">${stats.total_messages||0}</div><div class="ai-stat-cell-lbl">Сообщений</div></div>
              <div class="ai-stat-cell"><div class="ai-stat-cell-val">${stats.user_messages||0}</div><div class="ai-stat-cell-lbl">От вас</div></div>
              <div class="ai-stat-cell"><div class="ai-stat-cell-val">${stats.contact_messages||0}</div><div class="ai-stat-cell-lbl">От ${esc2(name)}</div></div>
              <div class="ai-stat-cell"><div class="ai-stat-cell-val">${(stats.user_words||0).toLocaleString()}</div><div class="ai-stat-cell-lbl">Слов — вы</div></div>
              <div class="ai-stat-cell"><div class="ai-stat-cell-val">${(stats.contact_words||0).toLocaleString()}</div><div class="ai-stat-cell-lbl">Слов — ${esc2(name)}</div></div>
              <div class="ai-stat-cell"><div class="ai-stat-cell-val">${stats.initiates_user||0}/${stats.initiates_contact||0}</div><div class="ai-stat-cell-lbl">Начал разговор</div></div>
              ${mediaItems.map(([ico, lbl, n]) => `<div class="ai-stat-cell"><div class="ai-stat-cell-val">${ico} ${n}</div><div class="ai-stat-cell-lbl">${lbl}</div></div>`).join("")}
            </div>
          </div>
        </div>

        <!-- 11. AI Summary -->
        <div class="ai-sec" style="margin-bottom:24px">
          <div class="ai-sec-head"><span class="ai-sec-ico">🤖</span><span class="ai-sec-label">AI Резюме</span></div>
          <div class="ai-sec-body"><div class="ai-summary-text">${esc2(ai.summary || "Резюме недоступно")}</div>
          <div style="font-size:10.5px;color:var(--hint);margin-top:10px;line-height:1.5">⚠️ Анализ основан только на тексте переписки и не является психологическим заключением. Выводы — вероятностные наблюдения, а не факты.</div>
          </div>
        </div>`;
    }

    function _drawEmotionChart(emo) {
      const canvas = document.getElementById("aiEmoPie");
      const legend = document.getElementById("aiEmoPieLegend");
      if (!canvas || !emo) return;
      const slices = [
        { label: "Позитив",     value: emo.positive   || 0, color: "#34c759" },
        { label: "Нейтральность",value: emo.neutral    || 0, color: "#8e8e93" },
        { label: "Поддержка",   value: emo.support     || 0, color: "#5856d6" },
        { label: "Раздражение", value: emo.irritation  || 0, color: "#ff9500" },
        { label: "Грусть",      value: emo.sadness     || 0, color: "#ff3b30" },
      ].filter(s => s.value > 0);
      const total = slices.reduce((a, s) => a + s.value, 0) || 1;
      const ctx = canvas.getContext("2d");
      let angle = -Math.PI / 2;
      const cx = 60, cy = 60, r = 52, inner = 28;
      slices.forEach(sl => {
        const sweep = (sl.value / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, angle, angle + sweep);
        ctx.closePath();
        ctx.fillStyle = sl.color;
        ctx.fill();
        angle += sweep;
      });
      ctx.beginPath();
      ctx.arc(cx, cy, inner, 0, Math.PI * 2);
      ctx.fillStyle = "var(--secondary-bg, #1c1c1e)";
      ctx.fill();
      if (legend) {
        legend.innerHTML = slices.map(sl =>
          `<div class="ai-pie-legend-row">
            <div class="ai-pie-dot" style="background:${sl.color}"></div>
            <span>${sl.label}</span>
            <span style="margin-left:auto;font-weight:700">${Math.round((sl.value/total)*100)}%</span>
          </div>`
        ).join("");
      }
    }

    function attachReferralDonateHandlers() {
      if (!referralData?.ref_link) return;
      const link = referralData.ref_link;

      document.getElementById("refCopyBtn")?.addEventListener("click", () => {
        copyTextRobust(link);
        toastMessage("🔗 Ссылка скопирована!");
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
      });

      document.getElementById("refShareBtn")?.addEventListener("click", () => {
        const shareText = `🔗 Присоединяйся по моей реф-ссылке и получи бонус!\n${link}`;
        if (tg?.openTelegramLink) {
          tg.openTelegramLink(
            `https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(shareText)}`
          );
        } else {
          copyTextRobust(link);
          toastMessage("🔗 Ссылка скопирована!");
        }
      });
    }

  </script>
