  .ref-prog-wrap  { margin-bottom: 14px; }
  .ref-prog-track { height: 6px; border-radius: 4px; background: rgba(255,255,255,0.18); overflow: hidden; }
  .ref-prog-fill  { height: 100%; border-radius: 4px; background: rgba(255,255,255,0.85); transition: width 0.6s ease; }
  .ref-prog-label { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 4px; }
  .ref-link-wrap  { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
  .ref-link-text  { flex: 1; font-size: 12px; color: rgba(255,255,255,0.9); word-break: break-all; font-family: monospace; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ref-copy-btn   { background: rgba(255,255,255,0.2); border: none; border-radius: 9px; padding: 6px 12px; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; touch-action: manipulation; }
  .ref-share-btn  { width: 100%; margin-top: 12px; background: rgba(255,255,255,0.95); border: none; border-radius: 12px; padding: 11px; font-size: 14px; font-weight: 700; color: #0d9488; touch-action: manipulation; }

  .ref-stats-row  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .ref-stat-card  { background: var(--secondary-bg); border-radius: 16px; padding: 14px 10px; text-align: center; box-shadow: var(--shadow); }
  .ref-stat-val   { font-size: 24px; font-weight: 800; color: #14b8a6; line-height: 1; }
  .ref-stat-lbl   { font-size: 10.5px; color: var(--hint); margin-top: 3px; }

  .ref-section-title { font-size: 13px; font-weight: 700; color: var(--hint); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }

  .ref-milestone-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .ref-milestone {
    background: var(--secondary-bg); border-radius: 14px; padding: 12px 14px;
    display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow);
  }
  .ref-milestone.done { opacity: 0.5; }
  .ref-milestone.next { border: 1.5px solid rgba(20,184,166,0.5); }
  .ref-m-icon  { font-size: 24px; flex-shrink: 0; }
  .ref-m-body  { flex: 1; min-width: 0; }
  .ref-m-label { font-size: 13px; font-weight: 700; }
  .ref-m-sub   { font-size: 11px; color: var(--hint); margin-top: 1px; }
  .ref-m-prog  { display: flex; align-items: center; gap: 7px; margin-top: 6px; }
  .ref-m-track { flex: 1; height: 4px; border-radius: 3px; background: rgba(120,120,128,0.15); overflow: hidden; }
  .ref-m-fill  { height: 100%; border-radius: 3px; background: #14b8a6; transition: width 0.5s; }
  .ref-m-count { font-size: 10px; color: var(--hint); flex-shrink: 0; }
  .ref-m-done  { font-size: 18px; }

  .ref-recent-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .ref-recent-row  {
    background: var(--secondary-bg); border-radius: 14px; padding: 11px 14px;
    display: flex; align-items: center; gap: 11px; box-shadow: var(--shadow);
  }
  .ref-recent-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0; }
  .ref-recent-name   { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ref-recent-status { font-size: 11px; padding: 2px 8px; border-radius: 7px; font-weight: 700; flex-shrink: 0; }
  .ref-status-active  { background: rgba(52,199,89,0.15); color: var(--green); }
  .ref-status-pending { background: rgba(120,120,128,0.12); color: var(--hint); }

  .ref-reward-list { display: flex; flex-direction: column; gap: 7px; }
  .ref-reward-row  {
    background: var(--secondary-bg); border-radius: 13px; padding: 10px 13px;
    display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow);
  }
  .ref-reward-icon  { font-size: 20px; flex-shrink: 0; }
  .ref-reward-label { flex: 1; font-size: 12.5px; font-weight: 600; min-width: 0; }
  .ref-reward-date  { font-size: 10.5px; color: var(--hint); flex-shrink: 0; }

  .ref-empty { text-align: center; color: var(--hint); padding: 24px 0; font-size: 13px; }

  /* ══════════════════════════════════════════
     CASINO – DARK MINIMAL THEME
  ══════════════════════════════════════════ */
  #casinoContent {
    --ci-accent:  #7c6cff;
    --ci-accent2: #ff6b6b;
    --ci-s1:      #0d0d0d;
    --ci-s2:      #161616;
    --ci-s3:      #1f1f1f;
    --ci-border:  rgba(255,255,255,0.07);
    --ci-text:    #f5f5f5;
    --ci-muted:   rgba(245,245,245,0.35);
    background: #000;
    margin: 0 -14px;
    padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 86px);
    min-height: 100%;
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
  }

  /* ── Casino header ── */
  .casino-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 0 18px;
    border-bottom: 1px solid var(--ci-border);
    margin-bottom: 20px;
  }
  .casino-page-title {
    font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--ci-text);
  }
  .casino-page-sub { font-size: 13px; color: var(--ci-muted); margin-top: 2px; }
  .casino-header-badge {
    background: rgba(124,108,255,0.12);
    border: 1px solid rgba(124,108,255,0.25);
    border-radius: 20px; padding: 6px 14px;
    font-size: 12px; font-weight: 500; color: var(--ci-accent);
    letter-spacing: 0.3px;
  }

  /* ── Wallet card ── */
  .wallet-card {
    background: var(--ci-s1);
    border: 1px solid var(--ci-border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: none;
    animation: none;
    position: static; overflow: visible;
  }
  .wallet-card::before { display: none; }
  .wal-label { font-size: 12px; color: var(--ci-muted); font-weight: 400; margin-bottom: 8px; }
  .wal-balance-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
  .wallet-balance {
    font-size: 52px; font-weight: 700; letter-spacing: -2px; line-height: 1;
    color: var(--ci-text); transition: transform 0.2s ease, color 0.2s ease;
  }
  .wallet-balance.pop { color: #34c759; transform: scale(1.08); }
  .wal-balance-unit { font-size: 18px; color: var(--ci-muted); font-weight: 400; }
  .wal-delta {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(52,199,89,0.10);
    border-radius: 6px; padding: 3px 8px;
    font-size: 12px; color: #34c759; font-weight: 500;
  }
  .wal-stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
  }
  .wal-stat {
    background: var(--ci-s2);
    border-radius: 12px; padding: 12px 14px;
  }
  .wal-stat .ws-label { font-size: 11px; color: var(--ci-muted); margin-bottom: 4px; }
  .wal-stat .ws-val { font-size: 16px; font-weight: 600; color: var(--ci-text); }
  .claim-btn {
    width: 100%;
    background: var(--ci-accent);
    border: none; border-radius: 14px; padding: 15px;
    color: #fff; font-family: 'Geist', system-ui, sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .claim-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,108,255,0.3); }
  .claim-btn:active { transform: scale(0.97); }
  .claim-btn:disabled {
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.30);
    box-shadow: none; cursor: default; transform: none; opacity: 1;
  }
  .claim-btn.claiming { opacity: 0.7; }

  /* ── Casino cards (game wrappers) ── */
  .casino-card {
    background: var(--ci-s1);
    border: 1px solid var(--ci-border);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: none;
    animation: none;
  }
  .casino-card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .casino-card-title { font-size: 17px; font-weight: 600; color: var(--ci-text); margin: 0; }
  .casino-card-sub   { font-size: 12px; color: var(--ci-muted); margin: 0; }

  /* ── Slots ── */
  .slots-machine { margin-bottom: 0; }

  .slots-window {
    background: #060611;
    border: 1.5px solid rgba(124,108,255,0.28);
    border-radius: 18px; padding: 10px;
    position: relative; margin-bottom: 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }

  /* Win-line highlight bar */
  .slots-win-line {
    position: absolute; left: 10px; right: 10px;
    top: 50%; transform: translateY(-50%);
    height: 60px; border-radius: 8px;
    border: 1px solid transparent; background: transparent;
    pointer-events: none; z-index: 2; transition: all 0.22s;
  }
  .slots-win-line.lit {
    background: rgba(255,210,0,0.07);
    border-color: rgba(255,210,0,0.55);
    box-shadow: 0 0 14px rgba(255,210,0,0.25);
  }
  .slots-win-line.jackpot-lit {
    background: rgba(197,186,255,0.08);
    border-color: rgba(197,186,255,0.65);
    box-shadow: 0 0 22px rgba(197,186,255,0.4);
  }

  .slots-reels-row { display: flex; gap: 6px; position: relative; }

  /* Each reel window shows 3 symbols (60 px each → 180 px) */
  .slot-reel-wrap {
    flex: 1; height: 180px; overflow: hidden;
    border-radius: 10px; position: relative;
    background: rgba(124,108,255,0.04);
  }
  .slot-reel-wrap::before, .slot-reel-wrap::after {
    content: ''; position: absolute; left: 0; right: 0; z-index: 3;
    height: 56px; pointer-events: none;
  }
  .slot-reel-wrap::before { top: 0;
    background: linear-gradient(to bottom, #060611 15%, transparent); }
  .slot-reel-wrap::after  { bottom: 0;
    background: linear-gradient(to top,   #060611 15%, transparent); }

  .slot-strip {
    display: flex; flex-direction: column;
    will-change: transform;
  }
  .slot-sym {
    height: 60px; display: flex; align-items: center;
    justify-content: center; font-size: 32px;
    flex-shrink: 0; user-select: none;
  }

  /* Per-reel win glow */
  .slot-reel-wrap.win-reel    { animation: sReelGold 0.45s ease-in-out 3 alternate; }
  .slot-reel-wrap.jackpot-reel{ animation: sReelPurp 0.38s ease-in-out 4 alternate; }
  @keyframes sReelGold {
    from { box-shadow: none; }
    to   { box-shadow: 0 0 0 2px #ffd200, 0 0 16px rgba(255,210,0,0.45); }
  }
  @keyframes sReelPurp {
    from { box-shadow: none; }
    to   { box-shadow: 0 0 0 2px #c5baff, 0 0 24px rgba(197,186,255,0.55); }
  }

  /* Bet chips */
  .slots-bet-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .slots-bet-chip {
    flex: 1; padding: 8px 2px; border-radius: 10px;
    border: 1px solid rgba(124,108,255,0.18);
    background: rgba(124,108,255,0.05);
    color: var(--ci-muted); font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.14s;
    font-family: 'Geist', system-ui, sans-serif;
  }
  .slots-bet-chip.active {
    background: rgba(124,108,255,0.18); border-color: rgba(124,108,255,0.52);
    color: var(--ci-accent); box-shadow: 0 0 8px rgba(124,108,255,0.18);
  }
  .slots-bet-chip:active:not(:disabled) { transform: scale(0.93); }
  .slots-bet-chip:disabled { opacity: 0.32; cursor: default; }

  /* Result */
  .slots-result-wrap {
    min-height: 42px; display: flex;
    align-items: center; justify-content: center; margin-bottom: 10px;
  }
  .slots-res-win {
    font-size: 26px; font-weight: 900; color: #34c759; letter-spacing: -1px;
    animation: sWinPop 0.42s cubic-bezier(0.17,0.89,0.32,1.28);
  }
  .slots-res-lose { font-size: 14px; color: var(--ci-muted); animation: sFadeIn 0.28s ease; }
  .slots-res-jackpot {
    font-size: 20px; font-weight: 900; color: var(--ci-accent);
    text-shadow: 0 0 14px rgba(197,186,255,0.5);
    animation: sJackPop 0.52s cubic-bezier(0.17,0.89,0.32,1.28);
  }
  @keyframes sWinPop  { 0%{transform:scale(0.35);opacity:0} 70%{transform:scale(1.18)} 100%{transform:scale(1);opacity:1} }
  @keyframes sJackPop { 0%{transform:scale(0.2) rotate(-8deg);opacity:0} 65%{transform:scale(1.22) rotate(3deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
  @keyframes sFadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes popIn    { 0%{transform:scale(0.7);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

  /* Spin button */
  .casino-spin-btn {
    width: 100%;
    background: linear-gradient(135deg,rgba(124,108,255,0.17),rgba(124,108,255,0.09));
    border: 1.5px solid rgba(124,108,255,0.36);
    border-radius: 14px; padding: 15px;
    color: var(--ci-accent);
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.18s; letter-spacing: 0.2px;
  }
  .casino-spin-btn:hover:not(:disabled)  { background: rgba(124,108,255,0.24); border-color: rgba(124,108,255,0.55); }
  .casino-spin-btn:active:not(:disabled) { transform: scale(0.97); }
  .casino-spin-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* Always-visible compact paytable */
  .slots-paytable-wrap {
    margin-top: 12px; background: rgba(124,108,255,0.04);
    border: 1px solid rgba(124,108,255,0.1);
    border-radius: 12px; padding: 10px 12px;
  }
  .slots-paytable-title {
    font-size: 10px; color: var(--ci-muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    font-weight: 600; margin-bottom: 8px;
  }
  .slots-paytable-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
  .slots-pt-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0; border-bottom: 1px solid rgba(124,108,255,0.07); font-size: 11px;
  }
  .slots-pt-row:nth-last-child(-n+2) { border-bottom: none; }
  .slots-pt-sym { font-size: 13px; }
  .slots-pt-pay { color: var(--ci-accent); font-weight: 700; font-size: 11px; }

  /* ── Coin flip ── */
  .flip-coin-row {
    display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
  }
  .flip-coin-display {
    width: 60px; height: 60px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffe580, #c8a800, #6b5800);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(200,168,0,0.25);
    transition: transform 0.6s ease;
    filter: none; text-align: initial; line-height: initial; margin-bottom: 0;
  }
  .flip-coin-display.flipping {
    animation: coinFlip 0.7s linear;
  }
  @keyframes coinFlip {
    0%   { transform: rotateY(0deg)    scale(1);   }
    50%  { transform: rotateY(900deg)  scale(0.7); }
    100% { transform: rotateY(1800deg) scale(1);   }
  }
  .flip-coin-info { flex: 1; }
  .flip-coin-info .fci-label { font-size: 11px; color: var(--ci-muted); margin-bottom: 6px; }
  .flip-coin-info .fci-odds  { display: flex; gap: 8px; }
  .fci-odd {
    flex: 1; background: var(--ci-s2); border-radius: 8px; padding: 6px 10px;
    font-size: 12px; text-align: center;
  }
  .fci-odd .fci-val { font-size: 16px; font-weight: 700; color: var(--ci-text); }
  .fci-odd .fci-lbl { font-size: 10px; color: var(--ci-muted); }
  .flip-bet-row {
    display: flex; align-items: center;
    background: var(--ci-s2);
    border: 1px solid var(--ci-border);
    border-radius: 12px;
    overflow: hidden; margin-bottom: 10px;
    justify-content: initial;
  }
  .flip-bet-label { padding: 0 14px; font-size: 12px; color: var(--ci-muted); font-weight: 400; }
  .flip-bet-sep { width: 1px; height: 44px; background: var(--ci-border); }
  .flip-bet-input {
    flex: 1; background: transparent; border: none; outline: none;
    padding: 12px 14px; color: var(--ci-text);
    font-family: 'Geist', system-ui, sans-serif; font-size: 18px; font-weight: 600;
    text-align: right; width: auto; border-radius: 0;
  }
  .flip-presets { display: flex; gap: 6px; margin-bottom: 12px; justify-content: initial; }
  .flip-preset-btn {
    flex: 1; padding: 8px;
    background: var(--ci-s2); border: 1px solid var(--ci-border); border-radius: 8px;
    color: var(--ci-muted); font-family: 'Geist', system-ui, sans-serif;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .flip-preset-btn:hover, .flip-preset-btn:active {
    color: var(--ci-text); border-color: rgba(255,255,255,0.15);
    background: var(--ci-s3);
  }
  .flip-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .flip-choice-btn {
    padding: 14px; border-radius: 14px;
    font-family: 'Geist', system-ui, sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    border: 1px solid;
    background: transparent;
  }
  .flip-choice-btn:hover  { transform: translateY(-1px); filter: brightness(1.15); }
  .flip-choice-btn:active { transform: scale(0.97); filter: none; }
  .flip-choice-btn:disabled { opacity: 0.4; transform: none; }
  .flip-choice-btn.heads-btn {
    background: rgba(124,108,255,0.08);
    border-color: rgba(124,108,255,0.25);
    color: var(--ci-accent);
  }
  .flip-choice-btn.tails-btn {
    background: rgba(255,107,107,0.08);
    border-color: rgba(255,107,107,0.25);
    color: var(--ci-accent2);
  }
  .flip-result {
    text-align: center; font-size: 16px; font-weight: 700; min-height: 26px;
    margin-top: 4px; color: var(--ci-text);
  }
  .flip-won  { color: #34c759;          animation: popIn 0.4s ease; }
  .flip-lost { color: var(--ci-accent2); animation: popIn 0.4s ease; }

  /* ── Casino game picker ── */
  .casino-game-picker {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 8px; margin-bottom: 16px;
  }
  .cgp-btn {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 12px 4px; background: var(--ci-s2);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
    cursor: pointer; transition: all 0.18s; color: rgba(245,245,245,0.7);
    font-family: 'Geist', system-ui, sans-serif;
  }
  .cgp-btn.active {
    background: rgba(124,108,255,0.18);
    border-color: rgba(124,108,255,0.5); color: #c5baff;
    box-shadow: 0 0 0 1px rgba(124,108,255,0.3) inset;
  }
  .cgp-btn:active { transform: scale(0.94); }
  .cgp-icon  { font-size: 22px; line-height: 1; }
  .cgp-label { font-size: 11px; font-weight: 600; letter-spacing: 0.2px; }

  /* ── Mines ── */
  .mines-config { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .mines-config-row { display: flex; align-items: center; gap: 10px; }
  .mines-config-label {
    font-size: 10.5px; color: var(--ci-muted); width: 42px; flex-shrink: 0;
    text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  }
  .mines-preset-group { display: flex; gap: 5px; flex: 1; }
  .mines-preset-btn {
    flex: 1; padding: 8px 2px;
    background: var(--ci-s2); border: 1px solid rgba(255,255,255,0.08); border-radius: 9px;
    color: rgba(245,245,245,0.45); font-family: 'Geist', system-ui, sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .mines-preset-btn.sel {
    background: rgba(124,108,255,0.16); border-color: rgba(124,108,255,0.42);
    color: #c5baff;
  }
  .mines-preset-btn:active { transform: scale(0.92); }
  .mines-grid {
    display: grid; grid-template-columns: repeat(5,1fr);
    gap: 5px; margin-bottom: 12px;
  }
  .mines-cell {
    aspect-ratio: 1;
    background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.1s, box-shadow 0.12s;
    user-select: none; -webkit-tap-highlight-color: transparent;
    color: transparent; /* hide placeholder text */
  }
  .mines-cell:not(.safe):not(.mine):not(.mine-end):not(.inactive):hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.15);
  }
  .mines-cell:not(.safe):not(.mine):not(.mine-end):not(.inactive):active {
    transform: scale(0.86);
    background: rgba(124,108,255,0.18);
    border-color: rgba(124,108,255,0.35);
  }
  .mines-cell.inactive { cursor: default; opacity: 0.38; }
  .mines-cell.safe {
    background: rgba(52,199,89,0.16);
    border-color: rgba(52,199,89,0.55);
    box-shadow: 0 0 10px rgba(52,199,89,0.18);
    animation: mRevealSafe 0.3s cubic-bezier(.34,1.56,.64,1) forwards;
    cursor: default; color: initial;
  }
  @keyframes mRevealSafe {
    0%   { transform: scale(0.6); opacity: 0.2; }
    60%  { transform: scale(1.14); }
    100% { transform: scale(1); opacity: 1; }
  }
  .mines-cell.mine {
    background: rgba(255,69,58,0.24);
    border-color: rgba(255,69,58,0.7);
    box-shadow: 0 0 14px rgba(255,69,58,0.3);
    animation: mExplode 0.45s ease forwards;
    cursor: default; color: initial;
  }
  @keyframes mExplode {
    0%   { transform: scale(1); }
    18%  { transform: scale(1.35) rotate(-7deg); }
    36%  { transform: scale(0.82) rotate(7deg); }
    55%  { transform: scale(1.16) rotate(-4deg); }
    75%  { transform: scale(0.96) rotate(2deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .mines-cell.mine-end {
    background: rgba(255,69,58,0.07);
    border-color: rgba(255,69,58,0.24);
    animation: mRevealEnd 0.25s ease forwards;
    cursor: default; color: initial;
  }
  @keyframes mRevealEnd {
    0%   { transform: scale(0.85); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .mines-status {
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(135deg, rgba(124,108,255,0.10), rgba(124,108,255,0.04));
    border: 1px solid rgba(124,108,255,0.22);
    border-radius: 14px; padding: 12px 16px; margin-bottom: 10px;
  }
  .mines-mult {
    font-size: 30px; font-weight: 900; color: #c5baff; line-height: 1;
    transition: color 0.4s, text-shadow 0.4s;
    text-shadow: 0 0 18px rgba(124,108,255,0.4);
  }
  .mines-mult.tier2 { color: #fbbf24; text-shadow: 0 0 18px rgba(251,191,36,0.45); }
  .mines-mult.tier3 { color: #f97316; text-shadow: 0 0 22px rgba(249,115,22,0.55); }
  .mines-payout { font-size: 11px; color: var(--ci-muted); margin-top: 4px; }
  .mines-cashout-btn {
    border: 1px solid rgba(52,199,89,0.35); border-radius: 12px; padding: 10px 18px;
    background: rgba(52,199,89,0.12); color: #34c759;
    font-family: 'Geist', system-ui, sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.18s;
  }
  .mines-cashout-btn:not(:disabled):active { transform: scale(0.95); }
  .mines-cashout-btn:not(:disabled):hover { background: rgba(52,199,89,0.22); box-shadow: 0 4px 12px rgba(52,199,89,0.2); }
  .mines-cashout-btn:disabled { opacity: 0.28; cursor: default; }
  .mines-result { text-align: center; font-size: 16px; font-weight: 700; min-height: 24px; margin-top: 8px; }

  /* ── Crash / Rocket ── */
  .crash-display {
    position: relative; height: 148px;
    background: linear-gradient(180deg, #0b0b14 0%, #0d0d0d 100%);
    border: 1px solid rgba(124,108,255,0.18);
    border-radius: 16px; margin-bottom: 14px; overflow: hidden;
  }
  .crash-display::before {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(rgba(124,108,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,108,255,0.04) 1px, transparent 1px);
    background-size: 55px 37px;
    pointer-events: none;
  }
  .crash-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .crash-rocket {
    position: absolute; left: -18px; top: 125px;
    width: 48px; height: 26px;
    will-change: transform, left, top;
    transform-origin: 24px 13px;
    transform: rotate(-45deg);
    filter: drop-shadow(0 0 8px rgba(197,186,255,.85));
  }
  .crash-rocket-svg { display: block; overflow: visible; }
  .rocket-flame {
    transform-box: fill-box;
    transform-origin: right center;
    animation: rocketFlicker 0.22s ease-in-out infinite alternate;
  }
  @keyframes rocketFlicker {
    from { transform: scaleX(1)    scaleY(1);    opacity: 0.82; }
    to   { transform: scaleX(1.28) scaleY(0.72); opacity: 1;    }
  }
  .crash-mult-display {
    position: absolute; bottom: 10px; right: 12px;
    font-size: 34px; font-weight: 900; letter-spacing: -1.5px;
    color: rgba(245,245,245,0.65); pointer-events: none;
    text-shadow: 0 2px 10px rgba(0,0,0,.8);
    transition: color 0.3s, text-shadow 0.3s;
  }
  .crash-mult-display.flying {
    color: #c5baff;
    text-shadow: 0 0 22px rgba(124,108,255,0.55), 0 2px 10px rgba(0,0,0,.8);
    animation: crashMPulse 1.1s ease-in-out infinite;
  }
  @keyframes crashMPulse { 0%,100%{opacity:1} 50%{opacity:0.78} }
  .crash-mult-display.won  { color: #34c759; text-shadow: 0 0 24px rgba(52,199,89,0.55); animation: popIn 0.3s ease; }
  .crash-mult-display.lost { color: #ff453a; text-shadow: 0 0 24px rgba(255,69,58,0.55); animation: mExplode 0.4s ease; }
  .crash-cashout-btn {
    width: 100%; border: 1px solid rgba(52,199,89,0.30); border-radius: 14px; padding: 14px;
    background: rgba(52,199,89,0.10); color: #34c759;
    font-family: 'Geist', system-ui, sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin-bottom: 8px;
  }
  .crash-cashout-btn.live {
    border-color: rgba(52,199,89,0.55);
    background: rgba(52,199,89,0.16);
    animation: cashoutGlow 1.4s ease-in-out infinite;
  }
  @keyframes cashoutGlow {
    0%,100% { box-shadow: 0 0 0 0 rgba(52,199,89,0.35); }
    50%     { box-shadow: 0 0 0 5px rgba(52,199,89,0); }
  }
  .crash-cashout-btn:not(:disabled):active { transform: scale(0.97); }
  .crash-cashout-btn:disabled {
    opacity: 0.28; cursor: default;
    background: rgba(255,255,255,0.03); color: var(--ci-muted);
    border-color: var(--ci-border); animation: none;
  }
  .crash-start-btn {
    width: 100%; border: 1px solid rgba(124,108,255,0.25); border-radius: 14px; padding: 14px;
    background: rgba(124,108,255,0.10); color: var(--ci-accent);
    font-family: 'Geist', system-ui, sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .crash-start-btn:not(:disabled):hover   { background: rgba(124,108,255,0.18); }
  .crash-start-btn:not(:disabled):active  { transform: scale(0.97); }
  .crash-start-btn:disabled { opacity: 0.45; cursor: default; }
  .crash-result-msg { text-align: center; font-size: 15px; font-weight: 700; min-height: 22px; margin-top: 8px; }
  .crash-bet-row { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }
  .crash-presets { display: flex; gap: 5px; margin-bottom: 10px; }
  .crash-presets .mines-preset-btn { min-width: 40px; }

  /* ── Crash history bar ── */
  .crash-history-bar {
    display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; min-height: 24px;
  }
  .crash-hist-chip {
    padding: 2px 9px; border-radius: 8px; font-size: 11px; font-weight: 800;
    border: 1px solid; line-height: 20px; cursor: default; letter-spacing: -0.3px;
    transition: transform 0.1s;
  }
  .crash-hist-chip.low  { background: rgba(255,69,58,0.14);  border-color: rgba(255,69,58,0.40);  color: #ff453a; }
  .crash-hist-chip.mid  { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.38); color: #fbbf24; }
  .crash-hist-chip.high { background: rgba(52,199,89,0.12);  border-color: rgba(52,199,89,0.40);  color: #34c759; }
  .crash-hist-chip.mega { background: rgba(197,186,255,0.14); border-color: rgba(197,186,255,0.45); color: #c5baff; }

  /* ── Crash auto-controls ── */
  .crash-auto-row {
    display: flex; gap: 7px; margin-bottom: 10px; align-items: center;
  }
  .crash-auto-toggle {
    display: flex; align-items: center; gap: 5px;
    padding: 7px 12px; border-radius: 10px; cursor: pointer;
    background: var(--ci-s2); border: 1px solid rgba(255,255,255,0.08);
    font-size: 11.5px; font-weight: 700; color: var(--ci-muted);
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    font-family: 'Geist', system-ui, sans-serif;
  }
  .crash-auto-toggle.on {
    background: rgba(124,108,255,0.16); border-color: rgba(124,108,255,0.42); color: #c5baff;
  }
  .crash-auto-toggle:active { transform: scale(0.93); }
  .crash-auto-cashout-wrap {
    flex: 1; display: flex; align-items: center; gap: 5px;
    background: var(--ci-s2); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 0 10px;
  }
  .crash-auto-cashout-wrap label {
    font-size: 10.5px; color: var(--ci-muted); white-space: nowrap;
    font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase;
  }
  .crash-auto-cashout-input {
    flex: 1; padding: 7px 0; background: transparent; border: none;
    color: rgba(245,245,245,0.9); font-size: 13px; font-weight: 700;
    font-family: 'Geist', system-ui, sans-serif; text-align: right;
    outline: none; width: 0;
  }
  .crash-auto-cashout-input::placeholder { color: var(--ci-muted); }

  /* ── Mines FOMO reveal label ── */
  .mines-fomo-label {
    text-align: center; font-size: 11px; color: var(--ci-muted);
    margin-bottom: 4px; letter-spacing: 0.3px; font-weight: 600;
    text-transform: uppercase;
  }

  /* ══════════════════════════════════════════
     DONATE / SUPPORT
  ══════════════════════════════════════════ */
  .donate-header {
    text-align: center; padding: 10px 0 20px;
    animation: fadeDown 0.4s ease;
  }
  .donate-icon { font-size: 48px; margin-bottom: 10px; }
  .donate-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .donate-sub   { font-size: 13px; color: var(--hint); line-height: 1.5; }

  .tiers-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
  .tier-card {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    padding: 18px 16px; box-shadow: var(--shadow);
    position: relative; overflow: hidden;
    animation: riseIn 0.35s ease backwards;
    border: 1.5px solid transparent;
  }
  .tier-card.popular {
    border-color: rgba(124,58,237,0.5);
    box-shadow: 0 4px 20px rgba(124,58,237,0.18);
  }
  .tier-popular-badge {
    position: absolute; top: 0; right: 0;
    background: linear-gradient(90deg,#7c3aed,#a855f7);
    color: #fff; font-size: 11px; font-weight: 800;
    padding: 4px 12px; border-bottom-left-radius: 12px;
  }
  .tier-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .tier-emoji { font-size: 32px; }
  .tier-info {}
  .tier-name  { font-size: 17px; font-weight: 800; }
  .tier-price { font-size: 13px; color: var(--hint); margin-top: 2px; font-weight: 500; }
  .tier-perks { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .tier-perk  { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .tier-perk::before { content: "✓"; color: var(--green); font-weight: 800; flex-shrink: 0; }
  .tier-btn {
    width: 100%; border: none; border-radius: 12px; padding: 11px;
    font-size: 13.5px; font-weight: 800;
    background: rgba(120,120,128,0.1); color: var(--hint);
    cursor: default;
  }
  .donate-stars-note {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    padding: 16px; text-align: center; font-size: 12.5px; color: var(--hint);
    line-height: 1.6; box-shadow: var(--shadow);
  }
  .donate-stars-note strong { color: var(--text); }
  .donate-coming-soon {
    display: inline-block; margin-top: 8px;
    background: rgba(245,158,11,0.15); color: #f59e0b;
    font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 8px;
  }
  /* ── Quest tab colours ── */

  /* ── Quest card ── */
  .quest-card {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    padding: 14px 15px; box-shadow: var(--shadow); margin-bottom: 11px;
    display: flex; align-items: center; gap: 13px;
    animation: riseIn 0.32s ease backwards;
    border: 1px solid transparent;
  }
  .quest-card.claimed { opacity: 0.5; }
  .quest-card.ready   { border-color: rgba(52,199,89,0.4); }
  .quest-emoji  { font-size: 28px; flex-shrink: 0; }
  .quest-body   { flex: 1; min-width: 0; }
  .quest-title  { font-size: 14px; font-weight: 700; }
  .quest-desc   { font-size: 11.5px; color: var(--hint); margin-top: 2px; line-height: 1.35; }
  .quest-prog-wrap { display: flex; align-items: center; gap: 7px; margin-top: 7px; }
  .quest-prog-track { flex: 1; height: 5px; border-radius: 3px; background: rgba(120,120,128,0.13); overflow: hidden; }
  .quest-prog-fill  { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.55s ease; }
  .quest-prog-lbl   { font-size: 10.5px; color: var(--hint); flex-shrink: 0; }
  .quest-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .quest-reward { font-size: 12.5px; font-weight: 700; color: var(--orange); }
  .quest-claim-btn {
    border: none; border-radius: 10px; padding: 5px 11px;
    font-size: 12px; font-weight: 700;
    background: var(--green); color: #fff;
    transition: transform 0.1s, opacity 0.2s;
    touch-action: manipulation;
  }
  .quest-claim-btn:active { transform: scale(0.93); }
  .quest-claim-btn:disabled { opacity: 0.35; background: rgba(120,120,128,0.18); color: var(--hint); }
  .quest-done-badge { font-size: 20px; }

  /* ── Leaderboard ── */
  .lb-entry {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: var(--secondary-bg); border-radius: 16px;
    margin-bottom: 8px; box-shadow: var(--shadow);
    animation: riseIn 0.3s ease backwards;
  }
  .lb-entry.me { border: 1.5px solid rgba(36,129,204,0.38); background: rgba(36,129,204,0.05); }
  .lb-rank   { font-size: 15px; font-weight: 900; width: 26px; text-align: center; flex-shrink: 0; }
  .lb-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .lb-name   { flex: 1; font-size: 13.5px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-coins  { font-size: 13px; font-weight: 700; color: var(--orange); flex-shrink: 0; }
  .lb-my-rank-note { text-align: center; font-size: 12.5px; color: var(--hint); margin: 4px 0 12px; }

  /* ── Subscription card ── */
  .sub-card {
    border-radius: var(--card-radius);
    margin-bottom: 14px; box-shadow: var(--shadow);
    overflow: hidden; animation: riseIn 0.3s ease backwards;
    background: var(--secondary-bg);
  }
  .sub-card.active {
    background: linear-gradient(145deg, #5856d6 0%, #2481cc 100%);
    color: #fff;
  }
  .sub-card-header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 16px 14px;
  }
  .sub-star-icon {
    font-size: 36px; line-height: 1; flex-shrink: 0;
    filter: drop-shadow(0 2px 6px rgba(88,86,214,.4));
  }
  .sub-card-title-wrap { flex: 1; min-width: 0; }
  .sub-active-badge {
    display: inline-block;
    background: rgba(255,255,255,.22); color: #fff;
    font-size: 10.5px; font-weight: 700;
    padding: 2px 9px; border-radius: 6px;
    margin-bottom: 5px; letter-spacing: .3px; text-transform: uppercase;
  }
  .sub-card-title  { font-size: 18px; font-weight: 900; line-height: 1.2; }
  .sub-card-price  { font-size: 13px; color: var(--hint); margin-top: 4px; font-weight: 600; }
  .sub-card.active .sub-card-price { color: rgba(255,255,255,.7); }
  .sub-card-desc {
    font-size: 12.5px; color: var(--hint);
    padding: 0 16px 12px; line-height: 1.55;
  }
  .sub-days-row {
    display: flex; align-items: baseline; gap: 4px;
    padding: 0 16px 8px;
  }
  .sub-days-num   { font-size: 32px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
  .sub-days-label { font-size: 15px; opacity: .75; font-weight: 600; }
  .sub-progress-track {
    height: 5px; background: rgba(255,255,255,.18);
    margin: 0 16px 14px; border-radius: 4px; overflow: hidden;
  }
  .sub-progress-fill {
    height: 100%; background: rgba(255,255,255,.9); border-radius: 4px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }
  .sub-divider       { height: 1px; background: rgba(255,255,255,.12); margin: 0 16px 14px; }
  .sub-divider.light { background: rgba(120,120,128,.12); }
  .sub-benefit-list  { padding: 2px 16px 16px; display: flex; flex-direction: column; gap: 9px; }
  .sub-benefit-row {
    display: flex; align-items: center; gap: 11px;
    font-size: 13.5px; font-weight: 500; line-height: 1.35;
  }
  .sub-card.active .sub-benefit-row { color: rgba(255,255,255,.88); }
  .sub-benefit-ico { font-size: 17px; flex-shrink: 0; width: 24px; text-align: center; }
  .sub-buy-btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    width: calc(100% - 32px); margin: 6px 16px 10px; padding: 14px;
    border: none; border-radius: 13px;
    background: linear-gradient(135deg, #5856d6 0%, #2481cc 100%);
    color: #fff; font-size: 15px; font-weight: 800;
    touch-action: manipulation; transition: transform .12s, opacity .2s; cursor: pointer;
    box-shadow: 0 4px 16px rgba(88,86,214,.38);
  }
  .sub-buy-btn:active   { transform: scale(0.97); }
  .sub-buy-btn:disabled { opacity: .5; box-shadow: none; }
  .sub-buy-star { font-size: 18px; }
  .sub-buy-note {
    text-align: center; font-size: 11.5px; color: var(--hint);
    padding: 0 16px 16px; line-height: 1.5;
  }

  /* ── Subscription purchase redesign ───────────────────────────────────── */
  .sub-purchase-wrap { animation: riseIn 0.3s ease backwards; }

  .sub-hero-card {
    border-radius: var(--card-radius); margin-bottom: 12px;
    background: linear-gradient(140deg, #3a3399 0%, #1c63b0 100%);
    padding: 24px 20px 20px; text-align: center;
    box-shadow: 0 6px 28px rgba(88,86,214,.32);
    position: relative; overflow: hidden;
  }
  .sub-hero-card::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: rgba(255,255,255,.06); border-radius: 50%; pointer-events: none;
  }
  .sub-hero-card::after {
    content: ''; position: absolute; bottom: -30px; left: -30px;
    width: 100px; height: 100px;
    background: rgba(255,255,255,.04); border-radius: 50%; pointer-events: none;
  }
  .sub-hero-emoji { font-size: 48px; line-height: 1; display: block; margin-bottom: 10px;
    filter: drop-shadow(0 4px 12px rgba(255,215,0,.4)); }
  .sub-hero-title { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
  .sub-hero-desc  { font-size: 13px; color: rgba(255,255,255,.72);
    margin-top: 6px; line-height: 1.55; max-width: 280px; margin-left: auto; margin-right: auto; }

  /* Plan picker row */
  .sub-plans-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 12px; padding-top: 14px; /* room for badges */
  }
  .sub-plan-card {
    border: 1.5px solid var(--ci-border, rgba(120,120,128,.2));
    border-radius: 14px; padding: 14px 6px 12px;
    text-align: center; cursor: pointer; position: relative;
    background: var(--secondary-bg);
    transition: border-color .16s, background .16s, box-shadow .16s;
    -webkit-tap-highlight-color: transparent;
  }
  .sub-plan-card:active { transform: scale(0.96); }
  .sub-plan-card.featured  { border-color: rgba(88,86,214,.45); }
  .sub-plan-card.selected  {
    border-color: #5856d6;
    background: rgba(88,86,214,.11);
    box-shadow: 0 0 0 1px #5856d6 inset, 0 4px 14px rgba(88,86,214,.18);
  }
  .sub-plan-badge {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #5856d6, #2481cc);
    color: #fff; font-size: 9px; font-weight: 800;
    padding: 3px 9px; border-radius: 20px; white-space: nowrap;
    letter-spacing: .3px; z-index: 1; line-height: 1.4;
  }
  .sub-plan-name {
    font-size: 10px; font-weight: 700; color: var(--hint);
    text-transform: uppercase; letter-spacing: .7px;
    margin-bottom: 8px; line-height: 1;
  }
  .sub-plan-stars {
    font-size: 20px; font-weight: 900; line-height: 1;
    display: flex; align-items: center; justify-content: center; gap: 3px;
  }
  .sub-plan-stars-ico { font-size: 13px; }
  .sub-plan-perday { font-size: 10px; color: var(--hint); margin-top: 5px; font-weight: 500; }
  .sub-plan-save {
    display: inline-block; margin-top: 6px;
    background: rgba(52,199,89,.15); border: 1px solid rgba(52,199,89,.35);
    color: #34c759; font-size: 9.5px; font-weight: 800;
    padding: 2px 7px; border-radius: 6px; line-height: 1.4;
  }

  /* Benefits section */
  .sub-bene-section {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    overflow: hidden; margin-bottom: 12px;
  }
  .sub-bene-header {
    padding: 13px 16px 10px; border-bottom: 1px solid var(--ci-border, rgba(120,120,128,.14));
  }
  .sub-bene-title {
    font-size: 11px; font-weight: 700; color: var(--hint);
    text-transform: uppercase; letter-spacing: .7px;
  }
  .sub-bene-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--ci-border, rgba(120,120,128,.14));
  }
  .sub-bene-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 11px 12px; background: var(--secondary-bg);
    font-size: 12px; font-weight: 500; line-height: 1.4;
  }
  .sub-bene-ico { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* CTA section */
  .sub-cta-wrap {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    padding: 14px 16px 16px; margin-bottom: 10px;
  }
  .sub-cta-info {
    font-size: 12.5px; color: var(--hint); text-align: center;
    margin-bottom: 11px; line-height: 1.55;
  }
  .sub-cta-info strong { color: var(--text); font-weight: 700; }
  .sub-cta-info .sub-cta-save { color: #34c759; font-weight: 700; }

  /* ── Subscription tier switcher ──────────────────────────────────────── */
  .sub-tier-row {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--secondary-bg); border-radius: 14px; padding: 4px;
    margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .sub-tier-tab {
    border: none; border-radius: 11px; padding: 10px 6px;
    font-size: 13px; font-weight: 700; background: transparent;
    color: var(--hint); touch-action: manipulation; transition: all .18s; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .sub-tier-tab.active {
    background: #fff; color: #1c1c1e; box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .theme-dark .sub-tier-tab.active { background: #3a3a3c; color: #fff; }

  /* VIP hero card — gold/purple gradient */
  .sub-vip-hero {
    border-radius: var(--card-radius); margin-bottom: 12px;
    background: linear-gradient(140deg, #4a1a8f 0%, #9c4f00 60%, #c47800 100%);
    padding: 24px 20px 20px; text-align: center;
    box-shadow: 0 6px 28px rgba(180,120,0,.35);
    position: relative; overflow: hidden;
  }
  .sub-vip-hero::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 150px; height: 150px;
    background: rgba(255,215,0,.08); border-radius: 50%; pointer-events: none;
  }
  .sub-vip-hero::after {
    content: ''; position: absolute; bottom: -30px; left: -30px;
    width: 110px; height: 110px;
    background: rgba(255,255,255,.04); border-radius: 50%; pointer-events: none;
  }

  /* VIP plan card gold selection */
  .sub-plan-card.vip-selected {
    border-color: #c47800;
    background: rgba(196,120,0,.11);
    box-shadow: 0 0 0 1px #c47800 inset, 0 4px 14px rgba(196,120,0,.22);
  }
  .sub-plan-card.vip-featured { border-color: rgba(196,120,0,.45); }
  .sub-plan-badge.vip { background: linear-gradient(135deg, #9c4f00, #c47800); }
  .sub-plan-save.vip  {
    background: rgba(196,120,0,.15); border-color: rgba(196,120,0,.35); color: #c47800;
  }

  /* VIP buy button — gold */
  .sub-buy-btn.vip {
    background: linear-gradient(135deg, #9c4f00, #c47800);
    box-shadow: 0 4px 16px rgba(180,120,0,.42);
  }

  /* VIP active card */
  .sub-card.vip-active {
    background: linear-gradient(140deg, #2a0f55, #5a2e00);
    border: 1.5px solid rgba(196,120,0,.3);
  }
  .sub-active-badge.vip {
    background: linear-gradient(135deg, #9c4f00, #c47800);
  }

  /* VIP benefits grid */
  .vip-bene-header { border-bottom: 1px solid rgba(196,120,0,.2); }
  .vip-bene-title { color: #c47800; }

  /* AI analysis teaser card */
  .ai-teaser-card {
    border-radius: var(--card-radius); overflow: hidden;
    background: var(--secondary-bg); box-shadow: var(--shadow);
    margin-bottom: 12px; border: 1.5px solid rgba(88,86,214,.2);
  }
  .ai-teaser-header {
    background: linear-gradient(135deg, rgba(88,86,214,.15), rgba(52,199,89,.08));
    padding: 14px 16px 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .ai-teaser-ico { font-size: 28px; }
  .ai-teaser-title { font-size: 15px; font-weight: 800; }
  .ai-teaser-sub   { font-size: 12px; color: var(--hint); margin-top: 2px; }
  .ai-sections-preview {
    padding: 10px 14px 14px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .ai-sec-chip {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; color: var(--hint);
    background: rgba(120,120,128,.08); border-radius: 9px;
    padding: 6px 10px;
  }
  .ai-teaser-btn {
    width: calc(100% - 28px); margin: 0 14px 14px;
    border: none; border-radius: 13px; padding: 12px;
    font-size: 14px; font-weight: 800;
    background: linear-gradient(135deg, #5856d6, #2481cc);
    color: #fff; touch-action: manipulation; cursor: pointer;
  }

  /* ── Pet section ── */
  /* ── Pet system — redesigned ─────────────────────────────── */
  @keyframes petFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }
  @keyframes bubblePop {
    0%   { opacity:0; transform: scale(0.7) translateY(6px); }
    100% { opacity:1; transform: scale(1) translateY(0); }
  }
  @keyframes statPulse {
    0%,100% { opacity:1; }
    50%      { opacity:0.55; }
  }

  .pet-section { margin-bottom: 16px; }
  .pet-card {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    padding: 16px 14px 14px; margin-bottom: 10px; box-shadow: var(--shadow);
    animation: riseIn 0.3s ease backwards;
    position: relative; overflow: hidden;
  }
  .pet-card::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,149,0,0.04) 0%, rgba(52,199,89,0.03) 100%);
    pointer-events: none;
  }
  .pet-card.dead { opacity: 0.45; }

  /* hero section — centered avatar + speech bubble */
  .pet-hero { display: flex; flex-direction: column; align-items: center; padding: 8px 0 14px; }
  .pet-bubble-wrap { position: relative; margin-bottom: 4px; }
  .pet-speech-bubble {
    background: var(--secondary-bg);
    border: 1.5px solid rgba(120,120,128,0.18);
    border-radius: 14px; padding: 6px 12px;
    font-size: 12.5px; color: var(--text); white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    animation: bubblePop 0.3s cubic-bezier(.34,1.56,.64,1) backwards;
  }
  .pet-speech-bubble::after {
    content: ""; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(120,120,128,0.18);
  }
  .pet-speech-bubble::before {
    content: ""; position: absolute; bottom: -5.5px; left: 50%; transform: translateX(-50%);
    border: 4.5px solid transparent;
    border-top-color: var(--secondary-bg);
    z-index: 1;
  }

  .pet-avatar-circle {
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,149,0,0.09);
    display: flex; align-items: center; justify-content: center;
    animation: petFloat 3s ease-in-out infinite;
    margin: 10px 0 8px; position: relative;
  }
  .pet-avatar  { font-size: 48px; line-height: 1; display: block; }
  .pet-level-badge {
    position: absolute; bottom: -2px; right: -4px;
    background: var(--link); color: #fff;
    font-size: 9px; font-weight: 800; border-radius: 8px; padding: 2px 6px;
    border: 2px solid var(--secondary-bg);
    white-space: nowrap;
  }

  .pet-name-centered { font-size: 17px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.2px; }
  .pet-badges-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .pet-personality {
    font-size: 11px; background: rgba(120,120,128,0.12);
    border-radius: 7px; padding: 2px 7px;
  }
  .pet-stage-badge {
    font-size: 11px; background: rgba(255,149,0,0.12); color: var(--orange);
    border-radius: 7px; padding: 2px 7px;
  }
  .pet-with-lbl {
    font-size: 11.5px; color: var(--hint); margin-top: 5px;
  }

  /* stat bars — taller and more expressive */
  .pet-stats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .pet-stat-row { display: flex; align-items: center; gap: 8px; }
  .pet-stat-icon { font-size: 13px; width: 16px; flex-shrink: 0; }
  .pet-stat-label { font-size: 11.5px; color: var(--hint); width: 54px; flex-shrink: 0; }
  .pet-stat-track { flex: 1; height: 8px; border-radius: 6px; background: rgba(120,120,128,0.12); overflow: hidden; }
  .pet-stat-fill  { height: 100%; border-radius: 6px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }
  .pet-stat-fill.pulsing { animation: statPulse 1.8s ease-in-out infinite; }
  .pet-stat-lbl   { font-size: 11px; font-weight: 700; flex-shrink: 0; width: 32px; text-align: right; }

  /* xp bar */
  .pet-xp-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .pet-xp-label { font-size: 11px; color: var(--hint); flex-shrink: 0; }
  .pet-xp-track { flex: 1; height: 6px; border-radius: 4px; background: rgba(120,120,128,0.12); overflow: hidden; }
  .pet-xp-fill  { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #f59e0b, #f97316); transition: width 0.7s cubic-bezier(.4,0,.2,1); }
  .pet-xp-lbl   { font-size: 10.5px; color: var(--hint); flex-shrink: 0; }

  /* action buttons — 2×2 grid */
  .pet-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pet-action-btn {
    border: none; border-radius: 13px; padding: 10px 8px;
    font-size: 12.5px; font-weight: 700; line-height: 1.3;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    transition: transform 0.1s, opacity 0.2s; touch-action: manipulation;
    min-height: 52px; justify-content: center;
  }
  .pet-action-btn:active   { transform: scale(0.93); }
  .pet-action-btn:disabled { opacity: 0.32; background: rgba(120,120,128,0.09) !important; color: var(--hint) !important; }
  .pet-btn-icon  { font-size: 18px; }
  .pet-btn-label { font-size: 11.5px; font-weight: 700; }
  .pet-btn-sub   { font-size: 10px; opacity: 0.75; font-weight: 600; }
  .pet-btn-feed   { background: rgba(255,149,0,0.13); color: var(--orange); }
  .pet-btn-play   { background: rgba(52,199,89,0.12); color: var(--green); }
  .pet-btn-cuddle { background: rgba(191,90,242,0.12); color: #bf5af2; }
  .pet-btn-rename { background: rgba(36,129,204,0.12); color: var(--link); }

  .pet-empty       { text-align: center; padding: 18px 8px 22px; }
  .pet-empty-emoji { font-size: 46px; margin-bottom: 10px; }
  .pet-empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .pet-empty-sub   { font-size: 13px; color: var(--hint); margin-bottom: 18px; line-height: 1.45; }
  .pet-adopt-cta {
    border: none; border-radius: 14px; padding: 11px 24px;
    font-size: 14px; font-weight: 700;
    background: var(--green); color: #fff; touch-action: manipulation;
  }
  .pet-add-more {
    border: none; border-radius: 10px; padding: 3px 10px;
    font-size: 12px; font-weight: 600; margin-left: auto;
    background: rgba(52,199,89,0.13); color: var(--green); touch-action: manipulation;
  }
  /* death card */
  .pet-dead-row { display: flex; align-items: center; gap: 12px; }
  .pet-dead-body { flex: 1; min-width: 0; }
  .pet-dead-cause { font-size: 11.5px; color: var(--hint); margin-top: 2px; }

  /* ── Pet tabs (v3) ── */
  .pet-tabs-row {
    display: flex; gap: 3px; margin-bottom: 12px;
    background: rgba(0,0,0,0.14); border-radius: 11px; padding: 3px;
  }
  .pet-tab-btn {
    flex: 1; padding: 6px 2px; border-radius: 8px; border: none;
    font-size: 11px; font-weight: 700; color: var(--hint);
    background: transparent; cursor: pointer; touch-action: manipulation;
    transition: all 0.15s; font-family: 'Geist', system-ui, sans-serif;
    white-space: nowrap; overflow: hidden;
  }
  .pet-tab-btn.active { background: var(--secondary-bg); color: var(--text); box-shadow: 0 1px 5px rgba(0,0,0,0.14); }
  .pet-tab-btn:active { transform: scale(0.94); }

  /* achievements */
  .pet-rel-bonus-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 8px;
    background: rgba(255,200,60,0.15); color: #c8960a;
    margin-bottom: 7px;
  }
  [data-theme="dark"] .pet-rel-bonus-badge,
  [data-theme="frost"] .pet-rel-bonus-badge,
  [data-theme="ember"] .pet-rel-bonus-badge,
  [data-theme="violet_dream"] .pet-rel-bonus-badge { color: #f5c842; background: rgba(245,200,66,0.18); }
  .pet-rel-bonus-label { font-weight: 400; opacity: 0.75; }

  .pet-achievements-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .pet-achievement {
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 7px; background: rgba(124,108,255,0.10); color: var(--ci-accent);
  }

  /* food shop tab */
  .pet-food-intro { font-size: 11px; color: var(--hint); margin-bottom: 8px; text-align: center; }
  .pet-food-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pet-food-grid > .pet-food-item:last-child:nth-child(odd) { grid-column: 1 / -1; }
  .pet-food-item {
    background: var(--secondary-bg); border-radius: 12px;
    padding: 10px 8px 8px; text-align: center;
    border: 1.5px solid var(--ci-border); position: relative;
  }
  .pet-food-item.on-cd { opacity: 0.55; }
  .pet-food-emoji { font-size: 28px; line-height: 1.2; margin-bottom: 2px; }
  .pet-food-name { font-size: 12px; font-weight: 700; }
  .pet-food-bonus { font-size: 10px; color: var(--ci-accent); font-weight: 600; margin-top: 1px; }
  .pet-food-buy {
    margin-top: 6px; width: 100%; border: none; border-radius: 8px; padding: 6px 2px;
    font-size: 11.5px; font-weight: 800;
    background: rgba(255,149,0,0.13); color: var(--orange);
    cursor: pointer; transition: transform 0.12s, opacity 0.18s;
    font-family: 'Geist', system-ui, sans-serif; touch-action: manipulation;
  }
  .pet-food-buy:active:not(:disabled) { transform: scale(0.92); }
  .pet-food-buy:disabled { opacity: 0.32; cursor: default; }

  /* skills tab */
  .pet-skill-intro { font-size: 11px; color: var(--hint); margin-bottom: 8px; text-align: center; }
  .pet-skill-list { display: flex; flex-direction: column; gap: 8px; }
  .pet-skill-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--secondary-bg); border-radius: 12px; padding: 10px 12px;
  }
  .pet-skill-emoji { font-size: 22px; flex-shrink: 0; }
  .pet-skill-body { flex: 1; min-width: 0; }
  .pet-skill-name { font-size: 12.5px; font-weight: 700; }
  .pet-skill-desc { font-size: 10.5px; color: var(--hint); margin-top: 1px; line-height: 1.3; }
  .pet-skill-dots { display: flex; gap: 4px; margin-top: 5px; }
  .pet-skill-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(120,120,128,0.2); }
  .pet-skill-dot.filled { background: var(--ci-accent); }
  .pet-skill-upg-btn {
    border: none; border-radius: 9px; padding: 7px 10px;
    font-size: 11px; font-weight: 800; flex-shrink: 0;
    background: rgba(124,108,255,0.14); color: var(--ci-accent);
    cursor: pointer; transition: all 0.14s; white-space: nowrap;
    font-family: 'Geist', system-ui, sans-serif; touch-action: manipulation;
  }
  .pet-skill-upg-btn:active:not(:disabled):not(.maxed) { transform: scale(0.92); }
  .pet-skill-upg-btn:disabled { opacity: 0.32; cursor: default; }
  .pet-skill-upg-btn.maxed { background: rgba(52,199,89,0.12); color: var(--green); cursor: default; opacity: 1; }

  /* leaderboard tab */
  .pet-top-intro { font-size: 11px; color: var(--hint); margin-bottom: 8px; text-align: center; }

<body>
  <div class="header" id="appHeader">
    <div class="avatar-ring" id="headerAvatar">📊</div>
    <h1 id="greeting">Моя статистика</h1>

    <div class="header-actions" id="headerActions" style="display:none">
      <button class="header-refresh" id="refreshBtn">
        <span class="refresh-icon">↻</span> Обновить
      </button>
    </div>
  </div>

  <div id="content">
    <div class="cards skeleton">
      <div class="card"><span class="icon">💬</span><div class="value">—</div><div class="label">Сообщений</div></div>
      <div class="card"><span class="icon">👥</span><div class="value">—</div><div class="label">Собеседников</div></div>
      <div class="card"><span class="icon">✏️</span><div class="value">—</div><div class="label">Правок</div></div>
      <div class="card"><span class="icon">🗑</span><div class="value">—</div><div class="label">Удалений</div></div>
    </div>
  </div>

  <div id="casinoContent"   style="display:none"></div>
  <div id="donateContent"   style="display:none"></div>
  <div id="questContent"    style="display:none"></div>
  <div id="shopContent"     style="display:none"></div>

  <!-- kept for JS compat, hidden via CSS -->
  <button class="refresh-fab" id="refreshFabLegacy" style="display:none"></button>

  <!-- SVG filter for liquid glass lens distortion -->
  <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden;">
    <defs>
      <filter id="liquid-glass-filter" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.028 0.055" numOctaves="3" seed="8" result="noise"/>
        <feGaussianBlur in="noise" stdDeviation="1.2" result="smoothNoise"/>
        <feDisplacementMap in="SourceGraphic" in2="smoothNoise" scale="14" xChannelSelector="R" yChannelSelector="G" result="distorted"/>
        <feGaussianBlur in="distorted" stdDeviation="0.6" result="softDistorted"/>
        <feComposite in="softDistorted" in2="SourceGraphic" operator="atop"/>
      </filter>
    </defs>
  </svg>

  <nav class="bottom-tab-bar" id="mainTabBar">
    <!-- Liquid glass lens wave texture layer -->
    <div class="tab-bar-lens" aria-hidden="true"></div>
    <!-- Sliding glass pill indicator -->

    <!-- Limelight beacon (top edge glow + beam) -->
    <div class="tab-limelight" id="tabLimelight" aria-hidden="true">
      <div class="tab-limelight-beam" id="tabLimelightBeam"></div>
    </div>

    <button class="tab-item active" data-tab="stats">

    </button>

    </button>

      <div class="tab-icon-wrap">🏆</div>
      <span class="tab-label">Рейтинг</span>
    </button>
    <button class="tab-item tab-donate" data-tab="donate">
      <div class="tab-icon-wrap">💎</div>
      <span class="tab-label">Поддержать</span>
    </button>
    <button class="tab-item tab-shop" data-tab="shop">
      <div class="tab-icon-wrap" style="position:relative">🛒<span style="position:absolute;top:-4px;right:-8px;font-size:8px;font-weight:800;background:#f59e0b;color:#fff;border-radius:4px;padding:1px 3px;letter-spacing:0.3px;line-height:1.4">BETA</span></div>
      <span class="tab-label">Магазин</span>
    </button>
  </nav>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let lastStats = null;
    let lastActivity = {};
    let sortMode = "messages";
    let searchQuery = "";
    let currentInitData = "";
    let currentTab = "stats";
    let walletData = null;
    let casinoLoaded = false;
    let questsLoaded = false;
    let questData    = null;
    let lbData       = null;
    let petData      = null;
    let subData      = null;   // subscription config + user status
    let statsPremium = false;  // whether user has active subscription (from stats API)

    // ── Casino game state ─────────────────────────────────────────────────────
    let currentCasinoGame = "slots";   // persists across renderCasino() calls
    let minesCount     = 5;
    let minesBet       = 50;
    let minesGameActive   = false;
    let minesRevealedCount = 0;
    let crashGameActive   = false;
    let lastRelationships = {};   // partner_id → rel dict from /api/relationships/list
    let crashMultiplier   = 1.0;
    let crashPointAt      = Infinity;  // server-side crash point received on start
    let crashAnimFrame    = null;
    let crashStartTime    = null;
    let crashLastPathT    = 0;         // throttle SVG path updates
    let crashHistory      = [];        // [{crash_at}] last 10 today
    let crashAutoBet      = false;     // auto-restart after each round
    let crashAutoCashoutAt = 0;        // 0 = off; >1 = auto-cashout target
    let crashCashedOut    = false;     // user cashed out, rocket still flying (FOMO)
    let crashCashedOutMult = 0;        // multiplier at the moment of cashout
    let crashCashedOutPayout = 0;      // payout already credited
    let crashAutoBetTimer = null;      // setTimeout for auto-bet delay
    let crashCurrentBet   = 50;        // bet amount of the current/last round
    let selectedSubPlan   = "quarter"; // default plan key for Premium purchase
    let selectedVipPlan   = "vip_quarter"; // default VIP plan
    let selectedSubTier   = "premium"; // "premium" | "vip"
    let crashRocketAngle  = 45;        // current smoothed angle (°, standard math: 0=right, 90=up)
    let crashPrevSvgX     = null;      // previous SVG X for tangent calc
    let crashPrevSvgY     = null;      // previous SVG Y for tangent calc
    let lastWords  = null;     // /app/api/stats/words response
    let lastDigest = null;     // /app/api/stats/digest response
    const FREE_TOP_LIMIT = 5;  // free users see top N contacts
    const SPIN_SYMBOLS  = ["🍒","🍋","🍊","🍇","⭐","💎"];
    const SPIN_WEIGHTS  = [35, 25, 20, 12, 6, 2];
    let   slotsBet      = 10;

    function _randSym() {
      let r = Math.random() * 100;
      for (let i = 0; i < SPIN_SYMBOLS.length; i++) {
        r -= SPIN_WEIGHTS[i];
        if (r <= 0) return SPIN_SYMBOLS[i];
      }
      return SPIN_SYMBOLS[0];
    }

    // Build a 5-symbol strip HTML with `mid` centered at index 2
    function _strip5(mid) {
      return [_randSym(), _randSym(), mid, _randSym(), _randSym()]
        .map(s=>`<div class="slot-sym">${s}</div>`).join("");
    }

    function selectSlotsBet(v) {
      slotsBet = v;
      document.querySelectorAll('.slots-bet-chip').forEach(c => {
        c.classList.toggle('active', parseInt(c.dataset.bet) === v);
      });
      const sb = document.getElementById('spinBtn');
      if (sb && !sb.disabled) sb.textContent = `🎰 Крутить — ${v} 🪙`;
    }

    const AVATAR_COLORS = ["#FF6B6B","#4ECDC4","#45AAF2","#F7B731","#A55EEA","#26DE81","#FD9644","#2BCBBA"];

    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function colorFor(seed) {
      let h = 0;
      for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
      return AVATAR_COLORS[h % AVATAR_COLORS.length];
    }

    function initials(name) {
      const parts = name.trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "?";
      if (parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function medal(rank) {
      if (rank === 0) return "🥇";
      if (rank === 1) return "🥈";
      if (rank === 2) return "🥉";
      return String(rank + 1);
    }

    function timeAgo(iso) {
      if (!iso) return "нет данных";
      const diff = Date.now() - new Date(iso).getTime();
      const min = Math.floor(diff / 60000);
      if (min < 1) return "только что";
      if (min < 60) return `${min} мин назад`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr} ч назад`;
      const days = Math.floor(hr / 24);
      if (days < 30) return `${days} дн назад`;
      return new Date(iso).toLocaleDateString("ru-RU");
    }

    // Returns UTC date string "YYYY-MM-DD" for right now
    function todayUTC() {
      return new Date().toISOString().slice(0, 10);
    }
    function yesterdayUTC() {
      const d = new Date();
      d.setUTCDate(d.getUTCDate() - 1);
      return d.toISOString().slice(0, 10);
    }

    // Is the streak alive but last message was yesterday → at risk of breaking today
    function isAtRisk(streak_days, last_message_at) {
      if (!streak_days || streak_days < 1 || !last_message_at) return false;
      const lastDate = new Date(last_message_at).toISOString().slice(0, 10);
      return lastDate === yesterdayUTC();
    }

    // Streak level: 0=none,1=warm(2-3),2=hot(4-6),3=blaze(7-29),4=legend(30+)
    function streakLevel(days) {
      if (days < 2)  return 0;
      if (days < 4)  return 1;
      if (days < 7)  return 2;
      if (days < 30) return 3;
      return 4;
    }

    function streakEmoji(level) {
      return ["","🔥","🔥","🔥","💎"][level] || "";
    }

    function streakLevelClass(level) {
      return ["","s-warm","s-hot","s-blaze","s-legend"][level] || "";
    }

    function streakBannerClass(level) {
      return ["","level-warm","level-hot","level-blaze","level-legend"][level] || "";
    }

    // ── Streak Banner ──
    // Uses global best_streak/best_streak_name from API (computed across ALL chats, not just top_n).
    function renderStreakBanner(stats) {
      const days = stats.best_streak || 0;
      if (days < 2) return "";

      // Find last_message_at for the best-streak person (may be in top_interlocutors)
      const bestInList = stats.top_interlocutors
        .filter(s => s.streak_days === days)
        .sort((a, b) => b.streak_days - a.streak_days)[0];
      const lastAt = bestInList ? bestInList.last_message_at : null;
      const atRisk = lastAt ? isAtRisk(days, lastAt) : false;

      const level = streakLevel(days);
      const bannerClass = streakBannerClass(level);
      const fire = level >= 4 ? "💎" : "🔥";
      const name = stats.best_streak_name || "";
      const riskBadge = atRisk ? `<span class="streak-at-risk-badge">⚡ Горит сегодня</span>` : "";

      return `
        <div class="streak-banner ${bannerClass}${atRisk ? " at-risk" : ""}" style="animation-delay:0.04s">
          <div class="streak-fire">${fire}</div>
          <div class="streak-info">
            <div class="streak-days">${days}</div>
            <div class="streak-label">${plural(days, "день", "дня", "дней")} подряд</div>
            ${name ? `<div class="streak-name">с ${name}</div>` : ""}
          </div>
          ${riskBadge}
        </div>
      `;
    }

    function plural(n, one, few, many) {
      const mod10 = n % 10, mod100 = n % 100;
      if (mod100 >= 11 && mod100 <= 14) return many;
      if (mod10 === 1) return one;
      if (mod10 >= 2 && mod10 <= 4) return few;
      return many;
    }

    // ── Stats Cards (Variant A: KPI + Health bars + Content split) ──

    // ── Heatmap ──
    function renderHeatmap(activity) {
      const days = 91;
      const today = new Date(); today.setHours(0,0,0,0);
      const counts = [];
      let maxCount = 0;
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0,10);
        const count = activity[key] || 0;
        counts.push({ date: d, count });
        if (count > maxCount) maxCount = count;
      }
      function levelFor(c) {
        if (c === 0) return 0;
        if (maxCount <= 1) return 4;
        const r = c / maxCount;
        if (r > 0.75) return 4;
        if (r > 0.5)  return 3;
        if (r > 0.25) return 2;
        return 1;
      }
      const cells = counts.map(c =>
        `<div class="heat-cell level-${levelFor(c.count)}" title="${c.date.toLocaleDateString("ru-RU")}: ${c.count} сообщ."></div>`
      ).join("");

      const fullHeatmap = `
        <div class="heatmap-card">
          <div class="heatmap-grid">${cells}</div>
          <div class="heatmap-legend">
            <span>Меньше</span>
            <div class="heat-cell level-0"></div>
            <div class="heat-cell level-1"></div>
            <div class="heat-cell level-2"></div>
            <div class="heat-cell level-3"></div>
            <div class="heat-cell level-4"></div>
            <span>Больше</span>
          </div>
        </div>`;

      if (!statsPremium) {
        // Render real grid blurred, overlay premium gate
        const blurCells = counts.map(c =>
          `<div class="heat-cell level-${levelFor(c.count)}"></div>`
        ).join("");
        return `
          <div class="section-title">🗓 Активность за 90 дней</div>
          <div class="premium-gate-wrapper">
            <div class="heatmap-card premium-gate-blur" aria-hidden="true">
              <div class="heatmap-grid">${blurCells}</div>
            </div>
            <div class="premium-gate-overlay">
              <div class="premium-gate-icon">📅</div>
              <div class="premium-gate-title">История активности</div>
              <div class="premium-gate-desc">90 дней переписки в одном графике</div>
              <button class="premium-gate-btn" data-premium-action="subscribe">⭐ Открыть с Premium</button>
            </div>
          </div>`;
      }

      return `
        <div class="section-title">🗓 Активность за 90 дней</div>
        ${fullHeatmap}
      `;
    }

    // ── Top interlocutors ──
    function getSorted(list) {
      const filtered = searchQuery
        ? list.filter(s => s.display_name.toLowerCase().includes(searchQuery) || (s.username||"").toLowerCase().includes(searchQuery))
        : list.slice();
      const sorters = {
        messages: (a,b) => b.message_count - a.message_count,
        recent:   (a,b) => new Date(b.last_message_at||0) - new Date(a.last_message_at||0),
        streaks:  (a,b) => b.streak_days - a.streak_days || b.longest_streak - a.longest_streak,
        edited:   (a,b) => b.edited_count - a.edited_count,
      };
      return filtered.sort(sorters[sortMode] || sorters.messages);
    }

    function renderStreakBadge(s) {
      const level = streakLevel(s.streak_days);
      if (level === 0) return "";
      const cls = streakLevelClass(level);
      const emoji = streakEmoji(level);
      const atRisk = isAtRisk(s.streak_days, s.last_message_at);
      const riskMark = atRisk ? "⚡" : "";
      return `<div class="row-streak-badge ${cls}">${emoji}${riskMark} ${s.streak_days} дн</div>`;
    }

    function _relTierCls(type) {
      return { friends: "rel-friends", dating: "rel-dating", married: "rel-married" }[type] || "";
    }
    function _relTierLabel(type) {
      return { friends: "💛 Друзья", dating: "❤️ Отношения", married: "💍 Брак" }[type] || type;
    }
    function _esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    async function fetchRelationships() {
      const initData = tg ? tg.initData : currentInitData;
      if (!initData) return;
      try {
        const res = await fetch("/app/api/relationships/list", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ initData }),
        });
        if (!res.ok) return;
        const data = await res.json();
        lastRelationships = {};
        for (const r of (data.relationships || [])) lastRelationships[r.partner_id] = r;
      } catch {}
    }

    function renderPendingRelRequests() {
      const pending = Object.values(lastRelationships).filter(r => r.status === "pending" && !r.is_initiator);
      if (!pending.length) return "";
      const rows = pending.map(r => {
        const nm = _esc(r.partner_name || `#${r.partner_id}`);
        const av = nm.replace(/[^А-ЯA-Z]/gi, "").slice(0, 2).toUpperCase() || nm.slice(0, 2).toUpperCase();
        const bg = colorFor(r.partner_name || String(r.partner_id));
        return `
          <div class="rel-pending-row">
            <div class="avatar" style="background:${bg};width:36px;height:36px;line-height:36px;font-size:14px;flex-shrink:0">${av}</div>

            </div>

            <button class="rel-decline-btn" data-rel-respond="${r.partner_id}" data-accept="false">✗</button>

      overlay.querySelector("#rBtnDecline")?.addEventListener("click", () =>
        relAction("/app/api/relationships/respond", { accept: false }, () => toastMessage("Запрос отклонён.")));
      overlay.querySelector("#rBtnGift")?.addEventListener("click", () =>
        relAction("/app/api/relationships/gift", {}, () => toastMessage("🎁 Подарок отправлен! +100 XP обоим.")));
      overlay.querySelector("#rBtnUpgrade")?.addEventListener("click", () =>
        relAction("/app/api/relationships/upgrade", {}, d => toastMessage(`🎉 Теперь вы: ${_relTierLabel(d.rel_type)}!`)));
