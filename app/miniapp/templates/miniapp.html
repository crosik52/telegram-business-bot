    }

    function renderTop(stats) {
      if (!stats.top_interlocutors.length) {
        return `<div class="empty"><span class="big-emoji">💬</span>Пока нет сообщений для статистики.<br>Как только в подключённом Business-чате появятся сообщения — здесь будет топ собеседников.</div>`;
      }

      // Free users can only sort by messages
      const lockedSorts = ["streaks", "recent", "edited"];
      if (!statsPremium && lockedSorts.includes(sortMode)) sortMode = "messages";

      const sorted = getSorted(stats.top_interlocutors);
      const max = Math.max(...stats.top_interlocutors.map(s => s.message_count), 1);

      const sortTabHtml = (key, label) => {
        const isActive  = sortMode === key;
        const isLocked  = !statsPremium && lockedSorts.includes(key);
        const cls = [isActive ? "active" : "", isLocked ? "sort-locked" : ""].filter(Boolean).join(" ");
        const lockAttr = isLocked ? `data-premium-action="subscribe"` : `data-sort="${key}"`;
        return `<button ${lockAttr} class="${cls}">${label}${isLocked ? " ⭐" : ""}</button>`;
      };

      const controls = `
        <div class="search-box">
          <span>🔍</span>
          <input id="searchInput" type="text" placeholder="Найти собеседника…" value="${searchQuery}" />
        </div>
        <div class="segmented" id="sortTabs">
          ${sortTabHtml("messages", "По сообщениям")}
          ${sortTabHtml("streaks",  "🔥 По серии")}
          ${sortTabHtml("recent",   "По активности")}
          ${sortTabHtml("edited",   "По правкам")}
        </div>
      `;

      if (!sorted.length) {
        return controls + `<div class="empty"><span class="big-emoji">🔎</span>Никого не нашлось.</div>`;
      }

      // Limit visible rows for free users
      const visibleSorted = statsPremium ? sorted : sorted.slice(0, FREE_TOP_LIMIT);
      const hiddenCount   = sorted.length - visibleSorted.length;

      const rows = visibleSorted.map((s, i) => {
        const pct = max > 0 ? Math.max(5, Math.round((s.message_count / max) * 100)) : 0;
        const sub = s.username ? "@" + s.username : "личный контакт";
        const chips = [];
        if (s.mutual_connected) chips.push(`<span class="chip mutual">🤝 взаимный</span>`);
        if (s.edited_count)  chips.push(`<span class="chip edited">✏️ ${s.edited_count}</span>`);
        if (s.deleted_count) chips.push(`<span class="chip deleted">🗑 ${s.deleted_count}</span>`);
        const atRisk = isAtRisk(s.streak_days, s.last_message_at);
        if (atRisk) chips.push(`<span class="chip at-risk">⚡ серия горит</span>`);

        const longestNote = (s.longest_streak > s.streak_days && s.longest_streak > 2)
          ? `<span class="chip">💎 рекорд ${s.longest_streak} дн</span>` : "";

        // Relationship chip
        const _rel = lastRelationships[s.chat_id];
        if (_rel) {
          if (_rel.status === "active") {
            chips.push(`<span class="chip ${_relTierCls(_rel.rel_type)}">${_relTierLabel(_rel.rel_type)} Ур.${_rel.level}</span>`);
          } else if (_rel.status === "pending") {
            chips.push(`<span class="chip" style="color:var(--orange)">${_rel.is_initiator ? "💌 ожидание" : "💌 ответить"}</span>`);
          }
        }

        const gameBtn = s.mutual_connected
          ? `<button class="game-btn" data-game-chat="${s.chat_id}" data-game-name="${s.display_name}">🎮 Игра</button>`
          : "";
        const remindBtn = "";
        const relBtn = s.mutual_connected
          ? `<button class="rel-btn" data-rel-open="${s.chat_id}" data-rel-name="${s.display_name}">❤️ Отношения</button>`
          : "";
        const aiBtn = `<button class="ai-btn" data-ai-chat="${s.chat_id}" data-ai-name="${s.display_name}">🤖 Анализ</button>`;

        return `
          <div class="row clickable" data-chat-id="${s.chat_id}"${s.username ? ` data-username="${s.username}"` : ""}>
            <div class="rank">${medal(i)}</div>
            <div class="avatar" style="background:${colorFor(s.display_name)}">${initials(s.display_name)}</div>
            <div class="row-main">
              <div class="row-name">${s.display_name}</div>
              <div class="row-sub">
                <span>${sub}</span>
                <span class="chip">${timeAgo(s.last_message_at)}</span>
                ${chips.join("")}
                ${longestNote}
              </div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
              <div class="row-action-btns">
                ${gameBtn}${remindBtn}${relBtn}${aiBtn}
              </div>
            </div>
            <div class="row-right">
              <div class="row-count">${s.message_count}</div>
              ${renderStreakBadge(s)}
            </div>
            <div class="row-chevron">›</div>
          </div>
        `;
      }).join("");

      // Premium gate row for hidden contacts
      const premiumMoreHtml = (!statsPremium && hiddenCount > 0) ? `
        <div class="premium-more-row" data-premium-action="subscribe">
          <div>
            <div class="premium-more-text">⭐ Ещё ${hiddenCount} ${hiddenCount === 1 ? "собеседник" : hiddenCount < 5 ? "собеседника" : "собеседников"}</div>
            <div class="premium-more-hint">Полный список доступен с Premium</div>
          </div>
          <button class="premium-gate-chip" data-premium-action="subscribe">Открыть</button>
        </div>` : "";

      const totalShown = visibleSorted.length;
      const totalAll   = stats.top_interlocutors.length;
      return `
        ${controls}
        ${renderPendingRelRequests()}
        <div class="section-title">🏆 Топ собеседников <span class="sub">${totalShown}${!statsPremium && hiddenCount > 0 ? " из " + totalAll : " из " + totalAll}</span></div>
        <div class="list">${rows}</div>
        ${premiumMoreHtml}
        <button class="share-btn" id="shareBtn">📋 Скопировать сводку</button>
        <button class="share-btn" id="downloadCardBtn">🖼 Скачать карточку</button>
      `;
    }

    function attachTopHandlers() {
      const input = document.getElementById("searchInput");
      if (input) {
        input.addEventListener("input", (e) => {
          searchQuery = e.target.value.toLowerCase();
          const caret = e.target.selectionStart;
          renderContent();
          const newInput = document.getElementById("searchInput");
          if (newInput) { newInput.focus(); newInput.setSelectionRange(caret, caret); }
        });
      }
      document.querySelectorAll("#sortTabs button[data-sort]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (tg && tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
          sortMode = btn.dataset.sort;
          renderContent();
        });
      });
      document.querySelectorAll(".row.clickable").forEach(row => {
        row.addEventListener("click", (e) => {
          // Ignore clicks on action buttons inside the row
          if (e.target.closest("button")) return;
          if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
          const chatId = parseInt(row.dataset.chatId);
          const contact = lastStats?.top_interlocutors?.find(c => c.chat_id === chatId);
          if (contact) openContactProfile(contact);
        });
      });
      document.querySelectorAll(".game-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          openGamePicker(btn.dataset.gameChat, btn.dataset.gameName);
        });
      });
      document.querySelectorAll(".ai-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          openAiAnalysisModal(parseInt(btn.dataset.aiChat), btn.dataset.aiName || "Собеседник");
        });
      });
      // ── Relationship buttons ──────────────────────────────────────────────
      document.querySelectorAll("[data-rel-open]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          openRelModal(parseInt(btn.dataset.relOpen), btn.dataset.relName || "Собеседник");
        });
      });
      // Inline accept/decline of pending requests (in pending block)
      document.querySelectorAll("[data-rel-respond]").forEach(btn => {
        btn.addEventListener("click", async e => {
          e.stopPropagation();
          if (btn.disabled) return;
          btn.disabled = true;
          const partnerId = parseInt(btn.dataset.relRespond);
          const accept    = btn.dataset.accept === "true";
          const initData  = tg ? tg.initData : currentInitData;
          try {
            const res = await fetch("/app/api/relationships/respond", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ initData, partnerId, accept }),
            });
            const d = await res.json();
            if (res.ok) {
              lastRelationships[partnerId] = d;
              toastMessage(accept ? "💛 Вы теперь друзья!" : "Запрос отклонён.");
              await fetchRelationships();
              renderContent();
            } else {
              toastMessage("Ошибка, попробуй снова");
              btn.disabled = false;
            }
          } catch { btn.disabled = false; toastMessage("Ошибка, попробуй снова"); }
        });
      });
      const shareBtn = document.getElementById("shareBtn");
      if (shareBtn) shareBtn.addEventListener("click", copySummary);
      const dlBtn = document.getElementById("downloadCardBtn");
      if (dlBtn) dlBtn.addEventListener("click", downloadShareCard);
    }

    function renderContent() {
      const el = document.getElementById("content");
      if (!lastStats) return;
      statsPremium = lastStats.is_premium || false;
      el.innerHTML =
        renderStreakBanner(lastStats) +
        renderCards(lastStats) +
        renderHeatmap(lastActivity) +
        renderDigest(lastDigest) +
        renderWordsCloud(lastWords) +
        renderBadges(lastStats.badges) +
        renderTop(lastStats);
      attachTopHandlers();
      attachPremiumGateHandlers();
    }

    function attachPremiumGateHandlers() {
      document.querySelectorAll("[data-premium-action='subscribe']").forEach(el => {
        el.addEventListener("click", (e) => {
          e.stopPropagation();
          if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
          switchMainTab("donate");
          // Give donate tab time to render, then scroll to subscription banner
          setTimeout(() => {
            const subBanner = document.querySelector(".sub-banner");
            if (subBanner) subBanner.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 300);
        });
      });
    }

    // ── Share card (Canvas) ──
    function downloadShareCard() {
      if (!lastStats) return;
      const W = 900, H = 1280;
      const canvas = document.createElement("canvas");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");

      // ── helpers ────────────────────────────────────────────────────────────
      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
      }
      function fmt(n) {
        if (n >= 1000000) return (n/1000000).toFixed(1) + "M";
        if (n >= 1000) return (n/1000).toFixed(1) + "K";
        return String(n);
      }

      // ── background ─────────────────────────────────────────────────────────
      ctx.fillStyle = "#0e0e10";
      ctx.fillRect(0, 0, W, H);

      // subtle top-left glow
      const gA = ctx.createRadialGradient(160, 160, 0, 160, 160, 420);
      gA.addColorStop(0, "rgba(88,86,214,0.22)"); gA.addColorStop(1, "transparent");
      ctx.fillStyle = gA; ctx.fillRect(0, 0, W, H);

      // subtle bottom-right glow
      const gB = ctx.createRadialGradient(W - 100, H - 180, 0, W - 100, H - 180, 380);
      gB.addColorStop(0, "rgba(10,132,255,0.18)"); gB.addColorStop(1, "transparent");
      ctx.fillStyle = gB; ctx.fillRect(0, 0, W, H);

      // ── top accent bar ─────────────────────────────────────────────────────
      const barGrad = ctx.createLinearGradient(60, 0, W - 60, 0);
      barGrad.addColorStop(0, "#5856d6");
      barGrad.addColorStop(1, "#0a84ff");
      ctx.fillStyle = barGrad;
      roundRect(60, 56, W - 120, 5, 3);
      ctx.fill();

      // ── header ─────────────────────────────────────────────────────────────
      ctx.textAlign = "left";
      ctx.fillStyle = "#ffffff";
      ctx.font = "700 54px -apple-system, sans-serif";
      ctx.fillText("Моя статистика", 60, 154);

      ctx.font = "400 27px -apple-system, sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.45)";
      ctx.fillText("SaveLog · Telegram Business Bot", 60, 196);

      // streak badge
      const streak = lastStats.best_streak || 0;
      if (streak >= 2) {
        const sLabel = `🔥 ${streak} ${streak === 1 ? "день" : streak < 5 ? "дня" : "дней"} подряд`;
        ctx.font = "600 26px -apple-system, sans-serif";
        const sW = ctx.measureText(sLabel).width + 36;
        ctx.fillStyle = "rgba(255,107,0,0.18)";
        roundRect(60, 220, sW, 48, 24); ctx.fill();
        ctx.strokeStyle = "rgba(255,107,0,0.45)"; ctx.lineWidth = 1.5;
        roundRect(60, 220, sW, 48, 24); ctx.stroke();
        ctx.fillStyle = "#ff6b00"; ctx.textAlign = "left";
        ctx.fillText(sLabel, 60 + 18, 252);
      }

      // ── stat cards (2×2 grid) ───────────────────────────────────────────────
      const statData = [
        { emoji: "💬", value: fmt(lastStats.total_messages   || 0), label: "Сообщений",    accent: "#0a84ff" },
        { emoji: "👥", value: fmt(lastStats.total_chats       || 0), label: "Собеседников", accent: "#5856d6" },
        { emoji: "✏️", value: fmt(lastStats.edited_messages  || 0), label: "Правок",       accent: "#30d158" },
        { emoji: "🗑️", value: fmt(lastStats.deleted_messages || 0), label: "Удалений",    accent: "#ff453a" },
      ];
      const cardW = 380, cardH = 190, cardGap = 20;
      const cardStartX = 60, cardStartY = 300;
      statData.forEach((s, i) => {
        const col = i % 2, row = Math.floor(i / 2);
        const cx = cardStartX + col * (cardW + cardGap);
        const cy = cardStartY + row * (cardH + cardGap);

        // card background
        ctx.fillStyle = "#1c1c1e";
        roundRect(cx, cy, cardW, cardH, 20); ctx.fill();

        // top-left accent dot
        ctx.fillStyle = s.accent;
        ctx.beginPath(); ctx.arc(cx + 30, cy + 30, 8, 0, Math.PI * 2); ctx.fill();

        // emoji
        ctx.font = "48px sans-serif"; ctx.textAlign = "left";
        ctx.fillText(s.emoji, cx + 24, cy + 90);

        // big number
        ctx.fillStyle = "#ffffff";
        ctx.font = "700 64px -apple-system, sans-serif";
        ctx.fillText(s.value, cx + 24, cy + 156);

        // label
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.font = "400 24px -apple-system, sans-serif";
        ctx.fillText(s.label, cx + cardW - ctx.measureText(s.label).width - 20, cy + cardH - 20);
      });

      // ── top contacts section ────────────────────────────────────────────────
      const top = (lastStats.top_interlocutors || []).slice(0, 3);
      let ty = cardStartY + 2 * (cardH + cardGap) + 52;

      if (top.length) {
        ctx.fillStyle = "rgba(255,255,255,0.12)";
        ctx.fillRect(60, ty - 2, W - 120, 1);
        ty += 42;

        ctx.fillStyle = "#ffffff";
        ctx.font = "700 32px -apple-system, sans-serif"; ctx.textAlign = "left";
        ctx.fillText("🏆  Топ собеседников", 60, ty);
        ty += 52;

        const medals = ["🥇","🥈","🥉"];
        const medalColors = ["rgba(255,215,0,0.15)","rgba(192,192,192,0.12)","rgba(205,127,50,0.12)"];
        const medalBorder = ["rgba(255,215,0,0.4)","rgba(192,192,192,0.3)","rgba(205,127,50,0.3)"];

        top.forEach((s, i) => {
          const rowH = 82;
          ctx.fillStyle = medalColors[i];
          roundRect(60, ty, W - 120, rowH, 16); ctx.fill();
          ctx.strokeStyle = medalBorder[i]; ctx.lineWidth = 1;
          roundRect(60, ty, W - 120, rowH, 16); ctx.stroke();

          ctx.font = "36px sans-serif"; ctx.textAlign = "left";
          ctx.fillText(medals[i], 88, ty + 52);

          ctx.fillStyle = "#ffffff";
          ctx.font = "600 28px -apple-system, sans-serif";
          const name = s.display_name.length > 22 ? s.display_name.slice(0, 21) + "…" : s.display_name;
          ctx.fillText(name, 148, ty + 52);

          const streak_info = s.streak_days >= 2 ? `  🔥${s.streak_days}` : "";
          ctx.fillStyle = "rgba(255,255,255,0.45)";
          ctx.font = "400 24px -apple-system, sans-serif";
          const countLabel = `${fmt(s.message_count)} сообщ.${streak_info}`;
          ctx.fillText(countLabel, W - 60 - ctx.measureText(countLabel).width - 30, ty + 52);

          ty += rowH + 14;
        });
      }

      // ── footer ─────────────────────────────────────────────────────────────
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.fillRect(60, H - 80, W - 120, 1);

      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.font = "400 22px -apple-system, sans-serif";
      ctx.fillText("t.me/SaveLogBot", 60, H - 36);

      ctx.textAlign = "right";
      ctx.fillText(new Date().toLocaleDateString("ru-RU"), W - 60, H - 36);

      canvas.toBlob(blob => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "my-stats.png";
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        toastMessage("Карточка сохранена");
      }, "image/png");
    }

    // ── Game picker ──
    const GAMES = [
      {emoji:"🎲",label:"Кубик"},{emoji:"🎯",label:"Дартс"},{emoji:"🏀",label:"Баскетбол"},
      {emoji:"⚽",label:"Футбол"},{emoji:"🎳",label:"Боулинг"},{emoji:"🎰",label:"Слоты"},
    ];

    function openGamePicker(chatId, name) {
      const overlay = document.createElement("div");
      overlay.className = "game-overlay";
      overlay.innerHTML = `
        <div class="game-sheet">
          <div class="game-sheet-title">🎮 Отправить игру — ${name}</div>
          <div class="game-grid">
            ${GAMES.map(g => `<button class="game-pick" data-emoji="${g.emoji}"><span class="game-pick-emoji">${g.emoji}</span><span>${g.label}</span></button>`).join("")}
          </div>
          <button class="game-cancel">Отмена</button>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector(".game-cancel").addEventListener("click", () => overlay.remove());
      overlay.querySelectorAll(".game-pick").forEach(btn => {
        btn.addEventListener("click", async () => { overlay.remove(); await sendGame(chatId, btn.dataset.emoji); });
      });
    }

    // ── Contact Profile Card ──────────────────────────────────────────────────
    const _CP_FRAME_STYLES = {
      "none":    "linear-gradient(135deg, var(--link), #5856d6, var(--green))",
      "stars":   "linear-gradient(135deg, #f5c842, #e8960a, #f5c842)",
      "flowers": "linear-gradient(135deg, #ff6b9d, #c44dff, #ff6b9d)",
      "fire":    "linear-gradient(135deg, #ff4500, #ff8c00, #ff2200)",
      "neon":    "linear-gradient(135deg, #00f5ff, #0080ff, #7b00ff)",
    };

    function openContactProfile(s) {
      if (!s) return;
      const _e  = v => String(v || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const sub = s.username ? "@" + s.username : "личный контакт";
      const rel = lastRelationships?.[s.chat_id];
      const relChip = (rel?.status === "active")
        ? `<span class="chip ${_relTierCls(rel.rel_type)}">${_relTierLabel(rel.rel_type)} Ур.${rel.level}</span>`
        : "";

      const frameStyle = _CP_FRAME_STYLES["none"];

      const overlay = document.createElement("div");
      overlay.className = "cp-overlay";
      overlay.innerHTML = `
        <button class="cp-close-btn" id="cpCloseBtn">✕</button>
        <div class="cp-sheet">
          <div class="cp-avatar-wrap" id="cpAvatarWrap" style="background:${frameStyle}">
            <div class="cp-avatar" style="background:${colorFor(s.display_name)}">${initials(s.display_name)}</div>
          </div>
          <div class="cp-name">${_e(s.display_name)}</div>
          <div class="cp-sub-line">
            <span class="cp-username">${_e(sub)}</span>
            <span id="cpBadge"></span>
            ${relChip}
          </div>
          <div class="cp-stats-grid">
            <div class="cp-stat-card">
              <div class="cp-stat-val">${s.message_count.toLocaleString("ru-RU")}</div>
              <div class="cp-stat-lbl">💬 Сообщений</div>
            </div>
            <div class="cp-stat-card">
              <div class="cp-stat-val">${s.streak_days > 0 ? s.streak_days + " дн" : "—"}</div>
              <div class="cp-stat-lbl">🔥 Серия</div>
            </div>
            <div class="cp-stat-card">
              <div class="cp-stat-val">${s.longest_streak > 1 ? s.longest_streak + " дн" : "—"}</div>
              <div class="cp-stat-lbl">💎 Рекорд</div>
            </div>
            <div class="cp-stat-card">
              <div class="cp-stat-val">${timeAgo(s.last_message_at)}</div>
              <div class="cp-stat-lbl">🕐 Активность</div>
            </div>
          </div>
          ${s.mutual_connected ? '<div class="cp-mutual"><span class="chip mutual">🤝 взаимный</span></div>' : ""}
          <div class="cp-actions">
            ${s.mutual_connected ? `<button class="cp-action-btn" id="cpGameBtn">🎮 Игра</button>` : ""}
            ${s.mutual_connected ? `<button class="cp-action-btn" id="cpRelBtn">❤️ Отношения</button>` : ""}
            <button class="cp-action-btn" id="cpAiBtn">🤖 Анализ</button>
            ${s.username ? `<button class="cp-action-btn cp-action-tg" id="cpTgBtn">✈️ Telegram</button>` : ""}
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      overlay.querySelector("#cpCloseBtn").addEventListener("click", () => overlay.remove());

      overlay.querySelector("#cpGameBtn")?.addEventListener("click", e => {
        e.stopPropagation(); overlay.remove();
        openGamePicker(s.chat_id, s.display_name);
      });
      overlay.querySelector("#cpRelBtn")?.addEventListener("click", e => {
        e.stopPropagation(); overlay.remove();
        openRelModal(parseInt(s.chat_id), s.display_name);
      });

        },

    // All CSS vars we may set inline — cleared on theme reset
    const THEME_VAR_KEYS = [
      '--bg','--secondary-bg','--text','--hint',
      '--link','--button','--button-text',
      '--green','--red','--orange','--shadow',
      '--streak-1','--streak-2','--streak-3','--streak-legendary',
      '--theme-card-bg','--theme-card-border',
    ];

    function applyTheme(theme) {
      const root = document.documentElement;

      // 1. Clear previously injected inline CSS vars
      THEME_VAR_KEYS.forEach(k => root.style.removeProperty(k));
      document.body.style.removeProperty('background');
      document.body.style.removeProperty('color');

      // 2. Clear data-theme (used for tab active colours in CSS)
      root.removeAttribute('data-theme');

      const def = THEME_DEFS[theme];
      if (def) {
        // 3. Inject vars inline on <html> — beats any CSS rule including
        //    Telegram's own inline vars (same layer, declared later = wins)
        Object.entries(def.vars).forEach(([k, v]) => root.style.setProperty(k, v));

        // 4. Force body background + color — defeats Telegram's inline body style
        document.body.style.setProperty('background', def.bodyBg, 'important');
        document.body.style.setProperty('color',      def.bodyColor, 'important');

        // 5. Keep data-theme for CSS-only tab active colour overrides
        root.setAttribute('data-theme', theme);
      }

      try { localStorage.setItem('app_theme', theme || 'default'); } catch (_) {}
    }

    // Apply persisted theme immediately — before any network call or
    // Telegram SDK colour injection
    (function () {
      try {
        const saved = localStorage.getItem('app_theme');
        if (saved && saved !== 'default') applyTheme(saved);
      } catch (_) {}
    })();

    // ── Liquid-glass tab bar: tap + drag-to-slide ────────────────────────
    (function initTabDrag() {
      const bar       = document.getElementById("mainTabBar");
      const slider    = document.getElementById("tabSlider");
      const limelight = document.getElementById("tabLimelight");
      const llBeam    = document.getElementById("tabLimelightBeam");
      const tabItems  = Array.from(bar.querySelectorAll(".tab-item"));

      /* Single neutral style for all tabs — no per-tab rainbow */
      const NEUTRAL = { bg: "rgba(255,255,255,0.18)", shadow: "rgba(255,255,255,0.18)", rgb: "255,255,255" };
      const SLIDER_STYLES = {
        stats: NEUTRAL, casino: NEUTRAL, quests: NEUTRAL, donate: NEUTRAL, shop: NEUTRAL,
      };

      /* Place slider + limelight under/above a given tab element */
      function snapSliderTo(tabEl, instant) {
        if (!tabEl) return;
        const barRect = bar.getBoundingClientRect();
        const tabRect = tabEl.getBoundingClientRect();
        const tab = tabEl.dataset.tab;
        const s   = SLIDER_STYLES[tab] || SLIDER_STYLES.stats;

        // ── Slider pill ──
        const sl   = slider.offsetWidth || 46;
        const left = tabRect.left - barRect.left + (tabRect.width - sl) / 2;
        if (instant) slider.style.transition = "none";
        slider.style.left = left + "px";
        if (instant) { slider.offsetHeight; slider.style.transition = ""; }
        slider.style.background = s.bg;
        slider.style.boxShadow  =
          `0 3px 14px ${s.shadow}, inset 0 1px 0 rgba(255,255,255,0.72),` +
          `inset 0 0 14px rgba(255,255,255,0.24)`;

        // ── Limelight beacon ──
        if (limelight) {
          const llW  = 44;
          const llLeft = tabRect.left - barRect.left + (tabRect.width - llW) / 2;
          if (instant) limelight.style.transition = "none";
          limelight.style.left = llLeft + "px";
          if (instant) { limelight.offsetHeight; limelight.style.transition = ""; }
          limelight.style.background = `rgba(${s.rgb},0.92)`;
          limelight.style.boxShadow  =
            `0 0 10px 1px rgba(${s.rgb},0.75), 0 0 4px rgba(${s.rgb},1)`;
          if (llBeam) {
            llBeam.style.background =
              `linear-gradient(to bottom, rgba(${s.rgb},0.30) 0%, transparent 100%)`;
          }
        }
      }

      /* Initial placement — find active tab */
      const initialActive = bar.querySelector(".tab-item.active") || tabItems[0];
      snapSliderTo(initialActive, true);

      /* Get tab element whose rect contains clientX */
      function tabAtX(x) {
        for (const t of tabItems) {
          const r = t.getBoundingClientRect();
          if (x >= r.left && x <= r.right) return t;
        }
        const barRect = bar.getBoundingClientRect();
        if (x <= barRect.left)  return tabItems[0];
        if (x >= barRect.right) return tabItems[tabItems.length - 1];
        return null;
      }

      let dragging    = false;
      let hoveredTab  = null;
      let startX      = 0;
      let dragStarted = false;

      function clearDragPreviews() {
        tabItems.forEach(t => t.classList.remove("drag-preview"));
      }

      bar.addEventListener("pointerdown", (e) => {
        if (e.button !== 0 && e.pointerType === "mouse") return;
        dragging    = true;
        dragStarted = false;
        startX      = e.clientX;
        hoveredTab  = tabAtX(e.clientX);
        bar.setPointerCapture(e.pointerId);
        /* Slider pulses on touch */
        slider.classList.add("slider-pressed");
      }, { passive: true });

      bar.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        const dx = Math.abs(e.clientX - startX);

        if (!dragStarted && dx > 6) {
          dragStarted = true;
          slider.classList.remove("slider-pressed");
          slider.classList.add("dragging");
          if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
        }

        if (!dragStarted) return;

        const t = tabAtX(e.clientX);
        if (t && t !== hoveredTab) {
          hoveredTab = t;
          clearDragPreviews();
          t.classList.add("drag-preview");
          snapSliderTo(t, true);
          if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }
      });

      function endDrag(e) {
        if (!dragging) return;
        dragging = false;
        slider.classList.remove("slider-pressed", "dragging");
        clearDragPreviews();

        const finalTab = dragStarted ? hoveredTab : tabAtX(e ? e.clientX : startX);
        if (finalTab) {
          switchMainTab(finalTab.dataset.tab);
          snapSliderTo(finalTab, false);
        }
        dragStarted = false;
        hoveredTab  = null;
      }

      bar.addEventListener("pointerup",     endDrag);
      bar.addEventListener("pointercancel", endCancel);

      // Safety net: capture pointerup/cancel at window level so the drag
      // state is always reset even when Telegram WebView swallows the bar event
      window.addEventListener("pointerup",     endDrag,    { passive: true });
      window.addEventListener("pointercancel", endCancel,  { passive: true });

      function endCancel() {
        dragging    = false;
        dragStarted = false;
        slider.classList.remove("slider-pressed", "dragging");
        clearDragPreviews();
        const active = bar.querySelector(".tab-item.active");
        if (active) snapSliderTo(active, false);
      }

      // Click fallback — fires reliably even when pointer events misbehave
      tabItems.forEach(btn => {
        btn.addEventListener("click", () => {
          if (dragStarted) return; // was a real drag, not a tap
          switchMainTab(btn.dataset.tab);
          snapSliderTo(btn, false);
        });
      });

      /* Keep slider in sync when tab is switched from outside (if ever) */
      const _origSwitch = switchMainTab;
      window._tabSwitchHook = (tab) => {
        const el = tabItems.find(t => t.dataset.tab === tab);
        if (el) snapSliderTo(el, false);
      };
    })();

        walletData = await wRes.json();
        petData    = pRes.ok ? await pRes.json() : { pets: [], available_chats: [], feed_cost: 20 };
        casinoLoaded = true;
        renderCasino();
      } catch {
        el.innerHTML = `<div class="error"><span class="big-emoji">⚠️</span>Не удалось загрузить.<br>Попробуй обновить.</div>`;
      }
    }

    function renderCasino() {
      if (!walletData) return;
      // Don't clobber the UI while a game is in progress
      if (minesGameActive || crashGameActive) {
        updateBalanceDisplay(walletData.balance);
        return;
      }
      subData = walletData.subscription || null;
      const el = document.getElementById("casinoContent");
      try {
        el.innerHTML = renderPetsSection() + renderWalletCard()
                     + renderCasinoGamePicker() + renderActiveGameCard();
        attachCasinoHandlers();
        attachPetHandlers();
      } catch (err) {
        console.error("[renderCasino] error:", err);
        el.innerHTML = `<div class="error"><span class="big-emoji">⚠️</span>Ошибка рендера: ${err.message}<br><small>Открой консоль для деталей.</small></div>`;
      }
    }

    function switchCasinoGame(g) {
      if (g === currentCasinoGame) return;
      currentCasinoGame = g;
      renderCasino();
    }

    function renderCasinoGamePicker() {
      const games = [
        { id: "slots", icon: "🎰", label: "Слоты"   },
        { id: "flip",  icon: "🪙", label: "Монетка" },
        { id: "mines", icon: "💣", label: "Мины"    },
        { id: "crash", icon: "🚀", label: "Краш"    },
      ];
      return `<div class="casino-game-picker">
        ${games.map(g => `
          <button class="cgp-btn${currentCasinoGame === g.id ? " active" : ""}"
                  onclick="switchCasinoGame('${g.id}')">
            <span class="cgp-icon">${g.icon}</span>
            <span class="cgp-label">${g.label}</span>
          </button>`).join("")}
      </div>`;
    }

    function renderActiveGameCard() {
      switch (currentCasinoGame) {
        case "flip":  return renderFlipCard();
        case "mines": return renderMinesCard();
        case "crash": return renderCrashCard();
        default:      return renderSlotsCard();
      }

    // ── Subscription helpers ────────────────────────────────────────────────────
    function _subPlans(s) {
      const base  = s.price_stars;
      const days  = s.duration_days;
      return [
        { key:"month",   label:"1 месяц",    days: days,     stars: base,                        savePct: 0,  badge: null           },
        { key:"quarter", label:"3 месяца",   days: days * 3, stars: Math.round(base * 3 * 0.83), savePct: 17, badge: "🔥 Популярный" },
        { key:"year",    label:"12 месяцев", days: days *12, stars: Math.round(base *12 * 0.67), savePct: 33, badge: "💡 Выгоднее"   },
      ];
    }

    function _getActivePlan() {
      const s = subData;
      if (!s) return { key:"quarter", label:"3 месяца", days:90, stars:249, savePct:17 };
      return _subPlans(s).find(p => p.key === selectedSubPlan) || _subPlans(s)[1];
    }

    function selectSubPlan(key) {
      selectedSubPlan = key;
      document.querySelectorAll(".sub-plan-card[data-tier='premium']").forEach(c =>
        c.classList.toggle("selected", c.dataset.plan === key)
      );
      const plan = _getActivePlan();
      const btn  = document.getElementById("subBuyBtn");
      const info = document.getElementById("subCtaInfo");
      if (btn && !btn.disabled) {
        btn.innerHTML = `<span class="sub-buy-star">⭐</span><span>Оформить за ${plan.stars} Stars</span>`;
      }
      if (info) {
        const saveHtml = plan.savePct > 0
          ? ` · <span class="sub-cta-save">−${plan.savePct}% экономия</span>` : "";
        info.innerHTML = `Подписка на <strong>${plan.label}</strong> · ${plan.days} дней${saveHtml}`;
      }
      if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
    }

    function _vipPlans(s) {
      const vipCfg  = s?.vip_config || {};

    // ── Shared plan card builder ───────────────────────────────────────────────
    function _renderPlanCards(plans, selectedKey, monthlyStars, isVip) {
      return plans.map(p => {
        const months    = p.days / 30;
        const perMonth  = p.stars / months;
        const savePerMo = Math.round(monthlyStars - perMonth);
        const isSelected = p.key === selectedKey;
        const cls = ["sub-plan-card",
          isVip ? (p.key.endsWith("quarter") ? "vip-featured" : "") : (p.key === "quarter" ? "featured" : ""),
          isSelected ? (isVip ? "vip-selected" : "selected") : "",
        ].filter(Boolean).join(" ");
        const subLabel = savePerMo <= 0
          ? `${Math.round(perMonth)} ⭐/мес`
          : `−${savePerMo} ⭐/мес vs месяца`;
        const clickFn = isVip ? `selectVipPlan('${p.key}')` : `selectSubPlan('${p.key}')`;
        const badgeCls = isVip ? "sub-plan-badge vip" : "sub-plan-badge";
        const saveCls  = isVip ? "sub-plan-save vip"  : "sub-plan-save";
        return `
          <div class="${cls}" data-plan="${p.key}" data-tier="${isVip ? 'vip' : 'premium'}" onclick="${clickFn}">
            ${p.badge ? `<div class="${badgeCls}">${p.badge}</div>` : ""}
            <div class="sub-plan-name">${p.label}</div>
            <div class="sub-plan-stars">
              <span class="sub-plan-stars-ico">${isVip ? "💎" : "⭐"}</span>
              <span>${p.stars}</span>
            </div>
            <div class="sub-plan-perday">${subLabel}</div>
            ${p.savePct > 0 ? `<div class="${saveCls}">−${p.savePct}%</div>` : ""}
          </div>`;
      }).join("");
    }

    // ── Shared post-payment refresh ───────────────────────────────────────────
    async function _refreshWalletAfterSub(tierLabel) {
      const wRes = await fetch("/app/api/wallet/info", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({initData: currentInitData}),
      });
      if (wRes.ok) {
        walletData = await wRes.json();
        subData = walletData?.subscription || null;
        renderCasino();
        renderDonate();
      }
      toastMessage(`${tierLabel} оформлен! Бонусы уже активны.`);
    }

    function _makeInvoiceHandler({ endpoint, planFn, resetFn, tierLabel }) {
      return async () => {
        const plan = planFn();
        resetFn("loading");
        try {
          if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
          const res = await fetch(endpoint, {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
              initData:   currentInitData,
              plan_stars: plan.stars,
              plan_days:  plan.days,
            }),
          });
          if (!res.ok) {
            const err = await res.json().catch(()=>({}));
            const MSG = {
              subscription_disabled: "Подписка временно недоступна.",
              already_subscribed:    "У тебя уже есть активная подписка!",
              invoice_send_failed:   "Не удалось создать счёт. Попробуй позже.",
            };
            toastMessage(MSG[err.detail] || "Ошибка. Попробуй ещё раз.");
            resetFn("ready");
            return;
          }
          const data = await res.json();
          const _onResult = async (status) => {
            if (status === "paid") {
              if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
              await _refreshWalletAfterSub(tierLabel);
            } else if (status === "cancelled") {
              toastMessage("Оплата отменена.");
              resetFn("ready");
            } else {
              toastMessage("Ошибка оплаты. Попробуй ещё раз.");
              resetFn("ready");

          };

            tg.openInvoice(data.invoice_link, _onResult);

          }

        }

    function attachCasinoHandlers() {
      // Daily claim
      const claimBtn = document.getElementById("claimDailyBtn");
      if (claimBtn && !claimBtn.disabled) {
        claimBtn.addEventListener("click", claimDaily);
      }
      // Slots spin
      const spinBtn = document.getElementById("spinBtn");
      if (spinBtn) spinBtn.addEventListener("click", spinSlots);
      // Flip presets
      document.querySelectorAll(".flip-preset-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const inp = document.getElementById("flipBet");
          if (inp && btn.dataset.preset) inp.value = btn.dataset.preset;
        });
      });
      // Flip buttons
      ["flipHeadsBtn","flipTailsBtn"].forEach(id => {
        const btn = document.getElementById(id);
        if (btn) btn.addEventListener("click", () => doFlip(btn.dataset.choice));
      });

      // Mines + Crash buttons now use inline onclick — no listeners needed here
      // Fetch crash history when crash tab is active
      if (currentCasinoGame === "crash") fetchCrashHistory();
    }

    function updateBalanceDisplay(newBalance) {
      walletData.balance = newBalance;
      const el = document.getElementById("walletBalanceEl");
      if (el) {
        el.textContent = newBalance.toLocaleString("ru-RU");
        el.classList.add("pop");
        setTimeout(() => el.classList.remove("pop"), 500);
      }

    async function claimDaily() {
      const btn = document.getElementById("claimDailyBtn");
      if (!btn || btn.disabled) return;
      btn.disabled = true; btn.textContent = "⏳ Получаем…";
      try {
        const res = await fetch("/app/api/wallet/claim_daily", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData}),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        walletData.can_claim_daily = false;
        walletData.seconds_until_next_claim = 20 * 3600;
        walletData.total_earned += data.earned;
        updateBalanceDisplay(data.new_balance);
        btn.textContent = `✅ Получено ${data.earned} монет!`;
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        const _parts = [`🎁 +${data.earned} монет`];
        if (data.streak_bonus > 0) _parts.push(`+${data.streak_bonus} за серию 🔥`);
        if (data.marriage_bonus > 0) _parts.push(`+${data.marriage_bonus} от брака 💍`);
        toastMessage(_parts.length > 1 ? `${_parts[0]} (${_parts.slice(1).join(", ")})!` : `${_parts[0]}!`);
      } catch {
        btn.disabled = false;
        btn.textContent = "🎁 Получить награду";
        toastMessage("Не удалось получить награду.");
      }

    async function spinSlots() {
      const btn       = document.getElementById("spinBtn");
      const resultWrap = document.getElementById("slotsResultWrap");
      const winLine   = document.getElementById("slotsWinLine");
      if (!btn || btn.disabled) return;

      const bet = slotsBet;
      if ((walletData?.balance || 0) < bet) {
        toastMessage("Недостаточно монет! Получи ежедневную награду 🎁");
        return;
      }

      btn.disabled = true;
      btn.textContent = "⏳";
      if (resultWrap) resultWrap.innerHTML = "";
      if (winLine) winLine.className = "slots-win-line";

      // Clear win classes
      [0,1,2].forEach(i => {
        const w = document.getElementById(`reelWrap${i}`);
        if (w) w.className = "slot-reel-wrap";
      });
      document.querySelectorAll('.slots-bet-chip').forEach(c => c.disabled = true);

      // ── Start all reels spinning (rapid random shuffles) ──────────────────
      const spinIntervals = [0,1,2].map(i => setInterval(() => {
        const s = document.getElementById(`strip${i}`);
        if (!s) return;
        s.style.transition = "none";
        s.innerHTML = [_randSym(),_randSym(),_randSym(),_randSym(),_randSym()]
          .map(x=>`<div class="slot-sym">${x}</div>`).join("");
        s.style.transform = "translateY(-60px)";
      }, 80));

      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");

      try {
        const res = await fetch("/app/api/wallet/slots", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData, bet}),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();

        // ── Stop reels one by one, left → middle → right ───────────────────
        const stopReel = (idx, delay) => setTimeout(() => {
          clearInterval(spinIntervals[idx]);
          const s = document.getElementById(`strip${idx}`);
          if (!s) return;
          // Place result at center (index 2 of 5), start shifted up
          s.style.transition = "none";
          s.innerHTML = _strip5(data.reels[idx]);
          s.style.transform = "translateY(-120px)"; // result at top of window
          // Bounce-settle to center
          requestAnimationFrame(() => requestAnimationFrame(() => {
            s.style.transition = "transform 0.42s cubic-bezier(0.22,1.28,0.36,1)";
            s.style.transform  = "translateY(-60px)"; // result in center
          }));
          if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
        }, delay);

        stopReel(0, 380);
        stopReel(1, 760);
        stopReel(2, 1140);

        // ── Show result after last reel settles ────────────────────────────
        setTimeout(() => {
          walletData.total_spent = (walletData.total_spent || 0) + bet;
          if (data.payout > 0) walletData.total_earned = (walletData.total_earned || 0) + data.payout;
          updateBalanceDisplay(data.new_balance);

          if (data.payout > 0) {
            // Determine which reels to light up
            const r = data.reels;
            const allSame = r[0]===r[1] && r[1]===r[2];
            const cls = data.is_jackpot ? "jackpot-reel" : "win-reel";
            const lineClass = data.is_jackpot ? "jackpot-lit" : "lit";
            const toLight = allSame ? [0,1,2] : [];
            if (!allSame) {
              if (r[0]===r[1]) toLight.push(0,1);
              if (r[1]===r[2]) toLight.push(1,2);
              if (r[0]===r[2]) toLight.push(0,2);
            }
            [...new Set(toLight)].forEach(i => {
              const w = document.getElementById(`reelWrap${i}`);
              if (w) w.classList.add(cls);
            });
            if (winLine) winLine.classList.add(lineClass);

            if (data.is_jackpot) {
              if (resultWrap) resultWrap.innerHTML =
                `<div class="slots-res-jackpot">💎 ДЖЕКПОТ! +${data.payout} 🪙</div>`;
              if (tg?.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred("success");
                [100,250,400].forEach(d => setTimeout(()=>tg.HapticFeedback.impactOccurred("heavy"),d));
              }
            } else {
              if (resultWrap) resultWrap.innerHTML =
                `<div class="slots-res-win">+${data.payout} 🪙</div>`;
              if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
            }
          } else {
            if (resultWrap) resultWrap.innerHTML =
              `<div class="slots-res-lose">−${bet} 🪙</div>`;
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
          }

          btn.disabled = false;
          btn.textContent = `🎰 Крутить — ${bet} 🪙`;
          document.querySelectorAll('.slots-bet-chip').forEach(c => {
            c.disabled = (walletData.balance || 0) < parseInt(c.dataset.bet);
          });
        }, 1640);

      } catch {
        spinIntervals.forEach(clearInterval);
        [0,1,2].forEach(i=>{
          const s = document.getElementById(`strip${i}`);
          if (s) { s.style.transition="none"; s.innerHTML=_strip5("❓"); s.style.transform="translateY(-60px)"; }
        });
        if (resultWrap) resultWrap.innerHTML = `<div class="slots-res-lose">Ошибка. Попробуй ещё раз.</div>`;
        btn.disabled = false;
        btn.textContent = `🎰 Крутить — ${bet} 🪙`;
        document.querySelectorAll('.slots-bet-chip').forEach(c => c.disabled = false);
      }
    }

    function _crashTick(bet, now) {
      if (!crashGameActive) return;
      const elapsed = (now - crashStartTime) / 1000;
      crashMultiplier = parseFloat(Math.exp(0.055 * elapsed).toFixed(2));

      // ── 1. Auto-cashout check ─────────────────────────────────────────────
      if (!crashCashedOut && crashAutoCashoutAt > 1 && crashMultiplier >= crashAutoCashoutAt) {
        doCrashCashout();
        // Don't return — animation continues in FOMO mode
      }

      // ── 2. Crash point check ──────────────────────────────────────────────
      if (crashMultiplier >= crashPointAt) {
        crashGameActive = false;
        cancelAnimationFrame(crashAnimFrame); crashAnimFrame = null;
        const rocketEl  = document.getElementById("crashRocket");
        const cashoutEl = document.getElementById("crashCashoutBtn");
        if (rocketEl) {
          rocketEl.innerHTML   = '<span style="font-size:28px;line-height:1;display:block">💥</span>';
          rocketEl.style.width  = "32px";
          rocketEl.style.height = "32px";
          rocketEl.style.transform = "none";
          rocketEl.style.filter = "drop-shadow(0 0 16px rgba(255,69,58,0.9))";
        }
        if (cashoutEl) { cashoutEl.disabled = true; cashoutEl.classList.remove("live"); }
        if (tg?.HapticFeedback && !crashCashedOut) tg.HapticFeedback.notificationOccurred("error");
        _finalizeCrashEnd(bet);
        return;
      }

      // ── 3. Text + colour ──────────────────────────────────────────────────
      const multD   = document.getElementById("crashMultDisplay");
      const cashout = document.getElementById("crashCashoutBtn");
      if (multD && multD.classList.contains("flying")) {
        multD.textContent = `${crashMultiplier.toFixed(2)}×`;
        if      (crashMultiplier >= 10)  multD.style.color = "#c5baff";
        else if (crashMultiplier >= 5)   multD.style.color = "#f97316";
        else if (crashMultiplier >= 2.5) multD.style.color = "#fbbf24";
        else                             multD.style.color = "#c5baff";
      }
      // Update cashout button: if already cashed out — show status, else show potential payout
      if (cashout && !crashCashedOut) {
        cashout.textContent = `🚀 Забрать ${Math.floor(bet * crashMultiplier)} 🪙`;
      } else if (cashout && crashCashedOut) {
        cashout.textContent = `✅ Забрал ×${crashCashedOutMult.toFixed(2)} — летим…`;
      }

      // ── 4. Rocket position + curve ────────────────────────────────────────
      const display = document.getElementById("crashDisplay");
      if (!display) { crashAnimFrame = requestAnimationFrame(_crashTick.bind(null, bet)); return; }
      const W = display.clientWidth  || 300;
      const H = display.clientHeight || 148;

      const T     = 35;
      const xFrac = Math.min(elapsed / T, 0.93);
      const yFrac = Math.min(1 - 1 / Math.max(crashMultiplier, 1.001), 0.93);

      const svgX = 4   + xFrac * 290;
      const svgY = 138 - yFrac * 128;

      const rocket = document.getElementById("crashRocket");
      if (rocket) {
        const pxX = (svgX / 300) * W;
        const pxY = (svgY / 148) * H;
        rocket.style.left   = `${(pxX - 24).toFixed(0)}px`;
        rocket.style.top    = `${(pxY - 13).toFixed(0)}px`;
        rocket.style.bottom = "";

        // Compute tangent angle from trajectory
        if (crashPrevSvgX !== null) {
          const dx = svgX - crashPrevSvgX;
          const dy = svgY - crashPrevSvgY; // SVG Y: positive = down
          if (dx * dx + dy * dy > 0.2) {
            const targetAngle = Math.atan2(-dy, dx) * 180 / Math.PI; // standard coords (up = +90)
            let diff = targetAngle - crashRocketAngle;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            crashRocketAngle += diff * 0.18; // smooth lerp
          }
        }
        crashPrevSvgX = svgX;
        crashPrevSvgY = svgY;

        // SVG rocket points RIGHT at 0°; negate to convert math angle → CSS rotation
        rocket.style.transform = `rotate(${(-crashRocketAngle).toFixed(1)}deg)`;
      }

      // SVG path update (throttled to 80 ms)
      if (now - crashLastPathT > 80) {
        crashLastPathT = now;
        const poly = document.getElementById("crashPolyline");
        const fill = document.getElementById("crashFill");
        if (poly) {
          const pts    = poly.getAttribute("points") || "";
          const newPts = `${pts} ${svgX.toFixed(1)},${svgY.toFixed(1)}`;
          poly.setAttribute("points", newPts);
          fill?.setAttribute("points", `${newPts} ${svgX.toFixed(1)},143 4,143`);
        }
      }

      crashAnimFrame = requestAnimationFrame(_crashTick.bind(null, bet));
    }

    // Called when rocket explodes (either player lost or player already cashed out = FOMO)
    async function _finalizeCrashEnd(bet) {
      const multD    = document.getElementById("crashMultDisplay");
      const resultEl = document.getElementById("crashResult");
      const startBtn = document.getElementById("crashStartBtn");
      const cashAt   = crashPointAt;

      if (crashCashedOut) {
        // Player already cashed out — show FOMO result
        if (multD) {
          multD.classList.remove("flying");
          multD.style.color = "";
          multD.className = "crash-mult-display lost";
          multD.textContent = `💥 ${cashAt.toFixed(2)}×`;
        }
        const fomoMsg = crashCashedOutPayout > 0
          ? `<span class="flip-won">✅ Ты забрал ×${crashCashedOutMult.toFixed(2)} (+${crashCashedOutPayout} 🪙)</span><br><span style="font-size:12px;color:var(--ci-muted)">Краш произошёл на ×${cashAt.toFixed(2)}</span>`
          : `<span class="flip-won">✅ Ты забрал на ×${crashCashedOutMult.toFixed(2)}</span><br><span style="font-size:12px;color:var(--ci-muted)">Краш на ×${cashAt.toFixed(2)}</span>`;
        if (resultEl) resultEl.innerHTML = fomoMsg;
        // Update local history and bar
        crashHistory.push(cashAt);
        if (crashHistory.length > 10) crashHistory.shift();
        renderCrashHistoryBar();
        _scheduleAutoBet(bet);
        if (startBtn) { startBtn.style.display = ""; startBtn.disabled = false; startBtn.textContent = "🚀 Запустить"; }
        return;
      }

      // Player did NOT cash out — notify server and show loss
      if (multD) {
        multD.classList.remove("flying");
        multD.style.color = "";
        multD.className = "crash-mult-display lost";
        multD.textContent = `💥 ${cashAt.toFixed(2)}×`;
      }

      try {
        const res = await fetch("/app/api/wallet/crash/cashout", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData, multiplier: cashAt}),
        });
        if (res.ok) {
          const data = await res.json();
          const at = (data.crash_at || cashAt).toFixed(2);
          if (multD) { multD.className = "crash-mult-display lost"; multD.textContent = `💥 ${at}×`; }
          if (resultEl) resultEl.innerHTML = `<span class="flip-lost">💥 Краш на ${at}× — ставка потеряна!</span>`;
          updateBalanceDisplay(data.new_balance);
          crashHistory.push(parseFloat(at));
        } else {
          if (resultEl) resultEl.innerHTML = `<span class="flip-lost">💥 Краш на ${cashAt.toFixed(2)}×!</span>`;
          crashHistory.push(cashAt);
        }
      } catch {
        if (resultEl) resultEl.innerHTML = `<span class="flip-lost">💥 Краш на ${cashAt.toFixed(2)}×!</span>`;
        crashHistory.push(cashAt);
      }
      if (crashHistory.length > 10) crashHistory.shift();
      renderCrashHistoryBar();
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
      _scheduleAutoBet(bet);
      if (startBtn) { startBtn.style.display = ""; startBtn.disabled = false; startBtn.textContent = "🚀 Запустить"; }
      // Reset rocket to launch pad after short delay (so 💥 is visible briefly)
      setTimeout(_placeCrashRocketAtStart, 1800);
    }

    function _scheduleAutoBet(bet) {
      if (!crashAutoBet) return;
      if (crashAutoBetTimer) clearTimeout(crashAutoBetTimer);
      crashAutoBetTimer = setTimeout(() => {
        crashAutoBetTimer = null;
        const betInput = document.getElementById("crashBet");
        if (betInput) betInput.value = bet;
        startCrash();
      }, 2000);
    }

    async function doCrashCashout() {
      // Prevent double-cashout
      if (!crashGameActive || crashCashedOut) return;
      crashCashedOut = true;
      crashCashedOutMult = crashMultiplier;

      const cashout = document.getElementById("crashCashoutBtn");
      if (cashout) {
        cashout.disabled = true;
        cashout.classList.remove("live");
        cashout.textContent = `✅ Забрал ×${crashCashedOutMult.toFixed(2)} — летим…`;
      }

      // Animation continues — rocket flies to crashPointAt (FOMO)
      try {
        const res = await fetch("/app/api/wallet/crash/cashout", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData, multiplier: crashCashedOutMult}),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();

        if (data.won) {
          crashCashedOutPayout = data.payout;
          updateBalanceDisplay(data.new_balance);
          if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
          toastMessage(`🚀 +${data.payout} монет!`);
        } else {
          // Server says crash already happened (race condition) — end immediately
          crashGameActive = false;
          if (crashAnimFrame) { cancelAnimationFrame(crashAnimFrame); crashAnimFrame = null; }
          const rocketEl = document.getElementById("crashRocket");
          if (rocketEl) { rocketEl.textContent = "💥"; rocketEl.style.filter = "drop-shadow(0 0 16px rgba(255,69,58,0.9))"; }
          crashCashedOutPayout = 0;
          updateBalanceDisplay(data.new_balance);
          const resultEl = document.getElementById("crashResult");
          if (resultEl) resultEl.innerHTML = `<span class="flip-lost">💥 Краш на ${data.crash_at.toFixed(2)}× — ставка потеряна!</span>`;
          const multD = document.getElementById("crashMultDisplay");
          if (multD) { multD.classList.remove("flying"); multD.style.color = ""; multD.className = "crash-mult-display lost"; multD.textContent = `💥 ${data.crash_at.toFixed(2)}×`; }
          crashHistory.push(data.crash_at);
          if (crashHistory.length > 10) crashHistory.shift();
          renderCrashHistoryBar();
          if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
          _scheduleAutoBet(crashCurrentBet); // auto-bet with same bet
          const startBtn = document.getElementById("crashStartBtn");
          if (startBtn) { startBtn.style.display = ""; startBtn.disabled = false; startBtn.textContent = "🚀 Запустить"; }
        }
      } catch {
        // If request fails, still keep animation going; result shown at explosion
        cashout && (cashout.textContent = `✅ Забрал ×${crashCashedOutMult.toFixed(2)} — летим…`);
      }
    }

    const FEED_XP_BASE = 15;
    function calcFoodXP(foodType, p) {
      const f = FOOD_CATALOG_JS[foodType];
      if (!f) return 0;
      const skillMult  = 1.0 + ((p.upgrades && p.upgrades.xp_boost) || 0) * 0.30;
      // xp_multiplier from pet/list already combines subscription + double_xp boost
      const xpMult     = Math.max(1.0, parseFloat((petData && petData.xp_multiplier) || 1));
      const relMult    = parseFloat(p.rel_bonus || 1.0);
      return Math.round(FEED_XP_BASE * f.xp_mult * skillMult * xpMult * relMult);
    }

    function statColor(v) {
      return v >= 60 ? "var(--green)" : v >= 30 ? "#f59e0b" : "var(--red)";

      return m >= 70 ? "😊" : m >= 40 ? "😐" : "😢";

    function daysLabel(n) {
      if (n === 0) return "только родился";
      if (n === 1) return "1 день";
      if (n < 5)   return `${n} дня`;
      return `${n} дней`;
    }
    function fmtCooldown(secs) {
      if (secs <= 0) return null;
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      if (h > 0) return `${h}ч ${m}м`;
      return `${m}м`;
    }

    function petSpeech(p) {
      if (p.hunger < 30) return p.hunger < 15
        ? `Я очень голодна… 😿 Покорми меня!`
        : `Хочу кушать ${hungerEmoji(p.hunger)} покорми меня?`;
      if (p.mood < 30) return `Мне скучно… поиграй со мной! 🎾`;
      if (p.mood >= 90) return `Я счастлива! ❤️ Спасибо!`;
      if (p.hunger >= 90) return `Сытая и довольная~ 😸`;
      const phrases = [
        `Мяу! Привет! 👋`, `Всё хорошо~ 😊`, `Поиграй со мной! 🎮`,
        `Я тебя люблю! 💕`, `Сегодня отличный день! ✨`,
      ];
      return phrases[Math.abs(p.id * 7 + p.mood) % phrases.length];
    }

    function attachPetHandlers() {
      // Main tab action buttons (feed quick/play/cuddle/rename)
      document.querySelectorAll(".pet-action-btn:not([disabled])").forEach(btn => {
        btn.addEventListener("click", () => {
          const petId  = Number(btn.dataset.petId);
          const action = btn.dataset.action;
          if (action === "rename") { openRenameModal(petId, btn); return; }
          if (action === "feed")   { doPetFeed(petId, "kibble", btn); return; }
          doPetAction(petId, action, btn);
        });
      });
      // Food shop buttons
      document.querySelectorAll(".pet-food-buy:not([disabled])").forEach(btn => {
        btn.addEventListener("click", () => {
          doPetFeed(Number(btn.dataset.petId), btn.dataset.foodType, btn);
        });
      });
      // Skill upgrade buttons
      document.querySelectorAll(".pet-skill-upg-btn:not([disabled]):not(.maxed)").forEach(btn => {
        btn.addEventListener("click", () => {
          doPetUpgrade(Number(btn.dataset.petId), btn.dataset.skill, btn);
        });
      });
      // Adopt
      document.querySelectorAll("#openAdoptBtn").forEach(b => b.addEventListener("click", openAdoptModal));
    }

    async function doPetFeed(petId, foodType, btn) {
      const food = FOOD_CATALOG_JS[foodType] || FOOD_CATALOG_JS.kibble;
      if ((walletData?.balance||0) < food.cost) { toastMessage("Недостаточно монет 🪙"); return; }
      const origHtml = btn?.innerHTML;
      if (btn) { btn.disabled = true; btn.textContent = "⏳"; }
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
      try {
        const res = await fetch("/app/api/pet/feed", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData, petId, foodType}),
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({}));
          const MSGS = { already_fed:"Питомец уже сыт 😊", insufficient_coins:"Недостаточно монет 🪙", pet_is_dead:"Питомец умер 💀" };
          toastMessage(MSGS[err.detail]||"Ошибка. Попробуй ещё раз.");
          if (btn) { btn.disabled=false; btn.innerHTML=origHtml; }
          return;
        }
        const data = await res.json();
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        updateBalanceDisplay(data.new_balance);
        const xpMsg = data.xp_gained ? ` +${data.xp_gained} XP` : "";
        const REL_FEED_LABEL = { friends: " 💛", dating: " 💕", married: " 💍" };
        const relSuffix = data.rel_tier ? (REL_FEED_LABEL[data.rel_tier] || "") : "";
        toastMessage(`${food.emoji} Накормлен!${xpMsg}${relSuffix}`);
        await _refreshPets();
      } catch {
        if (btn) { btn.disabled=false; btn.innerHTML=origHtml||""; }
        toastMessage("Ошибка. Попробуй ещё раз.");
      }
    }

    async function doPetAction(petId, action, btn) {
      const origHtml = btn.innerHTML;
      btn.disabled = true; btn.textContent = "⏳";
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
      try {
        const res = await fetch(`/app/api/pet/${action}`, {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData, petId}),
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({}));
          const MSGS = { play_cooldown:"Питомец устал 😴", cuddle_cooldown:"Слишком часто — подожди час 🌸", pet_is_dead:"Питомец умер 💀" };
          toastMessage(MSGS[err.detail]||"Ошибка. Попробуй ещё раз.");
          btn.disabled=false; btn.innerHTML=origHtml; return;
        }
        const data = await res.json();
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        const REL_ACTION_ICON = { friends: " 💛", dating: " 💕", married: " 💍" };
        const relIcon = data.rel_tier ? (REL_ACTION_ICON[data.rel_tier] || "") : "";
        if (data.coins_found > 0 && data.new_balance != null) {
          updateBalanceDisplay(data.new_balance);
          toastMessage(`🍀 Удача! +${data.coins_found} 🪙 нашёл питомец!`);
        } else {
          const TOASTS = {
            play:   (data.play_msg || `🎮 Поиграли! +${data.xp_gained||0} XP`) + relIcon,
            cuddle: `🤗 Обнял питомца! ❤️ +${data.xp_gained||0} XP${relIcon}`,
          };
          toastMessage(TOASTS[action]||"✅ Готово!");
        }
        await _refreshPets();
      } catch {
        btn.disabled=false; btn.innerHTML=origHtml;
        toastMessage("Ошибка. Попробуй ещё раз.");
      }
    }

          if (!res.ok) {

              pet_exists:            "С этим собеседником уже есть живой питомец!",

          if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
          overlay.remove();

          toastMessage(`🥚 Питомец заведён${pInfo}! Корми и играй с ним каждый день.`);

        } catch(e) {
          confirmBtn.disabled = false; confirmBtn.textContent = "Завести питомца 🥚";
          toastMessage(e.message);
        }
      });
    }

    async function loadQuestsLeaderboard() {
      const el = document.getElementById("questContent");
      el.innerHTML = `<div class="empty skeleton"><span class="big-emoji">🏆</span>Загружаем…</div>`;
      try {
        const opts = { method: "POST", headers: {"Content-Type":"application/json"},
                       body: JSON.stringify({initData: currentInitData}) };
        const [qRes, lbRes] = await Promise.all([
          fetch("/app/api/quests",      opts),
          fetch("/app/api/leaderboard", opts),
        ]);
        if (!qRes.ok || !lbRes.ok) throw new Error("api");
        questData    = await qRes.json();
        lbData       = await lbRes.json();
        questsLoaded = true;
        renderQuestsTab();
      } catch {
        el.innerHTML = `<div class="error"><span class="big-emoji">⚠️</span>Не удалось загрузить.</div>`;
      }
    }

    function renderQuestsTab() {
      const el = document.getElementById("questContent");
      if (!questData || !lbData) return;
      el.innerHTML = renderQuestsSection() + renderLeaderboardSection();
      attachQuestHandlers();
    }

    function renderQuestsSection() {
      const earned = questData.quests.filter(q => q.claimed).reduce((s, q) => s + q.reward, 0);
      const total  = questData.quests.reduce((s, q) => s + q.reward, 0);

      const cards = questData.quests.map((q, i) => {
        const pct      = q.target > 0 ? Math.round(q.progress / q.target * 100) : 0;
        const canClaim = !q.claimed && q.progress >= q.target;
        const cls      = q.claimed ? "claimed" : canClaim ? "ready" : "";
        return `
          <div class="quest-card ${cls}" style="animation-delay:${i * 0.07}s">
            <div class="quest-emoji">${q.emoji}</div>
            <div class="quest-body">
              <div class="quest-title">${q.title}</div>
              <div class="quest-desc">${q.desc}</div>
              <div class="quest-prog-wrap">
                <div class="quest-prog-track">
                  <div class="quest-prog-fill" style="width:${pct}%"></div>
                </div>
                <span class="quest-prog-lbl">${q.progress}/${q.target}</span>
              </div>
            </div>
            <div class="quest-right">
              <span class="quest-reward">+${q.reward} 🪙</span>
              ${q.claimed
                ? `<span class="quest-done-badge">✅</span>`
                : `<button class="quest-claim-btn" data-quest-id="${q.id}" ${canClaim ? "" : "disabled"}>
                     ${canClaim ? "Забрать" : "В процессе"}
                   </button>`}
            </div>
          </div>`;
      }).join("");

      return `
        <div class="section-title">🎯 Задания дня
          <span class="sub">${earned}/${total} 🪙</span>
        </div>
        ${cards}`;
    }

    function renderLeaderboardSection() {
      const entries = lbData?.entries || [];
      const myRank  = lbData?.my_rank;
      const medals  = ["🥇","🥈","🥉"];

      const rows = entries.map((e, i) => `
        <div class="lb-entry${e.is_self ? " me" : ""}" style="animation-delay:${0.05 + i * 0.04}s">
          <div class="lb-rank">${medals[i] || ("#" + e.rank)}</div>
          <div class="lb-avatar" style="background:${colorFor(e.display_name)}">${initials(e.display_name)}</div>
          <div class="lb-name">${e.is_self ? "👤 Ты" : e.display_name}</div>
          <div class="lb-coins">${e.total_earned.toLocaleString("ru-RU")} 🪙</div>
        </div>`).join("");

      const myNote = (myRank && !entries.find(e => e.is_self))
        ? `<div class="lb-my-rank-note">Твоё место: #${myRank}</div>` : "";

      return `
        <div class="section-title" style="margin-top:8px">🏆 Рейтинг монет</div>
        ${rows || `<div class="empty" style="padding:20px 0"><span class="big-emoji">🪙</span>Пока никто не зарабатывал монеты.</div>`}
        ${myNote}`;
    }

        const opts = { method: "POST", headers: { "Content-Type": "application/json" },
                       body: JSON.stringify({ initData: currentInitData }) };
        const [wRes, sRes, pRes] = await Promise.all([
          fetch("/app/api/wallet/info", opts),
          fetch("/app/api/shop/status", opts),
          fetch("/app/api/pet/list",    opts),

        if (!wRes.ok) throw new Error();
        walletData = await wRes.json();
        shopData   = sRes.ok ? await sRes.json() : { active_boosts: [], settings: {}, prices: {} };
        petData    = pRes.ok ? await pRes.json() : { pets: [], available_chats: [] };

        el.innerHTML = `<div class="error"><span class="big-emoji">⚠️</span>Не удалось загрузить.<br>Попробуй обновить.</div>`;

            const e = await res.json().catch(() => ({}));

          const theme = btn.dataset.theme;
          const isOwned = btn.dataset.owned === "true";
          btn.disabled = true; btn.textContent = "⏳";
          try {
            const endpoint = isOwned
              ? "/app/api/shop/theme/activate"
              : "/app/api/shop/theme";
            const res = await fetch(endpoint, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ initData: currentInitData, theme }),
            });
            if (!res.ok) {
              const e = await res.json().catch(() => ({}));
              throw new Error({
                insufficient_coins: "Недостаточно монет 🪙",

    function openChatPickerModal(title, chats, onSelect) {
      const overlay = document.createElement("div");
      overlay.className = "balance-overlay";
      overlay.innerHTML = `
        <div class="balance-sheet">
          <div class="balance-sheet-title">${esc(title)}</div>
          <div class="adopt-chats">
            ${chats.map(c => `
              <button class="adopt-chat-btn" data-chat-id="${c.chat_id}" data-name="${esc(c.display_name)}">
                <div class="adopt-chat-avatar" style="background:${colorFor(c.display_name)}">${initials(c.display_name)}</div>

                <div class="adopt-chat-msgs">${c.message_count} сообщ.</div>
              </button>`).join("")}
          </div>
          <button class="balance-cancel-btn" id="chatPickerClose">Отмена</button>
        </div>`;
      document.body.appendChild(overlay);
      overlay.querySelector("#chatPickerClose").addEventListener("click", () => overlay.remove());
      overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelectorAll(".adopt-chat-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          overlay.remove();
          await onSelect(Number(btn.dataset.chatId), btn.dataset.name);

    let referralLoaded = false;
