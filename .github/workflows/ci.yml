name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy app --ignore-missing-imports

      - name: Validate app imports and config
        env:
          TELEGRAM_BOT_TOKEN: "ci-placeholder-token"
          DASHBOARD_ADMIN_USERNAME: "ci-admin"
          DASHBOARD_ADMIN_PASSWORD: "ci-password"
          SESSION_SECRET: "ci-session-secret-for-validation-only"
          DATABASE_URL: "sqlite+aiosqlite:///./ci_validate.db"
        run: |
          python -c "from app.main import app; print('App imported successfully:', app.title)"

      - name: Validate Alembic migrations compile
        env:
          TELEGRAM_BOT_TOKEN: "ci-placeholder-token"
          DASHBOARD_ADMIN_USERNAME: "ci-admin"
          DASHBOARD_ADMIN_PASSWORD: "ci-password"
          SESSION_SECRET: "ci-session-secret-for-validation-only"
          DATABASE_URL: "sqlite+aiosqlite:///./ci_migrate.db"
        run: |
          alembic upgrade head
