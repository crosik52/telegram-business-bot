<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Админ-панель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #f2f2f7);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #17181a);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --link: var(--tg-theme-link-color, #2481cc);
    --button: var(--tg-theme-button-color, #2481cc);
    --button-text: var(--tg-theme-button-text-color, #ffffff);
    --green: #34c759;
    --orange: #ff9f0a;
    --danger: #ff3b30;
    --purple: #6c5ce7;
    --card-radius: 20px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    padding: 0 14px 60px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 20px 0 18px;
    animation: fadeDown 0.4s ease;
  }
  .header .avatar-ring {
    width: 58px; height: 58px;
    margin: 0 auto 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--link));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 4px 16px rgba(108,92,231,0.35);
  }
  .header h1 { font-size: 19px; margin: 0 0 3px; font-weight: 700; }
  .header p  { margin: 0; color: var(--hint); font-size: 13px; }

  /* ── Tab bar ── */
  .tab-row {
    display: flex; gap: 6px; margin-bottom: 18px;
    overflow-x: auto; padding-bottom: 2px;
  }
  .tab-row::-webkit-scrollbar { display: none; }
  .tab-chip {
    flex-shrink: 0; border: none;
    background: var(--secondary-bg);
    color: var(--hint);
    font-size: 13px; font-weight: 600;
    padding: 9px 16px; border-radius: 14px;
    box-shadow: var(--shadow);
    transition: all 0.18s ease;
  }
  .tab-chip.active {
    background: var(--link); color: #fff;
    box-shadow: 0 3px 10px rgba(36,129,204,0.3);
  }

  /* ── Summary cards ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .cards.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 15px 14px;
    box-shadow: var(--shadow);
    animation: riseIn 0.3s ease backwards;
  }
  .card .c-icon { font-size: 16px; margin-bottom: 6px; display: block; }
  .card .c-val  { font-size: 28px; font-weight: 900; line-height: 1.05; letter-spacing: -0.8px; }
  .card .c-lbl  { font-size: 11px; color: var(--hint); margin-top: 4px; font-weight: 500; }
  .card.c-users  .c-val { color: var(--link); }
  .card.c-active .c-val { color: var(--green); }
  .card.c-block  .c-val { color: var(--danger); }
  .card.c-msgs   .c-val { color: var(--orange); }
  .card:nth-child(1){animation-delay:.02s} .card:nth-child(2){animation-delay:.06s}
  .card:nth-child(3){animation-delay:.10s} .card:nth-child(4){animation-delay:.14s}

  /* ── Search & filters ── */
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--secondary-bg);
    border-radius: 14px; padding: 10px 14px;
    margin-bottom: 10px; box-shadow: var(--shadow);
  }
  .search-box input {
    flex: 1; border: none; outline: none;
    background: transparent; color: var(--text); font-size: 14px;
  }
  .search-box input::placeholder { color: var(--hint); }

  .segmented {
    display: flex; background: rgba(120,120,128,0.11);
    border-radius: 12px; padding: 3px; margin-bottom: 8px; gap: 2px;
  }
  .segmented button {
    flex: 1; border: none; background: transparent;
    padding: 7px 4px; font-size: 12px; font-weight: 600;
    color: var(--hint); border-radius: 9px; transition: all 0.18s ease;
  }
  .segmented button.active {
    background: var(--secondary-bg); color: var(--text); box-shadow: var(--shadow);
  }

  .sort-row {
    display: flex; gap: 6px; margin: 8px 0 14px;
    overflow-x: auto; padding-bottom: 2px;
  }
  .sort-row::-webkit-scrollbar { display: none; }
  .sort-chip {
    flex-shrink: 0; border: none;
    background: var(--secondary-bg);
    color: var(--hint); font-size: 12px; font-weight: 600;
    padding: 7px 13px; border-radius: 20px; box-shadow: var(--shadow);
  }
  .sort-chip.active { background: var(--link); color: #fff; }

  /* ── Section title ── */
  .section-title {
    font-size: 15px; font-weight: 700;
    margin: 4px 2px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-title .sub { font-size: 12px; font-weight: 500; color: var(--hint); }

  /* ── User cards ── */
  .list { display: flex; flex-direction: column; gap: 10px; }
  .user-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 14px;
    box-shadow: var(--shadow);
    animation: riseIn 0.3s ease backwards;
    overflow: hidden;
  }
  .user-top { display: flex; gap: 11px; align-items: flex-start; }
  .avatar-wrap { position: relative; flex-shrink: 0; }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 16px;
  }
  .status-dot {
    position: absolute; bottom: 0; right: 0;
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid var(--secondary-bg);
  }
  .status-dot.active  { background: var(--green); }
  .status-dot.blocked { background: var(--danger); }
  .status-dot.muted   { background: var(--orange); }

  .user-main { flex: 1; min-width: 0; }
  .user-name {
    font-size: 15px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .user-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .user-sub  { font-size: 11.5px; color: var(--hint); }
  .user-badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 7px;
    white-space: nowrap;
  }
  .user-badge.active  { background: rgba(52,199,89,0.14);  color: var(--green); }
  .user-badge.blocked { background: rgba(255,59,48,0.14);  color: var(--danger); }
  .user-badge.muted   { background: rgba(255,159,10,0.14); color: var(--orange); }
  .user-last { font-size: 11px; color: var(--hint); text-align: right; flex-shrink: 0; line-height: 1.4; }

  /* mini stats row */
  .user-stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0; margin: 12px 0;
    background: rgba(120,120,128,0.07);
    border-radius: 14px; overflow: hidden;
  }
  .stat {
    text-align: center; padding: 9px 2px;
    border-right: 1px solid rgba(120,120,128,0.1);
  }
  .stat:last-child { border-right: none; }
  .stat .n { font-size: 16px; font-weight: 800; }
  .stat .l { font-size: 9px; color: var(--hint); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }

  /* action buttons */
  .actions { display: flex; gap: 7px; flex-wrap: wrap; }
  .actions + .actions { margin-top: 7px; }
  .action-btn {
    flex: 1; min-width: 0; border: none; border-radius: 11px;
    padding: 9px 8px; font-size: 12px; font-weight: 700;
    background: rgba(120,120,128,0.1); color: var(--text);
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .action-btn:active { transform: scale(0.96); opacity: 0.8; }
  .action-btn:disabled { opacity: 0.4; }
  .action-btn.on   { background: var(--link);   color: #fff; }
  .action-btn.danger { background: rgba(255,59,48,0.12); color: var(--danger); }
  .action-btn.danger.on { background: var(--danger); color: #fff; }

  /* expandable details */
  .expand-btn {
    width: 100%; border: none; background: transparent;
    color: var(--link); font-size: 12px; font-weight: 600;
    padding: 10px 0 2px; text-align: center;
  }
  .details {
    display: none; margin-top: 10px; padding-top: 12px;
    border-top: 1px solid rgba(120,120,128,0.12);
  }
  .details.open { display: block; }
  .detail-row {
    display: flex; justify-content: space-between;
    padding: 5px 0; font-size: 12.5px;
    border-bottom: 1px solid rgba(120,120,128,0.06);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .dl { color: var(--hint); }
  .detail-row .dv { font-weight: 600; text-align: right; }

  /* ── Growth chart ── */
  .growth-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 16px 14px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }
  .growth-bars {
    display: flex; align-items: flex-end; gap: 3px;
    height: 110px; margin-top: 12px;
  }
  .growth-bar-col {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; height: 100%;
  }
  .growth-bar {
    width: 100%; border-radius: 4px 4px 0 0;
    min-height: 3px; transition: height 0.5s ease;
  }
  .growth-bar.type-conn { background: linear-gradient(to top, var(--purple), rgba(108,92,231,0.5)); }
  .growth-bar.type-msg  { background: linear-gradient(to top, var(--link), rgba(36,129,204,0.5)); }
  .growth-legend {
    display: flex; justify-content: space-between;
    font-size: 10.5px; color: var(--hint); margin-top: 6px;
  }

  /* ── Analytics Variant B ── */
  .analytics-pills { display: flex; gap: 10px; margin-bottom: 14px; }
  .analytics-pill {
    flex: 1; background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 12px 10px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 9px;
    animation: riseIn 0.3s ease backwards;
  }
  .ap-icon { font-size: 20px; flex-shrink: 0; }
  .ap-val { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.1; }
  .ap-lbl { font-size: 10px; color: var(--hint); margin-top: 1px; }
  .ap-val.c-link   { color: var(--link); }
  .ap-val.c-green  { color: var(--green); }
  .ap-val.c-danger { color: var(--danger); }
  .analytics-chart-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 14px 14px 10px; box-shadow: var(--shadow); margin-bottom: 12px;
  }
  .chart-legend { display: flex; gap: 14px; margin-top: 6px; justify-content: center; }
  .chart-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: var(--hint); }
  .chart-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .analytics-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .integrity-card {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    padding: 14px 10px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .integrity-title { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .integrity-score { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
  .integrity-sub   { font-size: 10px; color: var(--hint); margin-top: 1px; }
  .media-bk-card { background: var(--secondary-bg); border-radius: var(--card-radius); padding: 14px; box-shadow: var(--shadow); }
  .media-bk-title { font-size: 12px; font-weight: 700; margin-bottom: 10px; }
  .media-bk-row { display: flex; align-items: center; gap: 6px; font-size: 11.5px; margin-bottom: 7px; }
  .media-bk-row:last-child { margin-bottom: 0; }
  .media-bk-bar-track { flex: 1; height: 5px; border-radius: 3px; background: rgba(120,120,128,0.12); overflow: hidden; }
  .media-bk-bar-fill  { height: 100%; border-radius: 3px; background: var(--link); }
  .media-bk-count { font-weight: 700; min-width: 24px; text-align: right; }

  /* ── Broadcast ── */
  .broadcast-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 16px; box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .broadcast-label {
    font-size: 13px; font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .broadcast-card textarea {
    width: 100%; min-height: 110px;
    border: 1.5px solid rgba(120,120,128,0.2);
    border-radius: 14px; padding: 12px 13px;
    font-size: 14px; font-family: inherit; color: var(--text);
    background: var(--bg); resize: vertical; outline: none;
    transition: border-color 0.2s;
  }
  .broadcast-card textarea:focus { border-color: var(--link); }
  .char-count { font-size: 11px; color: var(--hint); text-align: right; margin: 5px 2px 10px; }
  .primary-btn {
    width: 100%; border: none; border-radius: 14px; padding: 13px;
    font-size: 14px; font-weight: 700;
    background: linear-gradient(90deg, var(--purple), var(--link));
    color: #fff; box-shadow: 0 3px 10px rgba(36,129,204,0.25);
  }
  .primary-btn:disabled { opacity: 0.5; box-shadow: none; }
  .primary-btn:active { opacity: 0.88; }
  .broadcast-hint {
    font-size: 11.5px; color: var(--hint); margin-top: 10px; line-height: 1.5;
  }

  /* ── Action log ── */
  .log-list { display: flex; flex-direction: column; gap: 8px; }
  .log-item {
    background: var(--secondary-bg);
    border-radius: 16px; padding: 12px 14px;
    box-shadow: var(--shadow);
    display: flex; gap: 12px; align-items: flex-start;
  }
  .log-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    margin-top: 5px;
  }
  .log-dot.settings { background: var(--link); }
  .log-dot.broadcast { background: var(--purple); }
  .log-dot.other { background: var(--hint); }
  .log-body { flex: 1; min-width: 0; }
  .log-top {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 8px; margin-bottom: 3px;
  }
  .log-action { font-size: 13px; font-weight: 700; }
  .log-time { font-size: 11px; color: var(--hint); flex-shrink: 0; }
  .log-admin { font-size: 11.5px; color: var(--link); margin-bottom: 2px; }
  .log-details { font-size: 11.5px; color: var(--hint); word-break: break-word; }

  /* ── Messages / Pager ── */
  .message-item {
    background: var(--secondary-bg);
    border-radius: 16px; padding: 12px 14px; margin-bottom: 8px;
    box-shadow: var(--shadow);
  }
  .message-top {
    display: flex; justify-content: space-between; gap: 8px;
    font-size: 12.5px; font-weight: 700; margin-bottom: 4px;
  }
  .message-time { font-size: 10.5px; color: var(--hint); font-weight: 500; }
  .message-text { font-size: 13.5px; white-space: pre-wrap; word-break: break-word; line-height: 1.45; }
  .message-flags { margin-top: 6px; display: flex; gap: 5px; }
  .m-flag {
    font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 7px;
    background: rgba(120,120,128,0.12); color: var(--hint);
  }
  .m-flag.edited  { background: rgba(255,159,10,0.14); color: var(--orange); }
  .m-flag.deleted { background: rgba(255,59,48,0.14);  color: var(--danger); }

  .pager {
    display: flex; justify-content: space-between;
    align-items: center; margin: 14px 0 4px;
  }
  .pager-btn {
    border: none; border-radius: 12px; padding: 9px 16px;
    font-size: 13px; font-weight: 700;
    background: var(--secondary-bg); color: var(--link);
    box-shadow: var(--shadow);
  }
  .pager-btn:disabled { opacity: 0.35; }
  .pager span { font-size: 12.5px; color: var(--hint); font-weight: 500; }

  /* ── Back link ── */
  .back-link {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--link); font-size: 13.5px; font-weight: 600;
    margin-bottom: 14px; padding: 4px 0;
  }

  /* ── Bottom sheet ── */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 20; opacity: 0; pointer-events: none;
    transition: opacity 0.22s ease;
  }
  .sheet-overlay.show { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; max-height: 85vh;
    background: var(--bg); border-radius: 24px 24px 0 0; z-index: 21;
    transform: translateY(100%); transition: transform 0.26s cubic-bezier(.2,.8,.2,1);
    display: flex; flex-direction: column;
    box-shadow: 0 -6px 30px rgba(0,0,0,0.18);
  }
  .sheet.show { transform: translateY(0); }
  .sheet-handle {
    width: 38px; height: 4px; background: rgba(120,120,128,0.28);
    border-radius: 3px; margin: 12px auto 0; flex-shrink: 0; cursor: pointer;
  }
  .sheet-header { padding: 14px 16px 10px; flex-shrink: 0; }
  .sheet-header h2 { margin: 0 0 3px; font-size: 17px; font-weight: 700; }
  .sheet-header p  { margin: 0; color: var(--hint); font-size: 12.5px; }
  .sheet-divider { height: 1px; background: rgba(120,120,128,0.12); flex-shrink: 0; }
  .sheet-body { overflow-y: auto; padding: 14px 14px 28px; }

  /* ── Chat cards (in sheet) ── */
  .chat-card {
    background: var(--secondary-bg);
    border-radius: 16px; padding: 12px 14px; margin-bottom: 10px;
    box-shadow: var(--shadow); cursor: pointer;
    transition: background 0.12s;
  }
  .chat-card:active { background: rgba(120,120,128,0.07); }
  .chat-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .chat-name { font-size: 14px; font-weight: 700; }
  .chat-sub  { font-size: 11px; color: var(--hint); margin-top: 2px; }
  .chat-chips { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .chat-chip {
    font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 7px;
    background: rgba(120,120,128,0.12); color: var(--hint); white-space: nowrap;
  }
  .chat-chip.streak { background: rgba(255,159,10,0.15); color: var(--orange); }
  .chat-chip.mutual { background: rgba(52,199,89,0.15);  color: var(--green); }
  .chat-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0; margin-top: 10px;
    background: rgba(120,120,128,0.07); border-radius: 12px; overflow: hidden;
  }
  .chat-stats .stat { padding: 7px 2px; border-right: 1px solid rgba(120,120,128,0.1); }
  .chat-stats .stat:last-child { border-right: none; }
  .chat-stats .stat .n { font-size: 14px; }

  /* ── Empty / Error / Toast ── */
  .empty, .error {
    text-align: center; padding: 44px 20px; color: var(--hint);
    font-size: 14px; line-height: 1.55;
    background: var(--secondary-bg); border-radius: var(--card-radius);
  }
  .empty .big-emoji, .error .big-emoji { font-size: 42px; display: block; margin-bottom: 12px; }

  .toast {
    position: fixed; left: 50%; bottom: 24px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,22,0.92); color: #fff;
    padding: 10px 18px; border-radius: 30px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: all 0.25s ease; pointer-events: none; z-index: 30;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Skeleton ── */
  .skeleton { animation: pulse 1.2s ease-in-out infinite; }

  /* ── Keyframes ── */
  @keyframes fadeDown { from{opacity:0;transform:translateY(-7px)} to{opacity:1;transform:none} }
  @keyframes riseIn   { from{opacity:0;transform:translateY(9px)}  to{opacity:1;transform:none} }
  @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.45} }
  /* ── Balance edit modal ── */
  .balance-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 2000;
  }
  .balance-sheet {
    background: var(--secondary-bg);
    border-radius: 20px 20px 0 0;
    padding: 22px 18px 32px;
    width: 100%; max-width: 440px;
    box-shadow: 0 -4px 28px rgba(0,0,0,0.2);
    animation: riseIn 0.22s ease;
  }
  .balance-sheet-title { font-size: 15px; font-weight: 700; text-align: center; margin-bottom: 12px; }
  .balance-current { text-align: center; font-size: 30px; font-weight: 900; color: var(--purple); margin-bottom: 3px; }
  .balance-current-lbl { text-align: center; font-size: 12px; color: var(--hint); margin-bottom: 16px; }
  .balance-presets { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; justify-content: center; }
  .balance-preset { border: none; border-radius: 9px; padding: 5px 12px; font-size: 12px; font-weight: 600; background: rgba(120,120,128,0.12); color: var(--text); touch-action: manipulation; }
  .balance-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .balance-number-input {
    flex: 1; border: 1.5px solid rgba(120,120,128,0.28); border-radius: 11px;
    padding: 10px 14px; font-size: 17px; font-weight: 700;
    background: var(--bg); color: var(--text); text-align: center;
  }
  .balance-set-btn {
    border: none; border-radius: 11px; padding: 10px 16px;
    font-size: 14px; font-weight: 700; background: var(--link); color: #fff;
    touch-action: manipulation;
  }
  .balance-cancel-btn {
    display: block; width: 100%; text-align: center; padding: 10px;
    font-size: 14px; color: var(--hint); border: none; background: none;
  }
  .balance-mode-row {
    display: flex; gap: 8px; margin-bottom: 14px;
  }
  .balance-mode-btn {
    flex: 1; border: 1.5px solid rgba(120,120,128,0.22); border-radius: 11px;

  /* ── Subscription admin tab ── */
  .sub-admin-card {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    padding: 16px; box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .sub-admin-title {
    font-size: 14px; font-weight: 700; margin-bottom: 14px;
    display: flex; align-items: center; gap: 7px;
  }
  .sub-field { margin-bottom: 12px; }
  .sub-field label { font-size: 12px; color: var(--hint); font-weight: 600; display: block; margin-bottom: 5px; }
  .sub-field input[type="text"],
  .sub-field input[type="number"],
  .sub-field textarea {
    width: 100%; border: 1.5px solid rgba(120,120,128,0.2);
    border-radius: 12px; padding: 10px 12px;
    font-size: 14px; font-family: inherit; color: var(--text);
    background: var(--bg); outline: none; transition: border-color .2s;
    box-sizing: border-box;
  }
  .sub-field input:focus,
  .sub-field textarea:focus { border-color: var(--link); }
  .sub-toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid rgba(120,120,128,.09); margin-bottom: 12px;
  }
  .sub-toggle-lbl { font-size: 14px; font-weight: 700; }
  .sub-toggle-sub { font-size: 12px; color: var(--hint); }
  .toggle-switch {
    position: relative; width: 46px; height: 26px; flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; inset: 0;
    background: rgba(120,120,128,0.25); border-radius: 13px; transition: .3s;
  }
  .toggle-slider::before {
    content: ""; position: absolute; height: 20px; width: 20px;

  .toggle-switch input:checked + .toggle-slider { background: var(--green); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
  .benefit-row {

  .benefit-row:last-child { border-bottom: none; }
  .benefit-name { font-size: 13px; font-weight: 600; }
  .benefit-hint { font-size: 11px; color: var(--hint); }
  .benefit-input {
    border: 1.5px solid rgba(120,120,128,0.2); border-radius: 10px;

  .sub-save-btn {

  .sub-save-btn:disabled { opacity: .5; }
  .sub-subscriber-card {
    background: var(--bg); border-radius: 14px;
    padding: 13px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;

  }
  .sub-sub-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #5856d6, var(--link));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px; flex-shrink: 0;
  }
  .sub-sub-info { flex: 1; min-width: 0; }
  .sub-sub-id   { font-size: 13px; font-weight: 700; }
  .sub-sub-meta { font-size: 11.5px; color: var(--hint); margin-top: 2px; }
  .sub-revoke-btn {
    border: none; border-radius: 9px; padding: 6px 11px;
    font-size: 12px; font-weight: 700;
    background: rgba(255,59,48,.12); color: var(--danger);

  }
  .sub-grant-form {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .sub-grant-form input {
    flex: 1; min-width: 120px; border: 1.5px solid rgba(120,120,128,0.2);
    border-radius: 11px; padding: 9px 12px;
    font-size: 13px; background: var(--bg); color: var(--text); outline: none;
    box-sizing: border-box;
  }
  .sub-grant-btn {
    border: none; border-radius: 11px; padding: 9px 14px;
    font-size: 13px; font-weight: 700;
    background: rgba(52,199,89,.13); color: var(--green);
    touch-action: manipulation; white-space: nowrap;
  }
  .sub-status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 8px;
  }
  .sub-status-pill.on  { background: rgba(52,199,89,.14);  color: var(--green); }
  .sub-status-pill.off { background: rgba(255,59,48,.14);  color: var(--danger); }

  /* ── Dynamic benefits editor ── */
  .dyn-benefit-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid rgba(120,120,128,.07);
  }
  .dyn-benefit-row:last-child { border-bottom: none; }
  .dyn-del-btn {
    border: none; border-radius: 8px; padding: 4px 8px;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
    background: rgba(255,59,48,.12); color: var(--danger);
    touch-action: manipulation;
  }
  .quickadd-wrap { margin-top: 12px; }
  .quickadd-label { font-size: 11px; color: var(--hint); font-weight: 600; margin-bottom: 6px; }
  .quickadd-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .quickadd-chip {
    border: 1.5px dashed rgba(120,120,128,.35);
    border-radius: 10px; padding: 5px 11px;
    font-size: 12px; font-weight: 600; color: var(--hint);
    background: transparent; touch-action: manipulation;
  }
  .custom-ben-add { margin-top: 10px; }
  .custom-ben-row { display: flex; gap: 7px; margin-top: 8px; flex-wrap: wrap; }
  .custom-ben-row input {
    flex: 1; min-width: 100px; border: 1.5px solid rgba(120,120,128,.22);
    border-radius: 10px; padding: 8px 11px;
    font-size: 13px; background: var(--bg); color: var(--text); outline: none;
  }
  .custom-ben-add-btn {
    border: none; border-radius: 10px; padding: 8px 14px;
    font-size: 13px; font-weight: 700;
    background: rgba(36,129,204,.13); color: var(--link);
    touch-action: manipulation; white-space: nowrap;
  }
  .show-custom-btn {
    border: none; background: none; color: var(--link);
    font-size: 13px; font-weight: 600; padding: 6px 0;
    touch-action: manipulation;
  }

  /* ── Shop admin tab ── */
  .shop-item-card {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    padding: 16px; box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .shop-item-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .shop-item-title { font-size: 14px; font-weight: 700; }
  .shop-field { margin-bottom: 12px; }
  .shop-field label { font-size: 12px; color: var(--hint); font-weight: 600; display: block; margin-bottom: 5px; }
  .shop-field input[type="number"], .shop-field input[type="text"] {
    width: 100%; border: 1.5px solid rgba(120,120,128,.2);
    border-radius: 12px; padding: 10px 12px;
    font-size: 14px; font-family: inherit; color: var(--text);
    background: var(--bg); outline: none; transition: border-color .2s;
    box-sizing: border-box;
  }
  .shop-field input:focus { border-color: var(--link); }
  .shop-options-wrap { margin-top: 4px; }
  .shop-options-label { font-size: 12px; color: var(--hint); font-weight: 600; margin-bottom: 7px; }
  .shop-options-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .shop-option-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(36,129,204,.12); color: var(--link);
    border-radius: 10px; padding: 5px 10px; font-size: 12px; font-weight: 700;
  }
  .shop-option-del {
    border: none; background: none; color: var(--link);
    font-size: 13px; font-weight: 700; padding: 0; cursor: pointer; line-height: 1;
  }
  .shop-add-option-row { display: flex; gap: 7px; }
  .shop-add-option-row input {
    flex: 1; border: 1.5px solid rgba(120,120,128,.22);
    border-radius: 10px; padding: 7px 11px; font-size: 13px;
    background: var(--bg); color: var(--text); outline: none;
  }
  .shop-add-option-btn {
    border: none; border-radius: 10px; padding: 7px 14px;
    font-size: 13px; font-weight: 700;
    background: rgba(52,199,89,.13); color: var(--green);
    touch-action: manipulation; white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="avatar-ring">🛠</div>
    <h1>Админ-панель</h1>
    <p id="subtitle">Загружаем данные…</p>
  </div>

  <div class="tab-row" id="mainTabs">
    <button class="tab-chip active" data-tab="users">👥 Пользователи</button>
    <button class="tab-chip" data-tab="growth">📈 Аналитика</button>
    <button class="tab-chip" data-tab="broadcast">📢 Рассылка</button>
    <button class="tab-chip" data-tab="log">📜 Журнал</button>
    <button class="tab-chip" data-tab="subscription">⭐ Подписка</button>
    <button class="tab-chip" data-tab="shop">🛒 Магазин</button>
    <button class="tab-chip" data-tab="referral">🔗 Рефералы</button>
    <button class="tab-chip" id="btnInfographic" onclick="downloadInfographic(this)">📊 Инфографика</button>
  </div>

  <div id="content">
    <div class="cards skeleton">
      <div class="card"><span class="c-icon">👥</span><div class="c-val">—</div><div class="c-lbl">Пользователей</div></div>
      <div class="card"><span class="c-icon">✅</span><div class="c-val">—</div><div class="c-lbl">Активных</div></div>
      <div class="card"><span class="c-icon">🚫</span><div class="c-val">—</div><div class="c-lbl">Заблокировано</div></div>
      <div class="card"><span class="c-icon">💬</span><div class="c-val">—</div><div class="c-lbl">Сообщений</div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="sheet-overlay" id="sheetOverlay"></div>
  <div class="sheet" id="chatsSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheetTitle">Чаты</h2>
      <p id="sheetSubtitle">Загружаем…</p>
    </div>
    <div class="sheet-divider"></div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const initData = tg ? tg.initData : "";
    let overview = null;
    let searchQuery = "";
    let filterMode = "all";
    let sortMode = "messages";
    const expandedIds = new Set();
    let currentTab = "users";
    let growthData = null;
    let actionLogPage = 1;
    let actionLogData = null;
    let currentSheetUser = null;
    let messagesPage = 1;
    let currentChatId = null;

    // Escape HTML to prevent XSS when injecting untrusted user/message data via innerHTML
    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    const AVATAR_COLORS = ["#FF6B6B","#4ECDC4","#45AAF2","#F7B731","#A55EEA","#26DE81","#FD9644","#2BCBBA"];

    function colorFor(seed) {
      let h = 0;
      for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
      return AVATAR_COLORS[h % AVATAR_COLORS.length];
    }

    function initials(name) {
      const parts = name.trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "?";
      if (parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function fmtDate(iso) {
      if (!iso) return "нет данных";
      const d = new Date(iso);
      return d.toLocaleDateString("ru-RU") + " " + d.toLocaleTimeString("ru-RU", {hour:"2-digit", minute:"2-digit"});
    }

    function timeAgo(iso) {
      if (!iso) return "нет активности";
      const diff = Date.now() - new Date(iso).getTime();
      const min = Math.floor(diff / 60000);
      if (min < 1)  return "только что";
      if (min < 60) return `${min} мин назад`;
      const hr = Math.floor(min / 60);
      if (hr < 24)  return `${hr} ч назад`;
      const days = Math.floor(hr / 24);
      if (days < 30) return `${days} дн назад`;
      return new Date(iso).toLocaleDateString("ru-RU");
    }

    function displayName(u) {
      const name = [u.first_name, u.last_name].filter(Boolean).join(" ");
      return name || (u.username ? "@" + u.username : "ID " + u.owner_telegram_id);
    }

    function confirmAction(message) {
      return new Promise(resolve => {
        if (tg && tg.showConfirm) tg.showConfirm(message, ok => resolve(!!ok));
        else resolve(window.confirm(message));
      });
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2400);
    }

    function getFilteredSorted() {
      let list = overview.users.slice();
      if (filterMode === "active")  list = list.filter(u => !u.is_blocked);
      if (filterMode === "blocked") list = list.filter(u => u.is_blocked);
      if (filterMode === "muted")   list = list.filter(u => !u.notifications_enabled);
      if (searchQuery) {
        list = list.filter(u =>
          displayName(u).toLowerCase().includes(searchQuery) ||
          (u.username || "").toLowerCase().includes(searchQuery) ||
          String(u.owner_telegram_id).includes(searchQuery)
        );
      }
      const sorters = {
        messages: (a,b) => b.total_messages - a.total_messages,
        recent:   (a,b) => new Date(b.last_activity_at||0) - new Date(a.last_activity_at||0),
        newest:   (a,b) => new Date(b.connected_at||0) - new Date(a.connected_at||0),
        coins:    (a,b) => (b.wallet_balance||0) - (a.wallet_balance||0),
      };
      return list.sort(sorters[sortMode] || sorters.messages);
    }

    function userStatusClass(u) {
      if (u.is_blocked) return "blocked";
      if (!u.notifications_enabled) return "muted";
      return "active";
    }
    function userStatusLabel(u) {
      if (u.is_blocked) return "🚫 Заблок.";
      if (!u.notifications_enabled) return "🔕 Без увед.";
      return "✓ Активен";
    }

    function renderUser(u) {
      const isOpen = expandedIds.has(u.owner_telegram_id);
      const statusCls = userStatusClass(u);
      const name = displayName(u);
      const sub = u.username ? "@" + esc(u.username) : "ID " + esc(u.owner_telegram_id);
      return `
        <div class="user-card" data-owner="${esc(u.owner_telegram_id)}">
          <div class="user-top">
            <div class="avatar-wrap">
              <div class="avatar" style="background:${colorFor(name)}">${esc(initials(name))}</div>
              <div class="status-dot ${statusCls}"></div>
            </div>
            <div class="user-main">
              <div class="user-name">${esc(name)}</div>
              <div class="user-meta">
                <span class="user-sub">${sub}</span>
                <span class="user-badge ${statusCls}">${userStatusLabel(u)}</span>
              </div>
            </div>
            <div class="user-last">
              <div style="font-size:11px;color:var(--hint)">активен</div>
              <div style="font-size:12px;font-weight:600">${esc(timeAgo(u.last_activity_at))}</div>
            </div>
          </div>

          <div class="user-stats">
            <div class="stat"><div class="n">${esc(u.total_messages)}</div><div class="l">Сообщ.</div></div>
            <div class="stat"><div class="n">${esc(u.total_chats)}</div><div class="l">Чаты</div></div>
            <div class="stat"><div class="n">${esc(u.edited_messages)}</div><div class="l">Правки</div></div>
            <div class="stat"><div class="n">${esc(u.deleted_messages)}</div><div class="l">Удал.</div></div>
            <div class="stat"><div class="n" style="color:var(--purple)">${u.wallet_balance != null ? u.wallet_balance.toLocaleString("ru-RU") : "—"}</div><div class="l">🪙 Монеты</div></div>
          </div>

          <div class="actions">
            <button class="action-btn ${u.notifications_enabled ? "on" : ""}" data-action="notifications" data-value="${!u.notifications_enabled}">
              ${u.notifications_enabled ? "🔔 Увед. вкл" : "🔕 Увед. выкл"}
            </button>
            <button class="action-btn danger ${u.is_blocked ? "on" : ""}" data-action="block" data-value="${!u.is_blocked}">
              ${u.is_blocked ? "✅ Разблокировать" : "🚫 Заблокировать"}
            </button>
          </div>
          <div class="actions" style="margin-top:7px">
            <button class="action-btn" data-action="chats">💬 Чаты</button>
            ${u.username ? `<button class="action-btn" data-action="message" data-username="${esc(u.username)}">✉️ Написать</button>` : ""}
            <button class="action-btn" data-action="copy-id" data-copy="${esc(u.owner_telegram_id)}">📋 ID</button>
            <button class="action-btn" data-action="edit-balance" data-owner-id="${esc(u.owner_telegram_id)}" data-balance="${u.wallet_balance ?? 0}">💰 Баланс</button>
          </div>

          <button class="expand-btn" data-toggle-details>${isOpen ? "Скрыть ▲" : "Подробнее ▼"}</button>
          <div class="details ${isOpen ? "open" : ""}">
            <div class="detail-row"><span class="dl">Подключён</span><span class="dv">${esc(fmtDate(u.connected_at))}</span></div>
            <div class="detail-row"><span class="dl">Последняя активность</span><span class="dv">${esc(timeAgo(u.last_activity_at))}</span></div>
            <div class="detail-row"><span class="dl">Может отвечать</span><span class="dv">${u.can_reply ? "✓ Да" : "— Нет"}</span></div>
            <div class="detail-row"><span class="dl">Подключение (TG)</span><span class="dv">${u.is_enabled ? "✓ Включено" : "— Выключено"}</span></div>
          </div>
        </div>
      `;
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll("#mainTabs .tab-chip").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      if (tab === "users")          render();
      else if (tab === "growth")    loadGrowth();
      else if (tab === "broadcast") renderBroadcastTab();
      else if (tab === "log")       loadActionLog(1);
      else if (tab === "subscription") loadSubscriptionTab();
      else if (tab === "shop")         loadShopAdminTab();
      else if (tab === "referral")     loadReferralAdminTab();
    }

    function render() {
      if (currentTab !== "users") return;
      const content  = document.getElementById("content");
      const subtitle = document.getElementById("subtitle");
      subtitle.textContent = "Все подключённые пользователи бота";

      const activeCount   = overview.users.filter(u => !u.is_blocked).length;
      const blockedCount  = overview.users.filter(u => u.is_blocked).length;
      const totalMessages = overview.users.reduce((s, u) => s + u.total_messages, 0);

      const cards = `
        <div class="cards">
          <div class="card c-users"><span class="c-icon">👥</span><div class="c-val">${overview.total_users}</div><div class="c-lbl">Пользователей</div></div>
          <div class="card c-active"><span class="c-icon">✅</span><div class="c-val">${activeCount}</div><div class="c-lbl">Активных</div></div>
          <div class="card c-block"><span class="c-icon">🚫</span><div class="c-val">${blockedCount}</div><div class="c-lbl">Заблокировано</div></div>
          <div class="card c-msgs"><span class="c-icon">💬</span><div class="c-val">${totalMessages}</div><div class="c-lbl">Сообщений всего</div></div>
        </div>
      `;

      if (!overview.users.length) {
        content.innerHTML = cards + `<div class="empty"><span class="big-emoji">👥</span>Пока никто не подключил бота.</div>`;
        return;
      }

      const controls = `
        <div class="search-box">
          <span>🔍</span>
          <input id="searchInput" type="text" placeholder="Поиск по имени, юзернейму, ID…" value="${searchQuery}" />
        </div>
        <div class="segmented" id="filterTabs">
          <button data-filter="all"     class="${filterMode==="all"     ?"active":""}">Все</button>
          <button data-filter="active"  class="${filterMode==="active"  ?"active":""}">Активные</button>
          <button data-filter="blocked" class="${filterMode==="blocked" ?"active":""}">Заблок.</button>
          <button data-filter="muted"   class="${filterMode==="muted"   ?"active":""}">Без увед.</button>
        </div>
        <div class="sort-row" id="sortTabs">
          <button class="sort-chip ${sortMode==="messages"?"active":""}" data-sort="messages">По сообщениям</button>

          <button class="sort-chip ${sortMode==="newest"  ?"active":""}" data-sort="newest">По дате</button>
          <button class="sort-chip ${sortMode==="coins"   ?"active":""}" data-sort="coins">По монетам 🪙</button>

      `;

      const filtered = getFilteredSorted();
      const listHtml = filtered.length
        ? `<div class="section-title">Пользователи <span class="sub">${filtered.length} из ${overview.users.length}</span></div><div class="list">${filtered.map(renderUser).join("")}</div>`
        : `<div class="empty"><span class="big-emoji">🔎</span>Никого не нашлось.</div>`;

      content.innerHTML = cards + controls + listHtml;
      attachHandlers();

    function attachHandlers() {
      const input = document.getElementById("searchInput");
      if (input) {
        input.addEventListener("input", (e) => {
          searchQuery = e.target.value.toLowerCase();
          const caret = e.target.selectionStart;
          render();
          const ni = document.getElementById("searchInput");
          if (ni) { ni.focus(); ni.setSelectionRange(caret, caret); }
        });
      }
      document.querySelectorAll("#filterTabs button").forEach(btn => {
        btn.addEventListener("click", () => { filterMode = btn.dataset.filter; render(); });
      });
      document.querySelectorAll("#sortTabs button").forEach(btn => {
        btn.addEventListener("click", () => { sortMode = btn.dataset.sort; render(); });
      });
      document.querySelectorAll("[data-toggle-details]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = Number(btn.closest(".user-card").dataset.owner);
          if (expandedIds.has(id)) expandedIds.delete(id);
          else expandedIds.add(id);
          render();
        });
      });
      document.querySelectorAll(".action-btn[data-action='notifications'], .action-btn[data-action='block']").forEach(btn => {
        btn.addEventListener("click", () => onToggle(btn));
      });
      document.querySelectorAll(".action-btn[data-action='message']").forEach(btn => {
        btn.addEventListener("click", () => {
          const username = btn.dataset.username;
          if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
          if (tg?.openTelegramLink) tg.openTelegramLink(`https://t.me/${username}`);
          else window.open(`https://t.me/${username}`, "_blank");
        });
      });
      document.querySelectorAll(".action-btn[data-action='copy-id']").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.copy;
          try {
            await navigator.clipboard.writeText(id);
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
            showToast("ID скопирован: " + id);
          } catch { if (tg) tg.showAlert("ID: " + id); }
        });
      });
      document.querySelectorAll(".action-btn[data-action='chats']").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = Number(btn.closest(".user-card").dataset.owner);
          const user = overview.users.find(u => u.owner_telegram_id === id);
          if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
          openChatsSheet(user);
        });
      });
      document.querySelectorAll(".action-btn[data-action='edit-balance']").forEach(btn => {
        btn.addEventListener("click", () => {
          const ownerId  = Number(btn.dataset.ownerId);
          const curBal   = Number(btn.dataset.balance) || 0;
          if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
          openBalanceEditor(ownerId, curBal, btn);
        });
      });
    }

    function openBalanceEditor(ownerId, currentBalance, triggerBtn) {
      let mode = "set"; // "set" | "add" | "sub"

      const PRESETS = {
        set: [0, 100, 500, 1000, 5000, 10000],
        add: [10, 50, 100, 500, 1000, 5000],
        sub: [10, 50, 100, 500, 1000, "всё"],
      };
      const MODE_LABELS = { set: "Задать", add: "Добавить", sub: "Вычесть" };
      const MODE_COLORS = { set: "var(--purple)", add: "#4ADE80", sub: "#EF4444" };

      const overlay = document.createElement("div");
      overlay.className = "balance-overlay";
      document.body.appendChild(overlay);

      function render() {
        const presets = PRESETS[mode];
        const defVal  = mode === "set" ? currentBalance : (mode === "add" ? 100 : 50);
        overlay.innerHTML = `
          <div class="balance-sheet">
            <div class="balance-sheet-title">💰 Баланс пользователя</div>
            <div class="balance-current" style="color:${MODE_COLORS[mode]}">${currentBalance.toLocaleString("ru-RU")} 🪙</div>
            <div class="balance-current-lbl">Текущий баланс</div>

            <div class="balance-mode-row">
              ${["set","add","sub"].map(m => `
                <button class="balance-mode-btn ${mode===m?"active":""}" data-mode="${m}"
                  style="${mode===m ? `background:${MODE_COLORS[m]};color:#fff` : ""}">
                  ${m==="set"?"✏️ Задать":m==="add"?"➕ Добавить":"➖ Вычесть"}
                </button>`).join("")}
            </div>

            <div class="balance-presets">
              ${presets.map(v =>
                `<button class="balance-preset" data-val="${v === "всё" ? currentBalance : v}">
                  ${mode==="add"?"+":""}${typeof v==="number"?v.toLocaleString("ru-RU"):v}
                </button>`
              ).join("")}
            </div>

            <div class="balance-input-row">
              <input type="number" class="balance-number-input" id="balanceInput"
                min="${mode==="set"?0:1}" max="10000000" value="${defVal}"
                placeholder="${mode==="set"?"Новый баланс":mode==="add"?"Сколько добавить":"Сколько вычесть"}" />
              <button class="balance-set-btn" id="balanceSetBtn"
                style="background:${MODE_COLORS[mode]}">${MODE_LABELS[mode]}</button>
            </div>

            <button class="balance-cancel-btn" id="balanceCancelBtn">Отмена</button>
          </div>
        `;

        overlay.querySelectorAll(".balance-mode-btn").forEach(b => {
          b.addEventListener("click", () => { mode = b.dataset.mode; render(); });
        });
        overlay.querySelectorAll(".balance-preset").forEach(b => {
          b.addEventListener("click", () => {
            const inp = overlay.querySelector("#balanceInput");
            if (inp) inp.value = b.dataset.val;
          });
        });
        overlay.querySelector("#balanceCancelBtn").addEventListener("click", () => overlay.remove());

        overlay.querySelector("#balanceSetBtn").addEventListener("click", async () => {
          const inp     = overlay.querySelector("#balanceInput");
          const rawVal  = Math.max(0, Math.min(10_000_000, Number(inp?.value) || 0));
          const setBtn  = overlay.querySelector("#balanceSetBtn");
          setBtn.disabled = true;
          setBtn.textContent = "…";

          try {
            let endpoint, body;
            if (mode === "set") {
              endpoint = "/app/api/admin/wallet/set";
              body = { initData, ownerTelegramId: ownerId, newBalance: rawVal };
            } else {
              endpoint = "/app/api/admin/wallet/adjust";
              body = { initData, ownerTelegramId: ownerId, delta: mode === "add" ? rawVal : -rawVal };
            }

            const res = await fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || "ошибка");
            const data = await res.json();
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");

            // Update local data
            const u = overview?.users?.find(u => u.owner_telegram_id === ownerId);
            if (u) u.wallet_balance = data.new_balance;
            if (triggerBtn) triggerBtn.dataset.balance = data.new_balance;
            currentBalance = data.new_balance;

            overlay.remove();
            const sign = mode === "add" ? `+${rawVal} → ` : mode === "sub" ? `-${rawVal} → ` : "";
            showToast(`✅ ${sign}${data.new_balance.toLocaleString("ru-RU")} 🪙`);
            render();
          } catch(e) {
            setBtn.disabled = false;
            setBtn.textContent = MODE_LABELS[mode];
            showToast("Ошибка: " + e.message);
          }
        });
      }

      render();
      overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
    }

    // Variant B: hero pills + SVG activity chart + integrity gauge + media breakdown
    function renderGrowth(data, dashData) {
      dashData = dashData || {};

      // ── Hero pills ──
      const totalMsgsAll  = overview ? overview.users.reduce((s,u) => s + u.total_messages, 0) : 0;
      const totalDelAll   = overview ? overview.users.reduce((s,u) => s + u.deleted_messages, 0) : 0;
      const delRate = totalMsgsAll ? Math.round(totalDelAll / totalMsgsAll * 100) : 0;
      const pills = `
        <div class="analytics-pills">
          <div class="analytics-pill" style="animation-delay:.02s">
            <span class="ap-icon">👥</span>
            <div><div class="ap-val c-link">${overview ? overview.total_users : "—"}</div><div class="ap-lbl">Пользователей</div></div>
          </div>
          <div class="analytics-pill" style="animation-delay:.06s">
            <span class="ap-icon">💬</span>
            <div><div class="ap-val c-green">${totalMsgsAll.toLocaleString("ru-RU")}</div><div class="ap-lbl">Сообщений всего</div></div>
          </div>
          <div class="analytics-pill" style="animation-delay:.10s">
            <span class="ap-icon">🗑</span>
            <div><div class="ap-val c-danger">${delRate}%</div><div class="ap-lbl">Удалено</div></div>
          </div>
        </div>`;

      // ── SVG activity chart ──
      const connMap = data.connections_by_day || {};
      const msgMap  = data.messages_by_day   || {};
      const DAYS = 30;
      const today = new Date(); today.setHours(0,0,0,0);
      const dates = [];
      for (let i = DAYS - 1; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        dates.push(d.toISOString().slice(0,10));
      }
      const msgSeries  = dates.map(d => msgMap[d]  || 0);
      const connSeries = dates.map(d => connMap[d] || 0);
      const maxMsg  = Math.max(...msgSeries,  1);
      const maxConn = Math.max(...connSeries, 1);
      const svgW = 300, svgH = 90;
      const slotW = svgW / DAYS;           // each slot = bar + implied gap, exact integer division
      const barW  = Math.max(1, slotW - 1.5);
      const msgBars = msgSeries.map((v, i) => {
        if (!v) return "";
        const h = Math.max(2, Math.round(v / maxMsg * svgH));
        const x = (i * slotW).toFixed(2);
        return `<rect x="${x}" y="${svgH - h}" width="${barW.toFixed(2)}" height="${h}" rx="2" fill="var(--link)" opacity="0.8"><title>${dates[i]}: ${v} сообщ.</title></rect>`;
      }).join("");
      const connBars = connSeries.map((v, i) => {
        if (!v) return "";
        const h = Math.max(2, Math.round(v / maxConn * 24));
        const x = (i * slotW).toFixed(2);
        return `<rect x="${x}" y="${svgH - h}" width="${barW.toFixed(2)}" height="${h}" rx="2" fill="var(--purple)" opacity="0.9"><title>${dates[i]}: ${v} подкл.</title></rect>`;
      }).join("");
      const firstDate = dates[0]     ? new Date(dates[0]).toLocaleDateString("ru-RU",{day:"numeric",month:"short"}) : "";
      const lastDate  = dates.at(-1) ? new Date(dates.at(-1)).toLocaleDateString("ru-RU",{day:"numeric",month:"short"}) : "";
      const chart = `
        <div class="analytics-chart-card">
          <div class="section-title" style="margin-bottom:10px">📈 Активность за 30 дней</div>
          <svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%;height:auto;display:block;overflow:visible">${msgBars}${connBars}</svg>
          <div class="growth-legend" style="margin-top:4px"><span>${firstDate}</span><span>${lastDate}</span></div>
          <div class="chart-legend">
            <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--link)"></div>Сообщения</div>
            <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--purple)"></div>Подключения</div>
          </div>
        </div>`;

      // ── Integrity gauge ──
      const integrity = Math.max(0, Math.min(100, 100 - delRate * 3));
      const iColor = integrity > 70 ? "var(--green)" : integrity > 40 ? "var(--orange)" : "var(--danger)";
      const arcLen = 157.08;
      const filled = (integrity / 100 * arcLen).toFixed(1);
      const gauge = `
        <div class="integrity-card">
          <div class="integrity-title">🛡 Целостность</div>
          <svg viewBox="0 0 120 65" style="width:110px;height:60px">
            <path d="M10,60 A50,50 0 0,1 110,60" fill="none" stroke="rgba(120,120,128,0.15)" stroke-width="12" stroke-linecap="round"/>
            <path d="M10,60 A50,50 0 0,1 110,60" fill="none" stroke="${iColor}" stroke-width="12" stroke-linecap="round"
              stroke-dasharray="${filled} ${arcLen}" style="transition:stroke-dasharray 1s ease"/>
          </svg>
          <div class="integrity-score" style="color:${iColor}">${integrity}</div>
          <div class="integrity-sub">из 100</div>
        </div>`;

      // ── Media breakdown ──
      const ICONS  = {photo:"🖼",voice:"🎙",video:"🎬",document:"📄",sticker:"🎯",audio:"🎵",animation:"🎞",video_note:"⭕"};
      const LABELS = {photo:"Фото",voice:"Голос",video:"Видео",document:"Файлы",sticker:"Стикеры",audio:"Аудио",animation:"GIF",video_note:"Кружки"};
      let mediaBkHtml = "";
      const bk = dashData.media_breakdown;
      if (bk && bk.length) {
        const maxC = Math.max(...bk.map(r => r.count), 1);
        mediaBkHtml = bk.sort((a,b) => b.count - a.count).slice(0,6).map(r => {
          const pct = Math.round(r.count / maxC * 100);
          return `<div class="media-bk-row">
            <span>${ICONS[r.media_type] || "📁"}</span>
            <span style="color:var(--hint);min-width:46px">${LABELS[r.media_type] || r.media_type}</span>
            <div class="media-bk-bar-track"><div class="media-bk-bar-fill" style="width:${pct}%"></div></div>
            <span class="media-bk-count">${r.count}</span>
          </div>`;
        }).join("");
      } else {
        mediaBkHtml = `<div style="color:var(--hint);font-size:12px;text-align:center;padding:12px 0">Нет медиа</div>`;
      }
      const mediaCard = `<div class="media-bk-card"><div class="media-bk-title">📎 Медиа</div>${mediaBkHtml}</div>`;

      return pills + chart + `<div class="analytics-bottom">${gauge}${mediaCard}</div>`;
    }

    /* ── Broadcast ── */
    function renderBroadcastTab() {
      const content  = document.getElementById("content");
      const subtitle = document.getElementById("subtitle");
      subtitle.textContent = "Рассылка активным пользователям";
      const activeCount = overview ? overview.users.filter(u => !u.is_blocked).length : "—";
      content.innerHTML = `
        <div class="broadcast-card">
          <div class="broadcast-label">📢 Текст сообщения</div>
          <textarea id="broadcastText" placeholder="Введи текст рассылки…" maxlength="4096"></textarea>
          <div class="char-count" id="charCount">0 / 4096</div>
          <button class="primary-btn" id="broadcastSendBtn">Отправить всем (${activeCount} польз.)</button>
          <div class="broadcast-hint">Сообщение получат все активные пользователи, не заблокированные в боте. Действие необратимо.</div>
        </div>
      `;
      const textarea = document.getElementById("broadcastText");

    async function sendBroadcast() {
      const textarea = document.getElementById("broadcastText");
      const btn = document.getElementById("broadcastSendBtn");
      const text = textarea.value.trim();
      if (!text) { if (tg) tg.showAlert("Введи текст сообщения."); return; }
      const confirmed = await confirmAction(`Отправить это сообщение всем активным пользователям?\n\n"${text.slice(0,200)}${text.length > 200 ? "…" : ""}"`);
      if (!confirmed) return;
      btn.disabled = true; btn.textContent = "⏳ Отправляем…";
      try {
        const res = await fetch("/app/api/admin/broadcast", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData, text})
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        showToast(`✅ Отправлено: ${data.sent} из ${data.total_recipients}`);
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        textarea.value = "";
        document.getElementById("charCount").textContent = "0 / 4096";
      } catch { if (tg) tg.showAlert("Не удалось отправить. Попробуй ещё раз."); }
      finally {
        btn.disabled = false;
        const activeCount = overview ? overview.users.filter(u => !u.is_blocked).length : "—";
        btn.textContent = `Отправить всем (${activeCount} польз.)`;
      }
    }

    const ACTION_META = {
      update_settings: { label: "Изменение настроек", dot: "settings" },
      broadcast:       { label: "Рассылка",            dot: "broadcast" },
    };

    function renderActionLog(data) {
      if (!data.entries.length) {
        return `<div class="empty"><span class="big-emoji">📜</span>Журнал пока пуст.</div>`;
      }
      const items = data.entries.map(e => {
        const meta = ACTION_META[e.action] || { label: esc(e.action), dot: "other" };
        return `
          <div class="log-item">
            <div class="log-dot ${meta.dot}"></div>
            <div class="log-body">
              <div class="log-top">
                <span class="log-action">${meta.label}</span>
                <span class="log-time">${esc(fmtDate(e.created_at))}</span>
              </div>
              ${e.admin_username ? `<div class="log-admin">@${esc(e.admin_username)}</div>` : ""}
              ${e.target_owner_telegram_id ? `<div class="log-details">Пользователь ID: ${esc(e.target_owner_telegram_id)}</div>` : ""}
              ${e.details ? `<div class="log-details">${esc(e.details)}</div>` : ""}
            </div>
          </div>
        `;
      }).join("");
      const totalPages = Math.max(1, Math.ceil(data.total / data.page_size));
      return `<div class="log-list">${items}</div>` + renderPager(data.page, totalPages, "log");
    }

    function renderPager(page, totalPages, kind) {
      return `
        <div class="pager">
          <button class="pager-btn" data-pager="${kind}" data-page="${page-1}" ${page<=1?"disabled":""}>← Назад</button>
          <span>Стр. ${page} из ${totalPages}</span>
          <button class="pager-btn" data-pager="${kind}" data-page="${page+1}" ${page>=totalPages?"disabled":""}>Вперёд →</button>
        </div>
      `;
    }

    function attachLogPagerHandlers() {
      document.querySelectorAll("[data-pager='log']").forEach(btn => {
        btn.addEventListener("click", () => loadActionLog(Number(btn.dataset.page)));
      });
    }

        });

        const data = await res.json();
        subtitle.textContent = `${data.total_chats} чатов · ${data.total_messages} сообщений`;
        body.innerHTML = data.chats.length
          ? data.chats.map(renderChat).join("")
          : `<div class="empty"><span class="big-emoji">💬</span>Пока нет сообщений.</div>`;
        document.querySelectorAll(".chat-card").forEach(card => {
          card.addEventListener("click", () => {
            openChatMessages(user, Number(card.dataset.chatId), card.dataset.chatName);
          });
        });
      } catch {
        subtitle.textContent = "Ошибка";
        body.innerHTML = `<div class="error"><span class="big-emoji">⚠️</span>Не удалось загрузить чаты.</div>`;
      }
    }

    function renderMessage(m) {
      const sender = esc(
        [m.sender_first_name, m.sender_last_name].filter(Boolean).join(" ")
        || (m.sender_username ? "@" + m.sender_username : "ID " + m.sender_telegram_id)
      );
      const rawText = m.text || m.caption || (m.media_type && m.media_type !== "text" ? `[${m.media_type}]` : "(без текста)");
      const flags = [
        m.is_edited  ? `<span class="m-flag edited">✏️ ред. ${esc(m.edit_count)}</span>` : "",
        m.is_deleted ? `<span class="m-flag deleted">🗑 удалено</span>` : "",
      ].join("");
      return `
        <div class="message-item">
          <div class="message-top">
            <span>${sender}</span>
            <span class="message-time">${esc(fmtDate(m.sent_at))}</span>
          </div>
          <div class="message-text">${esc(rawText)}</div>
          ${flags ? `<div class="message-flags">${flags}</div>` : ""}
        </div>
      `;
    }

    async function openChatMessages(user, chatId, chatName, page) {
      currentChatId = chatId;
      messagesPage  = page || 1;
      const title    = document.getElementById("sheetTitle");
      const subtitle = document.getElementById("sheetSubtitle");
      const body     = document.getElementById("sheetBody");

      title.textContent    = chatName;
      subtitle.textContent = "Загружаем…";
      body.innerHTML = `<a class="back-link" id="backToChats">← Чаты</a>`;

      try {
        const res = await fetch("/app/api/admin/messages", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData, ownerTelegramId: user.owner_telegram_id, chatId, page: messagesPage})
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        subtitle.textContent = `${data.total} сообщений`;
        const totalPages = Math.max(1, Math.ceil(data.total / data.page_size));
        const listHtml = data.messages.length
          ? data.messages.map(renderMessage).join("")
          : `<div class="empty"><span class="big-emoji">💬</span>Сообщений нет.</div>`;
        body.innerHTML = `<a class="back-link" id="backToChats">← Чаты</a>${listHtml}` + renderPager(data.page, totalPages, "messages");
        document.getElementById("backToChats").addEventListener("click", () => openChatsSheet(user));
        document.querySelectorAll("[data-pager='messages']").forEach(btn => {
          btn.addEventListener("click", () => openChatMessages(user, chatId, chatName, Number(btn.dataset.page)));
        });
      } catch {
        subtitle.textContent = "Ошибка";
        body.innerHTML = `<a class="back-link" id="backToChats">← Чаты</a><div class="error"><span class="big-emoji">⚠️</span>Не удалось загрузить сообщения.</div>`;
        document.getElementById("backToChats").addEventListener("click", () => openChatsSheet(user));
      }
    }

    /* ── Toggle settings ── */
    async function onToggle(btn) {
      const card = btn.closest(".user-card");
      const ownerTelegramId = Number(card.dataset.owner);
      const action = btn.dataset.action;
      const value  = btn.dataset.value === "true";

      if (action === "block" && value) {
        const confirmed = await confirmAction("Заблокировать пользователя?\nОн перестанет получать уведомления и не будет виден в статистике.");
        if (!confirmed) return;
      }

      card.querySelectorAll(".action-btn").forEach(b => b.disabled = true);
      const body = { initData, ownerTelegramId };
      if (action === "notifications") body.notificationsEnabled = value;
      if (action === "block") body.isBlocked = value;

      try {
        const res = await fetch("/app/api/admin/settings", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error();
        const user = overview.users.find(u => u.owner_telegram_id === ownerTelegramId);
        if (user) {
          if (action === "notifications") user.notifications_enabled = value;
          if (action === "block") user.is_blocked = value;
        }
        if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        showToast(
          action === "block"
            ? (value ? "🚫 Пользователь заблокирован" : "✅ Пользователь разблокирован")
            : (value ? "🔔 Уведомления включены" : "🔕 Уведомления отключены")
        );
        render();
      } catch {
        card.querySelectorAll(".action-btn").forEach(b => b.disabled = false);
        if (tg) tg.showAlert("Не удалось сохранить. Попробуй ещё раз.");
      }
    }

    async function downloadInfographic(btn) {
      const orig = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = "⏳ Генерация…";
      try {
        const resp = await fetch("/app/api/admin/infographic", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ init_data: initData }),
        });
        if (!resp.ok) throw new Error(await resp.text());
        const blob = await resp.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        const ts   = new Date().toISOString().slice(0, 16).replace("T", "_").replace(":", "-");
        a.download = `bot_stats_${ts}.png`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
        showToast("📊 Инфографика загружена!");
      } catch (e) {
        showToast("❌ Не удалось сгенерировать: " + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = orig;
      }
    }

    function renderBenefitRow(key, val) {
      const m = BENEFIT_META[key] || {
        label: key,
        type: typeof val === "boolean" ? "bool" : "number",
        step: 1, min: 0, max: 99999, hint: "",
      };
      const valInput = m.type === "bool"
        ? `<label class="toggle-switch" style="flex-shrink:0"><input type="checkbox" class="ben-val" ${val ? "checked" : ""}><span class="toggle-slider"></span></label>`
        : `<input class="benefit-input ben-val" type="number" value="${val ?? 0}" min="${m.min ?? 0}" max="${m.max ?? 99999}" step="${m.step ?? 1}">`;
      return `
        <div class="dyn-benefit-row" data-key="${esc(key)}">
          <div style="flex:1;min-width:0">
            <div class="benefit-name">${esc(m.label)}</div>
            ${m.hint ? `<div class="benefit-hint">${esc(m.hint)}</div>` : ""}

          ${valInput}
          <button class="dyn-del-btn" title="Удалить преимущество">✕</button>

    // ── Collect current benefits from DOM ────────────────────────────────────
    function collectBenefits() {
      const rows = document.querySelectorAll(".dyn-benefit-row");
      const result = {};
      rows.forEach(row => {
        const key = row.dataset.key;
        if (!key) return;
        const meta = BENEFIT_META[key] || {};
        const inputEl = row.querySelector(".ben-val");
        if (!inputEl) return;
        if (inputEl.type === "checkbox") {
          result[key] = inputEl.checked;
        } else {
          const raw = inputEl.value;
          result[key] = parseFloat(raw);
          if (isNaN(result[key])) result[key] = parseInt(raw) || 0;
        }
      });
      return result;
    }

    // ── Refresh quick-add chips after add/delete ──────────────────────────────
    function refreshQuickAdd() {
      const existing = [...document.querySelectorAll(".dyn-benefit-row")].map(r => r.dataset.key);
      const unset = Object.keys(BENEFIT_META).filter(k => !existing.includes(k));
      const wrap = document.querySelector(".quickadd-wrap");
      if (!wrap) return;
      if (!unset.length) { wrap.style.display = "none"; return; }
      wrap.style.display = "";
      wrap.querySelector(".quickadd-chips").innerHTML = unset.map(k =>
        `<button class="quickadd-chip" data-key="${k}">${BENEFIT_META[k].label}</button>`
      ).join("");
      wrap.querySelectorAll(".quickadd-chip").forEach(chip => {
        chip.addEventListener("click", () => addBenefitRow(chip.dataset.key, BENEFIT_META[chip.dataset.key]?.type === "bool" ? false : 0));
      });
    }

    function addBenefitRow(key, defaultVal) {
      const container = document.getElementById("dynBenefits");
      // Remove "no benefits" placeholder if present
      const ph = container.querySelector("div[style*='text-align:center']");
      if (ph) ph.remove();
      // Check if key already exists
      if (container.querySelector(`.dyn-benefit-row[data-key="${key}"]`)) {
        showToast(`⚠️ "${key}" уже добавлен`);
        return;
      }
      const tmp = document.createElement("div");
      tmp.innerHTML = renderBenefitRow(key, defaultVal);
      const row = tmp.firstElementChild;
      row.querySelector(".dyn-del-btn").addEventListener("click", () => {
        row.remove();
        refreshQuickAdd();
      });
      container.appendChild(row);
      refreshQuickAdd();
    }

    function attachSubscriptionTabHandlers() {
      // Delete existing benefit rows
      document.querySelectorAll(".dyn-benefit-row .dyn-del-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.currentTarget.closest(".dyn-benefit-row").remove();
          refreshQuickAdd();
        });
      });

      // Quick-add chips
      document.querySelectorAll(".quickadd-chip").forEach(chip => {
        chip.addEventListener("click", () => {
          const key = chip.dataset.key;
          const meta = BENEFIT_META[key] || {};
          addBenefitRow(key, meta.type === "bool" ? false : 0);
        });
      });

      // Show/hide custom add form
      document.getElementById("showCustomBenBtn")?.addEventListener("click", () => {
        const form = document.getElementById("customBenForm");
        form.style.display = form.style.display === "none" ? "" : "none";
      });

      // Add custom benefit
      document.getElementById("addCustomBenBtn")?.addEventListener("click", () => {
        const keyEl = document.getElementById("customBenKey");
        const valEl = document.getElementById("customBenVal");
        const key = keyEl.value.trim().replace(/\s+/g, "_");
        if (!key) { showToast("⚠️ Введи ключ"); return; }
        let val = valEl.value.trim();
        if (val === "true")  val = true;
        else if (val === "false") val = false;
        else { const n = parseFloat(val); val = isNaN(n) ? val : n; }
        addBenefitRow(key, val);
        keyEl.value = ""; valEl.value = "";
        document.getElementById("customBenForm").style.display = "none";
      });

      // Save config
      document.getElementById("subSaveBtn")?.addEventListener("click", async (e) => {
        const btn = e.currentTarget;
        btn.disabled = true;
        btn.textContent = "Сохраняем…";
        try {
          const res = await fetch("/app/api/admin/subscription/update", {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
              initData,
              isEnabled:    document.getElementById("subEnabled").checked,
              priceStars:   parseInt(document.getElementById("subPrice").value),
              durationDays: parseInt(document.getElementById("subDuration").value),
              title:        document.getElementById("subTitle").value.trim(),
              description:  document.getElementById("subDesc").value.trim(),
              benefits:     collectBenefits(),
            }),
          });
          if (!res.ok) throw new Error();
          subConfig = await res.json();
          showToast("✅ Настройки подписки сохранены");
        } catch {
          showToast("❌ Ошибка при сохранении");
        } finally {
          btn.disabled = false;
          btn.textContent = "💾 Сохранить настройки подписки";
        }
      });

      // Grant subscription
      document.getElementById("subGrantBtn")?.addEventListener("click", async (e) => {
        const btn = e.currentTarget;
        const userId = parseInt(document.getElementById("grantUserId").value);
        const days   = parseInt(document.getElementById("grantDays").value) || 30;
        if (!userId) { showToast("⚠️ Введи Telegram ID"); return; }
        btn.disabled = true;
        try {
          const res = await fetch("/app/api/admin/subscription/grant", {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({initData, ownerTelegramId: userId, durationDays: days}),
          });

    function shopField(id, label, val, opts = {}) {
      return `
        <div class="shop-field">
          <label>${label}</label>
          <input type="${opts.type || 'number'}" id="${id}" value="${esc(String(val ?? ''))}"
            ${opts.min !== undefined ? `min="${opts.min}"` : ""}
            ${opts.max !== undefined ? `max="${opts.max}"` : ""}
            ${opts.step ? `step="${opts.step}"` : ""}>
        </div>`;
    }

    function shopToggle(id, label, checked) {
      return `
        <div class="sub-toggle-row" style="border-bottom:none;margin-bottom:0;padding-bottom:0">

          <label class="toggle-switch">

          </label>
        </div>`;
    }

          <button class="shop-option-del" data-prefix="${prefix}" data-val="${esc(o)}" title="Удалить">✕</button>
        </span>`).join("");
      return `
        <div class="shop-options-wrap">
          <div class="shop-options-label">Доступные варианты:</div>
          <div class="shop-options-list" id="${prefix}-options">${tags}</div>

            <button class="shop-add-option-btn" data-prefix="${prefix}">+ Добавить</button>
          </div>

    function attachShopAdminHandlers() {
      // Option delete buttons
      document.querySelectorAll(".shop-option-del").forEach(btn => {
        btn.addEventListener("click", () => {
          btn.closest(".shop-option-tag").remove();
        });
      });

      // Option add buttons
      document.querySelectorAll(".shop-add-option-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const prefix = btn.dataset.prefix;
          const inp = document.getElementById(`${prefix}-new-option`);
          const val = inp.value.trim();
          if (!val) return;
          const list = document.getElementById(`${prefix}-options`);
          // Duplicate check
          if ([...list.querySelectorAll(".shop-option-tag")].some(t => t.dataset.val === val)) {
            showToast("⚠️ Такой вариант уже есть"); return;
          }
          const tag = document.createElement("span");
          tag.className = "shop-option-tag"; tag.dataset.val = val;
          tag.innerHTML = `${esc(val)} <button class="shop-option-del" title="Удалить">✕</button>`;
          tag.querySelector(".shop-option-del").addEventListener("click", () => tag.remove());
          list.appendChild(tag);
          inp.value = "";
        });
      });

      // Collect options helper
      function getOptions(prefix) {
        return [...document.querySelectorAll(`#${prefix}-options .shop-option-tag`)].map(t => t.dataset.val);
      }

      // Save shop config
      document.getElementById("shopSaveBtn")?.addEventListener("click", async (e) => {
        const btn = e.currentTarget;
        btn.disabled = true;
        btn.textContent = "Сохраняем…";
        try {
          const items = {
            double_xp: {
              label:   "Двойной XP",
              enabled: document.getElementById("sh-dx-enabled").checked,
              cost:    parseInt(document.getElementById("sh-dx-cost").value)  || 200,
              hours:   parseInt(document.getElementById("sh-dx-hours").value) || 24,
            },
            theme: {
              label:   "Тема оформления",
              enabled: document.getElementById("sh-th-enabled").checked,
              cost:    parseInt(document.getElementById("sh-th-cost").value) || 100,
              options: getOptions("sh-th"),
            },
            frame: {
              label:   "Рамка профиля",
              enabled: document.getElementById("sh-fr-enabled").checked,
              cost:    parseInt(document.getElementById("sh-fr-cost").value) || 150,
              options: getOptions("sh-fr"),
            },
            pin_chat: {
              label:   "Закрепить чат",
              enabled: document.getElementById("sh-pc-enabled").checked,
              cost:    parseInt(document.getElementById("sh-pc-cost").value) || 75,
            },
            gift: {
              label:   "Подарок монет",
              enabled: document.getElementById("sh-gi-enabled").checked,
              cost:    parseInt(document.getElementById("sh-gi-cost").value)   || 30,
              amount:  parseInt(document.getElementById("sh-gi-amount").value) || 50,

            body: JSON.stringify({initData, items}),

          shopAdminConfig = (await res.json()).items;
          showToast("✅ Настройки магазина сохранены");
        } catch {
          showToast("❌ Ошибка при сохранении");
        } finally {
          btn.disabled = false;
          btn.textContent = "💾 Сохранить настройки магазина";
        }
      });
    }
