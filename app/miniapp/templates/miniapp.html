<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Моя статистика</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #f2f2f7);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #17181a);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --link: var(--tg-theme-link-color, #2481cc);
    --button: var(--tg-theme-button-color, #2481cc);
    --button-text: var(--tg-theme-button-text-color, #ffffff);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px 16px 32px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .header {
    text-align: center;
    padding: 12px 0 20px;
  }
  .header h1 {
    font-size: 20px;
    margin: 0 0 4px;
  }
  .header p {
    margin: 0;
    color: var(--hint);
    font-size: 13px;
  }
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--secondary-bg);
    border-radius: 16px;
    padding: 14px;
  }
  .card .value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.1;
  }
  .card .label {
    font-size: 12px;
    color: var(--hint);
    margin-top: 4px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 10px 4px;
  }
  .list {
    background: var(--secondary-bg);
    border-radius: 16px;
    overflow: hidden;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(120,120,128,0.15);
  }
  .row:last-child { border-bottom: none; }
  .rank {
    width: 26px;
    text-align: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    flex-shrink: 0;
  }
  .row-main {
    flex: 1;
    min-width: 0;
  }
  .row-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-sub {
    font-size: 12px;
    color: var(--hint);
    margin-top: 2px;
  }
  .bar-track {
    height: 4px;
    border-radius: 2px;
    background: rgba(120,120,128,0.15);
    margin-top: 6px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--link);
    border-radius: 2px;
  }
  .row-count {
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
    padding-left: 6px;
  }
  .empty, .error {
    text-align: center;
    padding: 40px 20px;
    color: var(--hint);
    font-size: 14px;
    line-height: 1.5;
  }
  .empty .big-emoji, .error .big-emoji {
    font-size: 40px;
    display: block;
    margin-bottom: 12px;
  }
  .skeleton {
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>
  <div class="header">
    <h1 id="greeting">📊 Моя статистика</h1>
    <p id="subtitle">Загружаем данные…</p>
  </div>

  <div id="content">
    <div class="cards skeleton">
      <div class="card"><div class="value">—</div><div class="label">Сообщений</div></div>
      <div class="card"><div class="value">—</div><div class="label">Собеседников</div></div>
      <div class="card"><div class="value">—</div><div class="label">Правок</div></div>
      <div class="card"><div class="value">—</div><div class="label">Удалений</div></div>
    </div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const AVATAR_COLORS = ["#FF6B6B", "#4ECDC4", "#45AAF2", "#F7B731", "#A55EEA", "#26DE81", "#FD9644", "#2BCBBA"];

    function colorFor(seed) {
      let hash = 0;
      for (let i = 0; i < seed.length; i++) hash = (hash * 31 + seed.charCodeAt(i)) >>> 0;
      return AVATAR_COLORS[hash % AVATAR_COLORS.length];
    }

    function initials(name) {
      const parts = name.trim().split(/\s+/).filter(Boolean);
      if (parts.length === 0) return "?";
      if (parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function medal(rank) {
      if (rank === 0) return "🥇";
      if (rank === 1) return "🥈";
      if (rank === 2) return "🥉";
      return String(rank + 1);
    }

    function renderCards(stats) {
      return `
        <div class="cards">
          <div class="card"><div class="value">${stats.total_messages}</div><div class="label">Сообщений</div></div>
          <div class="card"><div class="value">${stats.total_chats}</div><div class="label">Собеседников</div></div>
          <div class="card"><div class="value">${stats.edited_messages}</div><div class="label">Правок</div></div>
          <div class="card"><div class="value">${stats.deleted_messages}</div><div class="label">Удалений</div></div>
        </div>
      `;
    }

    function renderTop(stats) {
      if (!stats.top_interlocutors.length) {
        return `<div class="empty"><span class="big-emoji">💬</span>Пока нет сообщений для статистики.<br>Как только в подключённом Business-чате появятся сообщения — здесь будет топ собеседников.</div>`;
      }

      const max = Math.max(...stats.top_interlocutors.map(s => s.message_count));
      const rows = stats.top_interlocutors.map((s, i) => {
        const pct = max > 0 ? Math.max(6, Math.round((s.message_count / max) * 100)) : 0;
        const sub = s.username ? "@" + s.username : "";
        return `
          <div class="row">
            <div class="rank">${medal(i)}</div>
            <div class="avatar" style="background:${colorFor(s.display_name)}">${initials(s.display_name)}</div>
            <div class="row-main">
              <div class="row-name"></div>
              <div class="row-sub"></div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            </div>
            <div class="row-count">${s.message_count}</div>
          </div>
        `;
      }).join("");

      return `<div class="section-title">🏆 Топ собеседников</div><div class="list">${rows}</div>`;
    }

    function fillNames(stats) {
      const nameEls = document.querySelectorAll(".row-name");
      const subEls = document.querySelectorAll(".row-sub");
      stats.top_interlocutors.forEach((s, i) => {
        if (nameEls[i]) nameEls[i].textContent = s.display_name;
        if (subEls[i]) subEls[i].textContent = s.username ? "@" + s.username : "";
      });
    }

    async function loadStats() {
      const initData = tg ? tg.initData : "";
      const subtitle = document.getElementById("subtitle");
      const content = document.getElementById("content");

      if (!initData) {
        subtitle.textContent = "Открыто вне Telegram";
        content.innerHTML = `<div class="error"><span class="big-emoji">⚠️</span>Открой это приложение через кнопку в Telegram-боте.</div>`;
        return;
      }

      try {
        const res = await fetch("./app/api/stats", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ initData })
        });

        if (!res.ok) throw new Error("bad_status");
        const stats = await res.json();

        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
          document.getElementById("greeting").textContent =
            "📊 Привет, " + (tg.initDataUnsafe.user.first_name || "друг") + "!";
        }

        if (!stats.connected) {
          subtitle.textContent = "Бот ещё не подключён";
          content.innerHTML = `<div class="empty"><span class="big-emoji">🔌</span>Похоже, ты ещё не подключил бота к своему Business-аккаунту.<br><br>Настройки → Telegram для бизнеса → Чат-боты.</div>`;
          return;
        }

        subtitle.textContent = "Статистика общения в подключённых чатах";
        content.innerHTML = renderCards(stats) + renderTop(stats);
        fillNames(stats);
      } catch (e) {
        subtitle.textContent = "Не удалось загрузить данные";
        content.innerHTML = `<div class="error"><span class="big-emoji">⚠️</span>Не получилось загрузить статистику. Попробуй закрыть и открыть приложение ещё раз.</div>`;
      }
    }

    loadStats();
  </script>
</body>
</html>
