<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Моя статистика</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;900&display=swap">
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #f2f2f7);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #17181a);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --link: var(--tg-theme-link-color, #2481cc);
    --button: var(--tg-theme-button-color, #2481cc);
    --button-text: var(--tg-theme-button-text-color, #ffffff);
    --green: #34c759;
    --orange: #ff9f0a;
    --red: #ff453a;
    --streak-1: #ffb340;
    --streak-2: #ff6b00;
    --streak-3: #ff3b30;
    --streak-legendary: #bf5af2;
    --card-radius: 20px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
    --theme-accent: var(--link);
    --theme-accent2: var(--link);
    --theme-card-bg: var(--secondary-bg);
    --theme-card-border: transparent;
    --theme-glow: none;
  }

  /* ── ❄️ Frost theme ──────────────────────────────────────────────────────── */
  [data-theme="frost"] {
    --bg: #070d1a;
    --secondary-bg: #0d1630;
    --text: #c8daff;
    --hint: rgba(147,197,253,0.5);
    --link: #3b82f6;
    --button: #3b82f6;
    --button-text: #ffffff;
    --green: #34d399;
    --red: #f87171;
    --orange: #fb923c;
    --theme-accent: #3b82f6;
    --theme-accent2: #6366f1;
    --theme-card-bg: rgba(255,255,255,0.04);
    --theme-card-border: rgba(99,130,255,0.12);
    --theme-glow: 0 0 20px rgba(99,102,241,0.15);
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  [data-theme="frost"] body { background: linear-gradient(180deg,#070d1a 0%,#0a1428 60%,#060c18 100%) !important; color: #c8daff !important; }
  [data-theme="frost"] .card,
  [data-theme="frost"] .shop-item,
  [data-theme="frost"] .digest-card,
  [data-theme="frost"] .streak-banner,
  [data-theme="frost"] .stat-section,
  [data-theme="frost"] .sub-card,
  [data-theme="frost"] .ref-stat-card,
  [data-theme="frost"] .ref-milestone,
  [data-theme="frost"] .ref-referral-item,
  [data-theme="frost"] .casino-section,
  [data-theme="frost"] .shop-item,
  [data-theme="frost"] .pet-card,
  [data-theme="frost"] .balance-btn-row button,
  [data-theme="frost"] .header-card {
    background: var(--theme-card-bg) !important;
    border: 1px solid var(--theme-card-border) !important;
    backdrop-filter: blur(10px);
  }
  [data-theme="frost"] .tab-item.active { color: #93c5fd !important; }
  [data-theme="frost"] .tab-item.active .tab-icon-wrap { filter: drop-shadow(0 0 6px rgba(99,102,241,0.8)); }

  /* ── 🔥 Ember theme ──────────────────────────────────────────────────────── */
  [data-theme="ember"] {
    --bg: #0e0a07;
    --secondary-bg: #1c1007;
    --text: #f5e8d0;
    --hint: rgba(251,146,60,0.5);
    --link: #f97316;
    --button: #f97316;
    --button-text: #ffffff;
    --green: #34d399;
    --red: #ef4444;
    --orange: #f59e0b;
    --theme-accent: #f97316;
    --theme-accent2: #ef4444;
    --theme-card-bg: rgba(255,255,255,0.03);
    --theme-card-border: rgba(251,146,60,0.1);
    --theme-glow: 0 0 20px rgba(249,115,22,0.1);
    --shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  [data-theme="ember"] body { background: #0e0a07 !important; color: #f5e8d0 !important; }
  [data-theme="ember"] .card,
  [data-theme="ember"] .shop-item,
  [data-theme="ember"] .digest-card,
  [data-theme="ember"] .streak-banner,
  [data-theme="ember"] .stat-section,
  [data-theme="ember"] .sub-card,
  [data-theme="ember"] .ref-stat-card,
  [data-theme="ember"] .ref-milestone,
  [data-theme="ember"] .ref-referral-item,
  [data-theme="ember"] .casino-section,
  [data-theme="ember"] .pet-card,
  [data-theme="ember"] .balance-btn-row button,
  [data-theme="ember"] .header-card {
    background: var(--theme-card-bg) !important;
    border: 1px solid var(--theme-card-border) !important;
  }
  [data-theme="ember"] .tab-item.active { color: #fb923c !important; }
  [data-theme="ember"] .tab-item.active .tab-icon-wrap { filter: drop-shadow(0 0 6px rgba(249,115,22,0.9)); }

  /* ── 💜 Violet Dream theme ───────────────────────────────────────────────── */
  [data-theme="violet_dream"] {
    --bg: #08040f;
    --secondary-bg: #110820;
    --text: #f0e8ff;
    --hint: rgba(196,181,253,0.45);
    --link: #8b5cf6;
    --button: #8b5cf6;
    --button-text: #ffffff;
    --green: #34d399;
    --red: #f87171;
    --orange: #fb923c;
    --theme-accent: #8b5cf6;
    --theme-accent2: #ec4899;
    --theme-card-bg: rgba(139,92,246,0.07);
    --theme-card-border: rgba(167,139,250,0.15);
    --theme-glow: 0 0 24px rgba(139,92,246,0.15);
    --shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  [data-theme="violet_dream"] body { background: #08040f !important; color: #f0e8ff !important; }
  [data-theme="violet_dream"] .card,
  [data-theme="violet_dream"] .shop-item,
  [data-theme="violet_dream"] .digest-card,
  [data-theme="violet_dream"] .streak-banner,
  [data-theme="violet_dream"] .stat-section,
  [data-theme="violet_dream"] .sub-card,
  [data-theme="violet_dream"] .ref-stat-card,
  [data-theme="violet_dream"] .ref-milestone,
  [data-theme="violet_dream"] .ref-referral-item,
  [data-theme="violet_dream"] .casino-section,
  [data-theme="violet_dream"] .pet-card,
  [data-theme="violet_dream"] .balance-btn-row button,
  [data-theme="violet_dream"] .header-card {
    background: var(--theme-card-bg) !important;
    border: 1px solid var(--theme-card-border) !important;
    backdrop-filter: blur(12px);
  }
  [data-theme="violet_dream"] .tab-item.active { color: #c4b5fd !important; }
  [data-theme="violet_dream"] .tab-item.active .tab-icon-wrap { filter: drop-shadow(0 0 6px rgba(167,139,250,0.9)); }

  /* ── Theme card in shop ──────────────────────────────────────────────────── */
  .theme-card-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 4px;
  }
  .theme-card {
    border-radius: 16px;
    padding: 12px 12px 10px;
    border: 1.5px solid rgba(120,120,128,0.15);
    background: var(--secondary-bg);
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .theme-card.active-theme {
    border-color: var(--link);
    box-shadow: 0 0 0 1px var(--link);
  }
  .theme-card-swatch {
    height: 40px;
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .theme-card-name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
  .theme-card-desc { font-size: 10px; color: var(--hint); margin-bottom: 8px; }
  .theme-card-btn {
    width: 100%;
    border: none;
    border-radius: 9px;
    padding: 6px 0;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .theme-card-btn:disabled { opacity: 0.4; cursor: default; }
  .theme-card-active-badge {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--link);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    border-radius: 5px;
    padding: 2px 5px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    padding: 0 14px calc(env(safe-area-inset-bottom, 0px) + 104px);
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 22px 0 16px;
    animation: fadeDown 0.4s ease;
  }
  .header .avatar-ring {
    width: 68px; height: 68px;
    margin: 0 auto 11px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--link) 0%, #5856d6 50%, var(--green) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 800; color: #fff;
    box-shadow: 0 4px 18px rgba(0,0,0,0.22);
    overflow: hidden;
    position: relative;
  }
  .header .avatar-ring img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
  }
  .header h1 { font-size: 20px; margin: 0 0 4px; font-weight: 800; letter-spacing: -0.3px; }
  .header p  { margin: 0; color: var(--hint); font-size: 13px; font-weight: 400; }
  .header-actions {
    display: flex; justify-content: center; margin-top: 10px;
  }
  .header-refresh {
    border: none; background: rgba(120,120,128,0.1);
    border-radius: 20px; padding: 6px 14px;
    font-size: 12px; font-weight: 600; color: var(--hint);
    display: flex; align-items: center; gap: 5px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .header-refresh:active { transform: scale(0.95); }
  .header-refresh.spinning .refresh-icon { animation: spin 0.75s linear infinite; display:inline-block; }
  .refresh-icon { display: inline-block; }

  /* ── Streak Banner ── */
  .streak-banner {
    border-radius: var(--card-radius);
    padding: 16px 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: riseIn 0.35s ease backwards;
    position: relative;
    overflow: hidden;
  }
  .streak-banner.level-warm  { background: linear-gradient(135deg, rgba(255,179,64,0.18), rgba(255,107,0,0.10)); border: 1.5px solid rgba(255,179,64,0.35); }
  .streak-banner.level-hot   { background: linear-gradient(135deg, rgba(255,107,0,0.20), rgba(255,59,48,0.12)); border: 1.5px solid rgba(255,107,0,0.4); }
  .streak-banner.level-blaze { background: linear-gradient(135deg, rgba(255,59,48,0.22), rgba(255,107,0,0.14)); border: 1.5px solid rgba(255,59,48,0.45); }
  .streak-banner.level-legend{ background: linear-gradient(135deg, rgba(191,90,242,0.22), rgba(255,59,48,0.14)); border: 1.5px solid rgba(191,90,242,0.45); }
  .streak-banner.at-risk     { border-style: dashed; }
  .streak-fire { font-size: 36px; flex-shrink: 0; animation: fireWobble 1.8s ease-in-out infinite; }
  @keyframes fireWobble { 0%,100%{transform:scale(1) rotate(-3deg)} 50%{transform:scale(1.08) rotate(3deg)} }
  .streak-info { flex: 1; min-width: 0; }
  .streak-info .streak-days {
    font-size: 28px; font-weight: 900; line-height: 1;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--streak-2), var(--streak-3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .streak-banner.level-legend .streak-info .streak-days {
    background: linear-gradient(90deg, var(--streak-legendary), var(--streak-3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .streak-info .streak-label { font-size: 12.5px; color: var(--hint); margin-top: 1px; }
  .streak-info .streak-name  { font-size: 13px; font-weight: 600; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .streak-at-risk-badge {
    font-size: 11px; font-weight: 700; color: var(--orange);
    background: rgba(255,159,10,0.14); border-radius: 8px;
    padding: 3px 8px; flex-shrink: 0;
  }

  /* ── Stats Cards ── */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 16px 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
    animation: riseIn 0.35s ease backwards;
    border: 0.5px solid rgba(120,120,128,0.1);
  }
  .card .icon { font-size: 18px; margin-bottom: 8px; display: block; }
  .card .value { font-size: 32px; font-weight: 900; line-height: 1.05; letter-spacing: -1.5px; }
  .card .label { font-size: 11.5px; color: var(--hint); margin-top: 4px; font-weight: 500; }
  .card.accent-messages .value { color: var(--link); }
  .card.accent-chats .value    { color: var(--green); }
  .card.accent-edited .value   { color: var(--orange); }
  .card.accent-deleted .value  { color: var(--red); }
  .card.accent-streak .value   { color: var(--streak-2); }
  .card.accent-record .value   { color: var(--streak-legendary); }
  .card:nth-child(1){animation-delay:0.02s} .card:nth-child(2){animation-delay:0.06s}
  .card:nth-child(3){animation-delay:0.10s} .card:nth-child(4){animation-delay:0.14s}
  .card:nth-child(5){animation-delay:0.18s} .card:nth-child(6){animation-delay:0.22s}

  /* ── Card % badge ── */
  .card .card-pct {
    position: absolute; top: 11px; right: 11px;
    font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 8px;
  }
  .card.accent-edited .card-pct  { background: rgba(255,159,10,0.15); color: var(--orange); }
  .card.accent-deleted .card-pct { background: rgba(255,69,58,0.15);  color: var(--red); }

  /* ── Health section ── */
  .health-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 16px 15px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    animation: riseIn 0.35s 0.20s ease backwards;
  }
  .health-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 9px;
  }
  .health-row:last-child { margin-bottom: 0; }
  .health-lbl { font-size: 12px; color: var(--hint); width: 58px; flex-shrink: 0; }
  .health-bar-track {
    flex: 1; height: 7px; border-radius: 4px;
    background: rgba(120,120,128,0.12); overflow: hidden;
  }
  .health-bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s ease; }
  .health-val { font-size: 12px; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; }
  .health-pct { font-size: 11px; color: var(--hint); width: 28px; text-align: right; flex-shrink: 0; }

  /* ── Content split donut ── */
  .split-row {
    display: flex; align-items: center; gap: 14px;
    margin-top: 14px; padding-top: 13px;
    border-top: 1px solid rgba(120,120,128,0.1);
  }
  .split-legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
  .split-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .split-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .split-name { flex: 1; color: var(--hint); }
  .split-count { font-weight: 700; }
  .split-pct { color: var(--hint); min-width: 28px; text-align: right; font-size: 11.5px; }

  /* ── Words cloud ── */
  .words-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 16px 15px 12px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    animation: riseIn 0.35s 0.20s ease backwards;
  }
  .words-cloud {
    display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px;
  }
  .word-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(120,120,128,0.10);
    border-radius: 20px; padding: 5px 11px;
    font-size: 13px; font-weight: 600; color: var(--text);
    transition: background 0.15s;
  }
  .word-chip .wc {
    font-size: 10.5px; font-weight: 500; color: var(--hint);
  }
  .word-chip.top1 { background: rgba(255,159,10,0.18); color: #ff9f0a; }
  .word-chip.top2 { background: rgba(52,199,89,0.14); color: #34c759; }
  .word-chip.top3 { background: rgba(10,132,255,0.14); color: var(--link); }
  .emoji-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding-top: 12px;
    border-top: 1px solid rgba(120,120,128,0.10);
    margin-bottom: 10px;
  }
  .emoji-chip {
    display: inline-flex; flex-direction: column; align-items: center; gap: 2px;
    background: rgba(120,120,128,0.08);
    border-radius: 12px; padding: 7px 10px;
    min-width: 44px;
  }
  .emoji-chip .ej { font-size: 20px; line-height: 1; }
  .emoji-chip .ec { font-size: 10px; font-weight: 600; color: var(--hint); }
  .words-meta {
    font-size: 11px; color: var(--hint); text-align: right; margin-top: 4px;
  }

  /* ── Daily digest ── */
  .digest-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 4px 15px 8px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    animation: riseIn 0.35s 0.25s ease backwards;
  }
  .digest-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 0;
    border-bottom: 1px solid rgba(120,120,128,0.08);
    font-size: 14px;
  }
  .digest-row:last-child { border-bottom: none; }
  .digest-label { color: var(--hint); font-size: 13px; }
  .digest-val { font-weight: 700; }
  .digest-highlight { color: var(--link); }
  .digest-warn .digest-val { color: #ff9f0a; }
  .digest-ok   .digest-val { color: #34c759; }

  /* ── Section title ── */
  .section-title {
    font-size: 15px; font-weight: 700;
    margin: 4px 0 10px 2px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title .sub { font-size: 12px; font-weight: 500; color: var(--hint); }

  /* ── Premium gate ── */
  .premium-gate-wrapper {
    position: relative; margin-bottom: 18px;
  }
  .premium-gate-blur {
    filter: blur(5px); pointer-events: none; user-select: none;
    border-radius: var(--card-radius); overflow: hidden;
  }
  .premium-gate-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 7px; padding: 20px;
    background: rgba(0,0,0,0.38); backdrop-filter: blur(1px);
    border-radius: var(--card-radius); text-align: center;
  }
  .premium-gate-icon  { font-size: 30px; line-height: 1; }
  .premium-gate-title { font-size: 15px; font-weight: 800; color: #fff; }
  .premium-gate-desc  { font-size: 12px; color: rgba(255,255,255,0.78); max-width: 220px; }
  .premium-gate-btn {
    border: none; border-radius: 12px; padding: 9px 22px;
    font-size: 13px; font-weight: 800;
    background: linear-gradient(135deg, #5856d6, #2481cc);
    color: #fff; box-shadow: 0 3px 12px rgba(36,129,204,.4);
    touch-action: manipulation; margin-top: 4px; cursor: pointer;
  }
  .premium-gate-mini {
    background: var(--secondary-bg); border-radius: var(--card-radius);
    padding: 13px 15px; box-shadow: var(--shadow); margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .premium-gate-mini-title { font-size: 14px; font-weight: 700; }
  .premium-gate-mini-hint  { font-size: 12px; color: var(--hint); margin-top: 2px; }
  .premium-gate-chip {
    border: none; border-radius: 10px; padding: 7px 14px;
    font-size: 12.5px; font-weight: 700;
    background: linear-gradient(135deg, #5856d6, #2481cc);
    color: #fff; white-space: nowrap; touch-action: manipulation; cursor: pointer;
    flex-shrink: 0;
  }
  .premium-more-row {
    background: linear-gradient(135deg, rgba(88,86,214,0.07), rgba(36,129,204,0.07));
    border: 1.5px dashed rgba(88,86,214,0.25); border-radius: var(--card-radius);
    padding: 13px 16px; margin-top: 6px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    cursor: pointer;
  }
  .premium-more-text { font-size: 13px; font-weight: 700; color: #5856d6; }
  .premium-more-hint { font-size: 11px; color: var(--hint); margin-top: 2px; }
  .sort-locked { opacity: 0.45; }

  /* ── Heatmap ── */
  .heatmap-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }
  .heatmap-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 3px;
    margin-bottom: 8px;
  }
  .heat-cell {
    width: 100%; aspect-ratio: 1; border-radius: 3px;
    background: rgba(120,120,128,0.13);
  }
  .heat-cell.level-1 { background: rgba(52,199,89,0.28); }
  .heat-cell.level-2 { background: rgba(52,199,89,0.50); }
  .heat-cell.level-3 { background: rgba(52,199,89,0.74); }
  .heat-cell.level-4 { background: rgba(52,199,89,1); }
  .heatmap-legend {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--hint); justify-content: flex-end;
  }
  .heatmap-legend .heat-cell { width: 12px; height: 12px; flex-shrink: 0; }

  /* ── Badges ── */
  .badges-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .badge-card {
    background: var(--secondary-bg);
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    box-shadow: var(--shadow);
    transition: opacity 0.2s, transform 0.2s;
    position: relative;
  }
  .badge-card.achieved { border: 1.5px solid rgba(52,199,89,0.35); }
  .badge-card.locked   { opacity: 0.38; filter: grayscale(1); }
  .badge-emoji   { font-size: 28px; margin-bottom: 5px; }
  .badge-title   { font-size: 12.5px; font-weight: 700; }
  .badge-desc    { font-size: 10.5px; color: var(--hint); margin-top: 2px; line-height: 1.35; }
  .badge-new-dot {
    position: absolute; top: 8px; right: 8px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
  }

  /* ── Search + Sort ── */
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--secondary-bg);
    border-radius: 14px; padding: 10px 14px;
    margin-bottom: 10px; box-shadow: var(--shadow);
  }
  .search-box input {
    flex: 1; border: none; outline: none;
    background: transparent; color: var(--text); font-size: 14px;
  }
  .search-box input::placeholder { color: var(--hint); }

  .segmented {
    display: flex; background: rgba(120,120,128,0.12);
    border-radius: 12px; padding: 3px; margin-bottom: 14px; gap: 2px; overflow-x: auto;
  }
  .segmented::-webkit-scrollbar { display: none; }
  .segmented button {
    flex: 0 0 auto; border: none; background: transparent;
    padding: 8px 10px; font-size: 12.5px; font-weight: 600;
    color: var(--hint); border-radius: 9px; transition: all 0.18s ease;
    white-space: nowrap;
  }
  .segmented button.active {
    background: var(--secondary-bg); color: var(--text); box-shadow: var(--shadow);
  }

  /* ── List rows ── */
  .list {
    background: var(--secondary-bg);
    border-radius: var(--card-radius); overflow: hidden; box-shadow: var(--shadow);
  }
  .row {
    display: flex; align-items: center; gap: 11px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(120,120,128,0.10);
    transition: background 0.12s;
  }
  .row:active { background: rgba(120,120,128,0.07); }
  .row:last-child { border-bottom: none; }
  .rank {
    width: 22px; text-align: center; font-size: 14px;
    flex-shrink: 0; font-weight: 700; color: var(--hint);
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0;
  }
  .row-main { flex: 1; min-width: 0; }
  .row-name {
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-sub {
    font-size: 11.5px; color: var(--hint); margin-top: 2px;
    display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
  }
  .bar-track {
    height: 4px; border-radius: 3px;
    background: rgba(120,120,128,0.13);
    margin-top: 6px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--link), var(--green));
    transition: width 0.65s cubic-bezier(.2,.8,.2,1);
  }
  .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .row-count { font-size: 17px; font-weight: 800; }
  .row-streak-badge {
    font-size: 11px; font-weight: 700; border-radius: 7px; padding: 2px 7px;
    white-space: nowrap;
  }
  .row-streak-badge.s-warm    { color: var(--streak-1); background: rgba(255,179,64,0.15); }
  .row-streak-badge.s-hot     { color: var(--streak-2); background: rgba(255,107,0,0.15); }
  .row-streak-badge.s-blaze   { color: var(--streak-3); background: rgba(255,59,48,0.16); }
  .row-streak-badge.s-legend  { color: var(--streak-legendary); background: rgba(191,90,242,0.16); }
  .row-chevron { color: var(--hint); font-size: 18px; padding-left: 2px; flex-shrink: 0; }

  /* ── Chips ── */
  .chip {
    font-size: 10.5px; font-weight: 600; padding: 1px 6px;
    border-radius: 6px; background: rgba(120,120,128,0.13);
  }
  .chip.edited  { color: var(--orange); background: rgba(255,159,10,0.13); }
  .chip.deleted { color: var(--red);    background: rgba(255,69,58,0.13); }
  .chip.mutual    { color: var(--green);  background: rgba(52,199,89,0.13); }
  .chip.at-risk   { color: var(--orange); background: rgba(255,159,10,0.13); animation: pulse 1.5s ease-in-out infinite; }
  .chip.rel-friends { color: #d4962a; background: rgba(245,166,35,0.14); }
  .chip.rel-dating  { color: #e0365a; background: rgba(255,77,109,0.14); }
  .chip.rel-married { color: #9c4cc4; background: rgba(168,85,247,0.14); }

  /* ── Relationship button ── */
  .rel-btn {
    border: none; background: rgba(255,59,96,0.11); color: #e0365a;
    border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .rel-btn:active { opacity: 0.72; }

  /* ── Pending requests block ── */
  .rel-pending-block  { margin-bottom: 14px; }
  .rel-pending-row    {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: var(--card); border-radius: 14px; margin-bottom: 6px;
  }
  .rel-pending-name   { flex: 1; font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rel-accept-btn     { background: var(--green); color: #fff; border: none; border-radius: 12px; padding: 5px 14px; font-size: 12px; cursor: pointer; font-weight: 700; flex-shrink: 0; }
  .rel-decline-btn    { background: rgba(255,59,48,0.12); color: var(--red); border: none; border-radius: 12px; padding: 5px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
  .rel-accept-btn:active, .rel-decline-btn:active { opacity: 0.72; }

  /* ── Relationship modal ── */
  .rel-xp-track  { height: 7px; background: var(--separator); border-radius: 4px; margin-bottom: 16px; overflow: hidden; }
  .rel-xp-fill   { height: 100%; background: linear-gradient(90deg, #f5a623, #e0365a); border-radius: 4px; transition: width .4s; }
  .rel-modal-actions { display: flex; flex-direction: column; gap: 9px; }
  .rel-modal-btn {
    border: none; border-radius: 14px; padding: 13px 16px;
    font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; text-align: center;
  }
  .rel-modal-btn.gift    { background: rgba(245,166,35,0.14); color: #d4962a; }
  .rel-modal-btn.upgrade { background: rgba(10,132,255,0.12); color: var(--link); }
  .rel-modal-btn.propose { background: var(--link); color: #fff; }
  .rel-modal-btn.cancel  { background: rgba(255,59,48,0.10); color: var(--red); }
  .rel-modal-btn.break-rel { background: rgba(255,59,48,0.08); color: var(--red); font-weight: 400; font-size: 13px; }
  .rel-modal-btn:disabled { opacity: 0.40; cursor: default; }

  /* ── Row action buttons ── */
  .row-action-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
  .game-btn {
    border: none; border-radius: 20px;
    padding: 4px 10px; font-size: 11px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0; cursor: pointer;
    background: rgba(10,132,255,0.12);
    color: var(--link);
  }
  .game-btn:active { opacity: 0.72; }

  /* ── VIP upgrade block (shown under active Premium card) ── */
  .sub-upgrade-block {
    margin-top: 12px;
    background: var(--secondary-bg);
    border-radius: 18px;
    border: 1.5px solid rgba(196,120,0,.22);
    padding: 16px 14px 14px;
  }
  .sub-upgrade-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
  }
  .sub-upgrade-title {
    font-size: 15px; font-weight: 800;
    background: linear-gradient(90deg, #c47800, #9c4cc4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub-upgrade-sub { font-size: 12px; color: var(--hint); margin-top: 2px; }

  /* ── AI Analysis button ── */
  .ai-btn {
    border: none; border-radius: 20px;
    padding: 4px 10px; font-size: 11px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0; cursor: pointer;
    background: linear-gradient(135deg, rgba(88,86,214,.18), rgba(52,199,89,.12));
    color: #5856d6;
  }
  .ai-btn:active { opacity: 0.72; }

  /* ── AI Analysis full-screen modal ── */
  .ai-modal-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: var(--bg); display: flex; flex-direction: column;
    animation: riseIn .22s ease backwards;
  }
  .ai-modal-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 10px; border-bottom: 1px solid var(--separator);
    flex-shrink: 0;
  }
  .ai-modal-back {
    border: none; background: var(--secondary-bg); border-radius: 10px;
    width: 34px; height: 34px; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .ai-modal-title { font-size: 16px; font-weight: 800; flex: 1; }
  .ai-modal-sub   { font-size: 11px; color: var(--hint); margin-top: 1px; }
  .ai-modal-body  { flex: 1; overflow-y: auto; padding: 12px 14px 40px; }

  /* report sections */
  .ai-sec { background: var(--secondary-bg); border-radius: 16px; margin-bottom: 10px; overflow: hidden; }
  .ai-sec-head {
    display: flex; align-items: center; gap: 8px;
    padding: 13px 14px 10px; border-bottom: 1px solid rgba(120,120,128,.1);
  }
  .ai-sec-ico   { font-size: 20px; }
  .ai-sec-label { font-size: 13px; font-weight: 800; }
  .ai-sec-body  { padding: 10px 14px 14px; }

  /* score meter */
  .ai-score-num  { font-size: 52px; font-weight: 900; line-height: 1; }
  .ai-score-track { height: 8px; background: rgba(120,120,128,.18); border-radius: 4px; margin: 8px 0 6px; overflow: hidden; }
  .ai-score-fill  { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #5856d6, #34c759); }
  .ai-score-label { font-size: 14px; font-weight: 700; }
  .ai-score-desc  { font-size: 12.5px; color: var(--hint); margin-top: 4px; line-height: 1.55; }

  /* two-column balance grid */
  .ai-balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ai-balance-card { background: rgba(120,120,128,.07); border-radius: 12px; padding: 10px 12px; }
  .ai-balance-val  { font-size: 14px; font-weight: 800; }
  .ai-balance-lbl  { font-size: 10.5px; color: var(--hint); margin-top: 2px; }

  /* interest bars */
  .ai-interest-pct { font-size: 46px; font-weight: 900; color: #5856d6; line-height: 1; }
  .ai-indicator-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .ai-indicator-name { font-size: 12px; flex: 1; color: var(--hint); }
  .ai-indicator-bar-track { width: 80px; height: 5px; background: rgba(120,120,128,.18); border-radius: 3px; overflow: hidden; }
  .ai-indicator-bar-fill  { height: 100%; border-radius: 3px; }
  .ai-indicator-val { font-size: 11px; font-weight: 700; width: 30px; text-align: right; }

  /* tag clouds */
  .ai-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .ai-tag {
    font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 20px;
    background: rgba(88,86,214,.12); color: #5856d6;
  }
  .ai-tag.contact { background: rgba(52,199,89,.12); color: #34c759; }
  .ai-tag-lbl { font-size: 10px; color: var(--hint); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

  /* flags */
  .ai-flag-row {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 7px 0; border-bottom: 1px solid rgba(120,120,128,.08);
    font-size: 13px; line-height: 1.45;
  }
  .ai-flag-row:last-child { border-bottom: none; }
  .ai-flag-ico { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  /* stats grid */
  .ai-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .ai-stat-cell { background: rgba(120,120,128,.07); border-radius: 12px; padding: 10px; text-align: center; }
  .ai-stat-cell-val { font-size: 16px; font-weight: 900; }
  .ai-stat-cell-lbl { font-size: 10px; color: var(--hint); margin-top: 2px; }

  /* AI summary */
  .ai-summary-text {
    font-size: 13.5px; line-height: 1.7; color: var(--text);
    background: rgba(88,86,214,.06); border-radius: 12px; padding: 12px 14px;
    border-left: 3px solid #5856d6;
  }

  /* canvas pie chart */
  .ai-pie-wrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .ai-pie-legend { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .ai-pie-legend-row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .ai-pie-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* loading state */
  .ai-loading-wrap { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; gap: 14px; }
  .ai-loading-spinner {
    width: 48px; height: 48px; border: 4px solid rgba(88,86,214,.2);
    border-top-color: #5856d6; border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .game-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-end; z-index: 1000;
  }
  .game-sheet {
    width: 100%; background: var(--secondary-bg);
    border-radius: 20px 20px 0 0; padding: 18px 16px 32px;
    animation: slideUp 0.2s ease-out;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .game-sheet-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; text-align: center; }
  .game-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
  .game-pick {
    border: none; border-radius: 14px; background: rgba(120,120,128,0.11);
    padding: 14px 6px; display: flex; flex-direction: column;
    align-items: center; gap: 5px; font-size: 12px; font-weight: 600;
  }
  .game-pick:active { background: rgba(120,120,128,0.2); }
  .game-pick-emoji { font-size: 26px; }
  .game-cancel {
    width: 100%; border: none; border-radius: 14px; padding: 13px;
    font-size: 14px; font-weight: 700;
    background: rgba(120,120,128,0.11); color: var(--red);
  }

  /* ── Share buttons ── */
  .share-btn {
    width: 100%; margin-top: 10px; border: none; border-radius: 14px;
    padding: 13px; font-size: 13.5px; font-weight: 700;
    background: rgba(120,120,128,0.11); color: var(--link);
  }
  .share-btn:active { transform: scale(0.98); }

  /* ── Toast ── */
  .toast {
    position: fixed; left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 86px);
    transform: translateX(-50%) translateY(16px);
    background: rgba(20,20,22,0.92); color: #fff;
    padding: 10px 20px; border-radius: 30px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: all 0.22s ease;
    pointer-events: none; z-index: 300;
    white-space: nowrap; max-width: 90vw;
    overflow: hidden; text-overflow: ellipsis;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Empty / Error ── */
  .empty, .error {
    text-align: center; padding: 44px 20px; color: var(--hint);
    font-size: 14px; line-height: 1.55;
    background: var(--secondary-bg); border-radius: var(--card-radius);
  }
  .empty .big-emoji, .error .big-emoji { font-size: 42px; display: block; margin-bottom: 12px; }

  /* ── FAB (hidden — refresh moved to header) ── */
  .refresh-fab { display: none; }

  /* ── Skeleton ── */
  .skeleton { animation: pulse 1.2s ease-in-out infinite; }
  .skeleton .value, .skeleton .label { opacity: 0.3; }

  /* ── Keyframes ── */
  @keyframes fadeDown  { from{opacity:0;transform:translateY(-7px)} to{opacity:1;transform:none} }
  @keyframes riseIn    { from{opacity:0;transform:translateY(9px)}  to{opacity:1;transform:none} }
  @keyframes spin      { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:0.45} }

  /* ══════════════════════════════════════════
     BOTTOM TAB BAR
  ══════════════════════════════════════════ */
  /* ── Liquid Glass Bottom Tab Bar ─────────────────────────────────────── */
  .bottom-tab-bar {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    left: 12px; right: 12px;
    height: 80px;
    border-radius: 32px;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    /* Glass base */
    background: rgba(255,255,255,0.28);
    backdrop-filter: blur(40px) saturate(200%) brightness(1.06);
    -webkit-backdrop-filter: blur(40px) saturate(200%) brightness(1.06);

    /* Multi-layer liquid glass shadows */
    box-shadow:
      0 12px 40px rgba(0,0,0,0.18),
      0 3px 12px rgba(0,0,0,0.11),
      0 0 0 0.5px rgba(255,255,255,0.55),
      inset 0 1px 0 rgba(255,255,255,0.85),
      inset 0 -0.5px 0 rgba(0,0,0,0.10),
      inset 1.5px 0 0 rgba(255,255,255,0.40),
      inset -1.5px 0 0 rgba(255,255,255,0.40),
      inset 0 0 32px rgba(255,255,255,0.18);

    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 6px;
    z-index: 200;
  }

  /* Top specular highlight — simulates glass lens curvature */
  .bottom-tab-bar::before {
    content: "";
    position: absolute;
    top: 0; left: 16px; right: 16px;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255,255,255,0.55) 20%,
      rgba(255,255,255,0.95) 50%,
      rgba(255,255,255,0.55) 80%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 2;
  }

  /* Liquid glass inner tint + distorted gradient layer */
  .bottom-tab-bar::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(
      165deg,
      rgba(255,255,255,0.22) 0%,
      rgba(255,255,255,0.04) 45%,
      rgba(255,255,255,0.10) 100%
    );
    pointer-events: none;
    z-index: 1;
  }

  /* SVG-filtered lens wave texture inside the glass */
  .tab-bar-lens {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(
      130deg,
      rgba(255,255,255,0.18) 0%,
      rgba(255,255,255,0.06) 40%,
      rgba(255,255,255,0.14) 100%
    );
    filter: url("#liquid-glass-filter");
    pointer-events: none;
    z-index: 0;
  }

  /* Dark mode */
  @media (prefers-color-scheme: dark) {
    .bottom-tab-bar {
      background: rgba(22,22,28,0.72);
      backdrop-filter: blur(40px) saturate(180%) brightness(0.92);
      -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(0.92);
      box-shadow:
        0 10px 36px rgba(0,0,0,0.50),
        0 2px 10px rgba(0,0,0,0.34),
        0 0 0 0.5px rgba(255,255,255,0.10),
        inset 0 1px 0 rgba(255,255,255,0.13),
        inset 0 -0.5px 0 rgba(255,255,255,0.04),
        inset 1.5px 0 0 rgba(255,255,255,0.07),
        inset -1.5px 0 0 rgba(255,255,255,0.07),
        inset 0 0 28px rgba(255,255,255,0.05);
    }
    .bottom-tab-bar::before {
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.07) 20%,
        rgba(255,255,255,0.16) 50%,
        rgba(255,255,255,0.07) 80%,
        transparent 100%
      );
    }
    .bottom-tab-bar::after {
      background: linear-gradient(
        165deg,
        rgba(255,255,255,0.09) 0%,
        transparent 45%,
        rgba(255,255,255,0.04) 100%
      );
    }
    .tab-bar-lens {
      background: linear-gradient(
        130deg,
        rgba(255,255,255,0.07) 0%,
        rgba(255,255,255,0.02) 40%,
        rgba(255,255,255,0.06) 100%
      );
    }
  }

  /* ── Tab items ──────────────────────────────────────────────────────── */
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 0 4px;
    border: none;
    background: transparent;
    color: rgba(110,110,120,0.80);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.1px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.22s ease;
    position: relative;
    z-index: 3;
    touch-action: none;
  }

  .tab-icon-wrap {
    width: 46px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 15px;
    font-size: 22px; line-height: 1;
    position: relative;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    will-change: transform;
  }

  .tab-label { line-height: 1; margin-top: 2px; font-size: 9.5px; }

  /* ── Sliding glass indicator ── */
  .tab-slider {
    position: absolute;
    top: 14px;
    height: 36px;
    width: 46px;
    border-radius: 17px;
    pointer-events: none;
    z-index: 2;
    transform-origin: center;
    will-change: transform, left;
    /* Spring on position + gentle scale spring */
    transition: left 0.42s cubic-bezier(.34,1.56,.64,1),
                transform 0.35s cubic-bezier(.34,1.56,.64,1),
                background 0.25s ease,
                box-shadow 0.25s ease;
    background: rgba(36,129,204,0.22);
    box-shadow:
      0 3px 12px rgba(36,129,204,0.22),
      inset 0 1px 0 rgba(255,255,255,0.70),
      inset 0 -0.5px 0 rgba(0,0,0,0.08),
      inset 0 0 12px rgba(255,255,255,0.22);
    border: 0.5px solid rgba(255,255,255,0.45);
  }
  /* Finger pressed on bar — slider pulses slightly */
  .tab-slider.slider-pressed {
    transform: scale(1.12);
  }
  /* Sliding between tabs — pill stretches horizontally, no position spring */
  .tab-slider.dragging {
    transition: transform 0.18s ease,
                background 0.15s ease,
                box-shadow 0.15s ease;
    transform: scaleX(1.18) scaleY(0.94);
    box-shadow:
      0 5px 18px rgba(0,0,0,0.16),
      inset 0 1px 0 rgba(255,255,255,0.82),
      inset 0 0 14px rgba(255,255,255,0.28);
  }

  /* ── Active states — only icon lift, slider provides the bg ── */
  /* All tabs share one neutral accent — no per-tab rainbow */
  .tab-item.active,
  .tab-item.drag-preview            { color: var(--tab-active, #fff); }
  .tab-item.active .tab-icon-wrap,
  .tab-item.drag-preview .tab-icon-wrap { transform: scale(1.08) translateY(-2px); }

  /* ── Limelight beacon ────────────────────────────────────────────── */
  .tab-limelight {
    position: absolute;
    top: 0;
    height: 5px;
    width: 44px;
    border-radius: 999px;
    pointer-events: none;
    z-index: 10;
    left: -999px;          /* JS will position on init */
    will-change: left;
    transition: left 0.42s cubic-bezier(.34,1.56,.64,1);
  }
  /* Trapezoid beam below the pill */
  .tab-limelight-beam {
    position: absolute;
    top: 5px;
    left: -30%;
    width: 160%;
    height: 58px;
    clip-path: polygon(5% 100%, 25% 0, 75% 0, 95% 100%);
    pointer-events: none;
    border-radius: 0 0 4px 4px;
  }

  /* ══════════════════════════════════════════
     REFERRAL SECTION (inside donate tab)
  ══════════════════════════════════════════ */
  .ref-hero {
    background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);

  .ref-hero::after {

  .ref-hero-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .ref-level-row  { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ref-level-badge {
    font-size: 28px; width: 52px; height: 52px; border-radius: 50%;

  .ref-level-name { font-size: 20px; font-weight: 800; color: #fff; }
