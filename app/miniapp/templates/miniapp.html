<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Моя статистика</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;900&display=swap">
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #f2f2f7);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #17181a);
    --hint: var(--tg-theme-hint-color, #8a8a8e);
    --link: var(--tg-theme-link-color, #2481cc);
    --button: var(--tg-theme-button-color, #2481cc);
    --button-text: var(--tg-theme-button-text-color, #ffffff);
    --green: #34c759;
    --orange: #ff9f0a;
    --red: #ff453a;
    --streak-1: #ffb340;
    --streak-2: #ff6b00;
    --streak-3: #ff3b30;
    --streak-legendary: #bf5af2;
    --card-radius: 20px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    padding: 0 14px calc(env(safe-area-inset-bottom, 0px) + 76px);
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 22px 0 16px;
    animation: fadeDown 0.4s ease;
  }
  .header .avatar-ring {
    width: 62px; height: 62px;
    margin: 0 auto 11px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--link) 0%, #5856d6 50%, var(--green) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 6px 20px rgba(36,129,204,0.35);
  }
  .header h1 { font-size: 20px; margin: 0 0 4px; font-weight: 800; letter-spacing: -0.3px; }
  .header p  { margin: 0; color: var(--hint); font-size: 13px; font-weight: 400; }
  .header-actions {
    display: flex; justify-content: center; margin-top: 10px;
  }
  .header-refresh {
    border: none; background: rgba(120,120,128,0.1);
    border-radius: 20px; padding: 6px 14px;
    font-size: 12px; font-weight: 600; color: var(--hint);
    display: flex; align-items: center; gap: 5px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .header-refresh:active { transform: scale(0.95); }
  .header-refresh.spinning .refresh-icon { animation: spin 0.75s linear infinite; display:inline-block; }
  .refresh-icon { display: inline-block; }

  /* ── Streak Banner ── */
  .streak-banner {
    border-radius: var(--card-radius);
    padding: 16px 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: riseIn 0.35s ease backwards;
    position: relative;
    overflow: hidden;
  }
  .streak-banner.level-warm  { background: linear-gradient(135deg, rgba(255,179,64,0.18), rgba(255,107,0,0.10)); border: 1.5px solid rgba(255,179,64,0.35); }
  .streak-banner.level-hot   { background: linear-gradient(135deg, rgba(255,107,0,0.20), rgba(255,59,48,0.12)); border: 1.5px solid rgba(255,107,0,0.4); }
  .streak-banner.level-blaze { background: linear-gradient(135deg, rgba(255,59,48,0.22), rgba(255,107,0,0.14)); border: 1.5px solid rgba(255,59,48,0.45); }
  .streak-banner.level-legend{ background: linear-gradient(135deg, rgba(191,90,242,0.22), rgba(255,59,48,0.14)); border: 1.5px solid rgba(191,90,242,0.45); }
  .streak-banner.at-risk     { border-style: dashed; }
  .streak-fire { font-size: 36px; flex-shrink: 0; animation: fireWobble 1.8s ease-in-out infinite; }
  @keyframes fireWobble { 0%,100%{transform:scale(1) rotate(-3deg)} 50%{transform:scale(1.08) rotate(3deg)} }
  .streak-info { flex: 1; min-width: 0; }
  .streak-info .streak-days {
    font-size: 28px; font-weight: 900; line-height: 1;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--streak-2), var(--streak-3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .streak-banner.level-legend .streak-info .streak-days {
    background: linear-gradient(90deg, var(--streak-legendary), var(--streak-3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .streak-info .streak-label { font-size: 12.5px; color: var(--hint); margin-top: 1px; }
  .streak-info .streak-name  { font-size: 13px; font-weight: 600; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .streak-at-risk-badge {
    font-size: 11px; font-weight: 700; color: var(--orange);
    background: rgba(255,159,10,0.14); border-radius: 8px;
    padding: 3px 8px; flex-shrink: 0;
  }

  /* ── Stats Cards ── */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 16px 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
    animation: riseIn 0.35s ease backwards;
    border: 0.5px solid rgba(120,120,128,0.1);
  }
  .card .icon { font-size: 18px; margin-bottom: 8px; display: block; }
  .card .value { font-size: 32px; font-weight: 900; line-height: 1.05; letter-spacing: -1.5px; }
  .card .label { font-size: 11.5px; color: var(--hint); margin-top: 4px; font-weight: 500; }
  .card.accent-messages .value { color: var(--link); }
  .card.accent-chats .value    { color: var(--green); }
  .card.accent-edited .value   { color: var(--orange); }
  .card.accent-deleted .value  { color: var(--red); }
  .card.accent-streak .value   { color: var(--streak-2); }
  .card.accent-record .value   { color: var(--streak-legendary); }
  .card:nth-child(1){animation-delay:0.02s} .card:nth-child(2){animation-delay:0.06s}
  .card:nth-child(3){animation-delay:0.10s} .card:nth-child(4){animation-delay:0.14s}
  .card:nth-child(5){animation-delay:0.18s} .card:nth-child(6){animation-delay:0.22s}

  /* ── Card % badge ── */
  .card .card-pct {
    position: absolute; top: 11px; right: 11px;
    font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 8px;
  }
  .card.accent-edited .card-pct  { background: rgba(255,159,10,0.15); color: var(--orange); }
  .card.accent-deleted .card-pct { background: rgba(255,69,58,0.15);  color: var(--red); }

  /* ── Health section ── */
  .health-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 16px 15px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    animation: riseIn 0.35s 0.20s ease backwards;
  }
  .health-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 9px;
  }
  .health-row:last-child { margin-bottom: 0; }
  .health-lbl { font-size: 12px; color: var(--hint); width: 58px; flex-shrink: 0; }
  .health-bar-track {
    flex: 1; height: 7px; border-radius: 4px;
    background: rgba(120,120,128,0.12); overflow: hidden;
  }
  .health-bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s ease; }
  .health-val { font-size: 12px; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; }
  .health-pct { font-size: 11px; color: var(--hint); width: 28px; text-align: right; flex-shrink: 0; }

  /* ── Content split donut ── */
  .split-row {
    display: flex; align-items: center; gap: 14px;
    margin-top: 14px; padding-top: 13px;
    border-top: 1px solid rgba(120,120,128,0.1);
  }
  .split-legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
  .split-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .split-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .split-name { flex: 1; color: var(--hint); }
  .split-count { font-weight: 700; }
  .split-pct { color: var(--hint); min-width: 28px; text-align: right; font-size: 11.5px; }

  /* ── Section title ── */
  .section-title {
    font-size: 15px; font-weight: 700;
    margin: 4px 0 10px 2px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title .sub { font-size: 12px; font-weight: 500; color: var(--hint); }

  /* ── Heatmap ── */
  .heatmap-card {
    background: var(--secondary-bg);
    border-radius: var(--card-radius);
    padding: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }
  .heatmap-grid {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 3px;
    margin-bottom: 8px;
  }
  .heat-cell {
    width: 100%; aspect-ratio: 1; border-radius: 3px;
    background: rgba(120,120,128,0.13);
  }
  .heat-cell.level-1 { background: rgba(52,199,89,0.28); }
  .heat-cell.level-2 { background: rgba(52,199,89,0.50); }
  .heat-cell.level-3 { background: rgba(52,199,89,0.74); }
  .heat-cell.level-4 { background: rgba(52,199,89,1); }
  .heatmap-legend {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--hint); justify-content: flex-end;
  }
  .heatmap-legend .heat-cell { width: 12px; height: 12px; flex-shrink: 0; }

  /* ── Badges ── */
  .badges-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .badge-card {
    background: var(--secondary-bg);
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    box-shadow: var(--shadow);
    transition: opacity 0.2s, transform 0.2s;
    position: relative;
  }
  .badge-card.achieved { border: 1.5px solid rgba(52,199,89,0.35); }
  .badge-card.locked   { opacity: 0.38; filter: grayscale(1); }
  .badge-emoji   { font-size: 28px; margin-bottom: 5px; }
  .badge-title   { font-size: 12.5px; font-weight: 700; }
  .badge-desc    { font-size: 10.5px; color: var(--hint); margin-top: 2px; line-height: 1.35; }
  .badge-new-dot {
    position: absolute; top: 8px; right: 8px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
  }

  /* ── Search + Sort ── */
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--secondary-bg);
    border-radius: 14px; padding: 10px 14px;
    margin-bottom: 10px; box-shadow: var(--shadow);
  }
  .search-box input {
    flex: 1; border: none; outline: none;
    background: transparent; color: var(--text); font-size: 14px;
  }
  .search-box input::placeholder { color: var(--hint); }

  .segmented {
    display: flex; background: rgba(120,120,128,0.12);
    border-radius: 12px; padding: 3px; margin-bottom: 14px; gap: 2px; overflow-x: auto;
  }
  .segmented::-webkit-scrollbar { display: none; }
  .segmented button {
    flex: 0 0 auto; border: none; background: transparent;
    padding: 8px 10px; font-size: 12.5px; font-weight: 600;
    color: var(--hint); border-radius: 9px; transition: all 0.18s ease;
    white-space: nowrap;
  }
  .segmented button.active {
    background: var(--secondary-bg); color: var(--text); box-shadow: var(--shadow);
  }

  /* ── List rows ── */
  .list {
    background: var(--secondary-bg);
    border-radius: var(--card-radius); overflow: hidden; box-shadow: var(--shadow);
  }
  .row {
    display: flex; align-items: center; gap: 11px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(120,120,128,0.10);
    transition: background 0.12s;
  }
  .row:active { background: rgba(120,120,128,0.07); }
  .row:last-child { border-bottom: none; }
  .rank {
    width: 22px; text-align: center; font-size: 14px;
    flex-shrink: 0; font-weight: 700; color: var(--hint);
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0;
  }
  .row-main { flex: 1; min-width: 0; }
  .row-name {
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .row-sub {
    font-size: 11.5px; color: var(--hint); margin-top: 2px;
    display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
  }
  .bar-track {
    height: 4px; border-radius: 3px;
    background: rgba(120,120,128,0.13);
    margin-top: 6px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--link), var(--green));
    transition: width 0.65s cubic-bezier(.2,.8,.2,1);
  }
  .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .row-count { font-size: 17px; font-weight: 800; }
  .row-streak-badge {
    font-size: 11px; font-weight: 700; border-radius: 7px; padding: 2px 7px;
    white-space: nowrap;
  }
  .row-streak-badge.s-warm    { color: var(--streak-1); background: rgba(255,179,64,0.15); }
  .row-streak-badge.s-hot     { color: var(--streak-2); background: rgba(255,107,0,0.15); }
  .row-streak-badge.s-blaze   { color: var(--streak-3); background: rgba(255,59,48,0.16); }
  .row-streak-badge.s-legend  { color: var(--streak-legendary); background: rgba(191,90,242,0.16); }
  .row-chevron { color: var(--hint); font-size: 18px; padding-left: 2px; flex-shrink: 0; }

  /* ── Chips ── */
  .chip {
    font-size: 10.5px; font-weight: 600; padding: 1px 6px;
    border-radius: 6px; background: rgba(120,120,128,0.13);
  }
  .chip.edited  { color: var(--orange); background: rgba(255,159,10,0.13); }
  .chip.deleted { color: var(--red);    background: rgba(255,69,58,0.13); }
  .chip.mutual  { color: var(--green);  background: rgba(52,199,89,0.13); }
  .chip.at-risk { color: var(--orange); background: rgba(255,159,10,0.13); animation: pulse 1.5s ease-in-out infinite; }

  /* ── Row action buttons ── */
  .row-action-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
  .game-btn, .remind-btn {
    border: none; border-radius: 10px;
    padding: 5px 11px; font-size: 12px; font-weight: 700;
    display: inline-block; flex-shrink: 0;
  }
  .game-btn {
    background: linear-gradient(90deg, var(--link), var(--green));
    color: #fff;
  }
  .remind-btn {
    background: linear-gradient(90deg, #ff6b00, #ff3b30);
    color: #fff;
  }
  .game-btn:active, .remind-btn:active { opacity: 0.78; }
  .remind-btn.sent { background: rgba(120,120,128,0.15); color: var(--hint); }
  .game-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: flex-end; z-index: 1000;
  }
  .game-sheet {
    width: 100%; background: var(--secondary-bg);
    border-radius: 20px 20px 0 0; padding: 18px 16px 32px;
    animation: slideUp 0.2s ease-out;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .game-sheet-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; text-align: center; }
  .game-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
  .game-pick {
    border: none; border-radius: 14px; background: rgba(120,120,128,0.11);
    padding: 14px 6px; display: flex; flex-direction: column;
    align-items: center; gap: 5px; font-size: 12px; font-weight: 600;
  }
  .game-pick:active { background: rgba(120,120,128,0.2); }
  .game-pick-emoji { font-size: 26px; }
  .game-cancel {
    width: 100%; border: none; border-radius: 14px; padding: 13px;
    font-size: 14px; font-weight: 700;
    background: rgba(120,120,128,0.11); color: var(--red);
  }

  /* ── Share buttons ── */
  .share-btn {
    width: 100%; margin-top: 10px; border: none; border-radius: 14px;
    padding: 13px; font-size: 13.5px; font-weight: 700;
    background: rgba(120,120,128,0.11); color: var(--link);
  }
  .share-btn:active { transform: scale(0.98); }

  /* ── Toast ── */
  .toast {
    position: fixed; left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 86px);
    transform: translateX(-50%) translateY(16px);
    background: rgba(20,20,22,0.92); color: #fff;
    padding: 10px 20px; border-radius: 30px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: all 0.22s ease;
    pointer-events: none; z-index: 300;
    white-space: nowrap; max-width: 90vw;
    overflow: hidden; text-overflow: ellipsis;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Empty / Error ── */
  .empty, .error {
    text-align: center; padding: 44px 20px; color: var(--hint);
    font-size: 14px; line-height: 1.55;
    background: var(--secondary-bg); border-radius: var(--card-radius);
  }
  .empty .big-emoji, .error .big-emoji { font-size: 42px; display: block; margin-bottom: 12px; }

  /* ── FAB (hidden — refresh moved to header) ── */
  .refresh-fab { display: none; }

  /* ── Skeleton ── */
  .skeleton { animation: pulse 1.2s ease-in-out infinite; }
  .skeleton .value, .skeleton .label { opacity: 0.3; }

  /* ── Keyframes ── */
  @keyframes fadeDown  { from{opacity:0;transform:translateY(-7px)} to{opacity:1;transform:none} }
  @keyframes riseIn    { from{opacity:0;transform:translateY(9px)}  to{opacity:1;transform:none} }
  @keyframes spin      { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:0.45} }

  /* ══════════════════════════════════════════
     BOTTOM TAB BAR
  ══════════════════════════════════════════ */
  .bottom-tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(env(safe-area-inset-bottom, 0px) + 60px);
    background: rgba(249,249,249,0.90);
    backdrop-filter: blur(28px) saturate(200%);
    -webkit-backdrop-filter: blur(28px) saturate(200%);
    border-top: 0.5px solid rgba(60,60,67,0.15);
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    padding-top: 8px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index: 200;
  }

  /* dark-mode tint for Telegram dark theme */
  @media (prefers-color-scheme: dark) {
    .bottom-tab-bar {
      background: rgba(18,18,20,0.90);
      border-top-color: rgba(255,255,255,0.10);
    }
  }

  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 0 6px;
    border: none;
    background: transparent;
    color: rgba(130,130,140,0.85);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.2s ease;
  }
  .tab-icon-wrap {
    width: 50px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px;
    font-size: 22px; line-height: 1;
    transition: background 0.2s ease, transform 0.25s cubic-bezier(.34,1.56,.64,1);
    will-change: transform;
  }
  .tab-label { line-height: 1; margin-top: 1px; }

  /* Active states */
  .tab-item.active { color: var(--link); }
  .tab-item.active .tab-icon-wrap {
    background: rgba(36,129,204,0.12);
    transform: scale(1.08) translateY(-1px);
  }
  .tab-item.tab-casino.active { color: #9333ea; }
  .tab-item.tab-casino.active .tab-icon-wrap { background: rgba(147,51,234,0.12); }
  .tab-item.tab-donate.active  { color: #f59e0b; }
  .tab-item.tab-donate.active .tab-icon-wrap  { background: rgba(245,158,11,0.12); }

  /* ══════════════════════════════════════════
     CASINO – DARK MINIMAL THEME
  ══════════════════════════════════════════ */
  #casinoContent {
    --ci-accent:  #7c6cff;
    --ci-accent2: #ff6b6b;
    --ci-s1:      #0d0d0d;
    --ci-s2:      #161616;
    --ci-s3:      #1f1f1f;
    --ci-border:  rgba(255,255,255,0.07);
    --ci-text:    #f5f5f5;
    --ci-muted:   rgba(245,245,245,0.35);
    background: #000;
    margin: 0 -14px;
    padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 86px);
    min-height: 100%;
    font-family: 'Geist', -apple-system, system-ui, sans-serif;
  }

  /* ── Casino header ── */
  .casino-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 0 18px;
    border-bottom: 1px solid var(--ci-border);

<body>

      <div class="tab-icon-wrap">📊</div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let lastStats = null;
    let lastActivity = {};
    let sortMode = "messages";
    let searchQuery = "";
    let currentInitData = "";
    let currentTab = "stats";
    let walletData = null;
    let casinoLoaded = false;
    let questsLoaded = false;
    let questData    = null;
    let lbData       = null;
    const SPIN_SYMBOLS = ["🍒","🍋","🍊","🍇","⭐","💎"];

    const AVATAR_COLORS = ["#FF6B6B","#4ECDC4","#45AAF2","#F7B731","#A55EEA","#26DE81","#FD9644","#2BCBBA"];

    function colorFor(seed) {
      let h = 0;
      for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
      return AVATAR_COLORS[h % AVATAR_COLORS.length];
    }

    function initials(name) {
      const parts = name.trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "?";
      if (parts.length === 1) return parts[0][0].toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function medal(rank) {
      if (rank === 0) return "🥇";
      if (rank === 1) return "🥈";
      if (rank === 2) return "🥉";
      return String(rank + 1);
    }

    function timeAgo(iso) {
      if (!iso) return "нет данных";
      const diff = Date.now() - new Date(iso).getTime();
      const min = Math.floor(diff / 60000);
      if (min < 1) return "только что";
      if (min < 60) return `${min} мин назад`;
      const hr = Math.floor(min / 60);
      if (hr < 24) return `${hr} ч назад`;
      const days = Math.floor(hr / 24);
      if (days < 30) return `${days} дн назад`;
      return new Date(iso).toLocaleDateString("ru-RU");
    }

    // Returns UTC date string "YYYY-MM-DD" for right now
    function todayUTC() {
      return new Date().toISOString().slice(0, 10);
    }
    function yesterdayUTC() {
      const d = new Date();
      d.setUTCDate(d.getUTCDate() - 1);
      return d.toISOString().slice(0, 10);
    }

    // Is the streak alive but last message was yesterday → at risk of breaking today
    function isAtRisk(streak_days, last_message_at) {
      if (!streak_days || streak_days < 1 || !last_message_at) return false;
      const lastDate = new Date(last_message_at).toISOString().slice(0, 10);
      return lastDate === yesterdayUTC();
    }

    // Streak level: 0=none,1=warm(2-3),2=hot(4-6),3=blaze(7-29),4=legend(30+)
    function streakLevel(days) {
      if (days < 2)  return 0;
      if (days < 4)  return 1;
      if (days < 7)  return 2;
      if (days < 30) return 3;
      return 4;
    }

    function streakEmoji(level) {
      return ["","🔥","🔥","🔥","💎"][level] || "";
    }

    function streakLevelClass(level) {
      return ["","s-warm","s-hot","s-blaze","s-legend"][level] || "";
    }

    function streakBannerClass(level) {
      return ["","level-warm","level-hot","level-blaze","level-legend"][level] || "";
    }

    // ── Streak Banner ──
    // Uses global best_streak/best_streak_name from API (computed across ALL chats, not just top_n).
    function renderStreakBanner(stats) {
      const days = stats.best_streak || 0;
      if (days < 2) return "";

      // Find last_message_at for the best-streak person (may be in top_interlocutors)
      const bestInList = stats.top_interlocutors
        .filter(s => s.streak_days === days)
        .sort((a, b) => b.streak_days - a.streak_days)[0];
      const lastAt = bestInList ? bestInList.last_message_at : null;
      const atRisk = lastAt ? isAtRisk(days, lastAt) : false;

      const level = streakLevel(days);
      const bannerClass = streakBannerClass(level);
      const fire = level >= 4 ? "💎" : "🔥";
      const name = stats.best_streak_name || "";
      const riskBadge = atRisk ? `<span class="streak-at-risk-badge">⚡ Горит сегодня</span>` : "";

      return `
        <div class="streak-banner ${bannerClass}${atRisk ? " at-risk" : ""}" style="animation-delay:0.04s">
          <div class="streak-fire">${fire}</div>
          <div class="streak-info">
            <div class="streak-days">${days}</div>
            <div class="streak-label">${plural(days, "день", "дня", "дней")} подряд</div>
            ${name ? `<div class="streak-name">с ${name}</div>` : ""}
          </div>
          ${riskBadge}
        </div>
      `;
    }

    function plural(n, one, few, many) {
      const mod10 = n % 10, mod100 = n % 100;
      if (mod100 >= 11 && mod100 <= 14) return many;
      if (mod10 === 1) return one;
      if (mod10 >= 2 && mod10 <= 4) return few;
      return many;
    }

    // ── Stats Cards (Variant A: KPI + Health bars + Content split) ──
    function renderCards(stats) {
      const bestStreak  = stats.best_streak || 0;
      const longestEver = stats.global_longest_streak || 0;
      const total   = stats.total_messages || 0;
      const delPct  = total ? Math.round(stats.deleted_messages / total * 100) : 0;
      const editPct = total ? Math.round(stats.edited_messages  / total * 100) : 0;

      const kpi = `
        <div class="cards">
          <div class="card accent-messages"><span class="icon">💬</span><div class="value">${stats.total_messages}</div><div class="label">Сообщений</div></div>
          <div class="card accent-chats"><span class="icon">👥</span><div class="value">${stats.total_chats}</div><div class="label">Собеседников</div></div>
          <div class="card accent-edited"><span class="icon">✏️</span><div class="value">${stats.edited_messages}</div><div class="label">Правок</div><div class="card-pct">${editPct}%</div></div>
          <div class="card accent-deleted"><span class="icon">🗑</span><div class="value">${stats.deleted_messages}</div><div class="label">Удалений</div><div class="card-pct">${delPct}%</div></div>
          ${bestStreak >= 1 ? `<div class="card accent-streak"><span class="icon">🔥</span><div class="value">${bestStreak}</div><div class="label">Лучшая серия сейчас</div></div>` : ""}
          ${longestEver > bestStreak ? `<div class="card accent-record"><span class="icon">💎</span><div class="value">${longestEver}</div><div class="label">Рекорд серии</div></div>` : ""}
        </div>
      `;

      if (!total) return kpi;

      // Health bars
      const media = stats.media_messages != null ? stats.media_messages : null;
      const mediaPct = (media != null && total) ? Math.round(media / total * 100) : 0;
      const healthRows = [
        { label: "Удалено", val: stats.deleted_messages, pct: delPct,  color: "var(--red)" },
        { label: "Правок",  val: stats.edited_messages,  pct: editPct, color: "var(--orange)" },
      ];
      if (media != null) healthRows.push({ label: "Медиа", val: media, pct: mediaPct, color: "var(--link)" });

      const rowsHtml = healthRows.map(r => `
        <div class="health-row">
          <span class="health-lbl">${r.label}</span>
          <div class="health-bar-track"><div class="health-bar-fill" style="width:${r.pct}%;background:${r.color}"></div></div>
          <span class="health-val">${r.val}</span>
          <span class="health-pct">${r.pct}%</span>
        </div>`).join("");

      // Content split donut (only when media data available)
      let splitHtml = "";
      if (media != null && total > 0) {
        const textCount = total - media;
        const mp = mediaPct;
        splitHtml = `
          <div class="split-row">
            <div style="width:62px;height:62px;border-radius:50%;
              background:conic-gradient(var(--link) 0% ${mp}%,rgba(52,199,89,0.65) ${mp}% 100%);
              display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <div style="width:40px;height:40px;border-radius:50%;background:var(--secondary-bg)"></div>
            </div>
            <div class="split-legend">
              <div class="split-item">
                <div class="split-dot" style="background:var(--link)"></div>
                <span class="split-name">Медиа</span>
                <span class="split-count">${media}</span>
                <span class="split-pct">${mp}%</span>
              </div>
              <div class="split-item">
                <div class="split-dot" style="background:rgba(52,199,89,0.8)"></div>
                <span class="split-name">Текст</span>
                <span class="split-count">${textCount}</span>
                <span class="split-pct">${100 - mp}%</span>
              </div>
            </div>
          </div>`;
      }

      return kpi + `
        <div class="section-title">📊 Здоровье переписки</div>
        <div class="health-card">${rowsHtml}${splitHtml}</div>
      `;
    }

    // ── Heatmap ──
    function renderHeatmap(activity) {
      const days = 91;
      const today = new Date(); today.setHours(0,0,0,0);
      const counts = [];
      let maxCount = 0;
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0,10);
        const count = activity[key] || 0;
        counts.push({ date: d, count });
        if (count > maxCount) maxCount = count;
      }
      function levelFor(c) {
        if (c === 0) return 0;
        if (maxCount <= 1) return 4;
        const r = c / maxCount;
        if (r > 0.75) return 4;
        if (r > 0.5)  return 3;
        if (r > 0.25) return 2;
        return 1;
      }
      const cells = counts.map(c =>
        `<div class="heat-cell level-${levelFor(c.count)}" title="${c.date.toLocaleDateString("ru-RU")}: ${c.count} сообщ."></div>`
      ).join("");
      return `
        <div class="section-title">🗓 Активность за 90 дней</div>
        <div class="heatmap-card">
          <div class="heatmap-grid">${cells}</div>
          <div class="heatmap-legend">
            <span>Меньше</span>
            <div class="heat-cell level-0"></div>
            <div class="heat-cell level-1"></div>
            <div class="heat-cell level-2"></div>
            <div class="heat-cell level-3"></div>
            <div class="heat-cell level-4"></div>
            <span>Больше</span>
          </div>
        </div>
      `;
    }

    // ── Badges ──
    function renderBadges(badges) {
      if (!badges || !badges.length) return "";
      const achieved = badges.filter(b => b.achieved).length;
      const items = badges.map(b => `
        <div class="badge-card ${b.achieved ? "achieved" : "locked"}">
          ${b.achieved ? '<div class="badge-new-dot"></div>' : ""}
          <div class="badge-emoji">${b.emoji}</div>
          <div class="badge-title">${b.title}</div>
          <div class="badge-desc">${b.description}</div>
        </div>
      `).join("");
      return `
        <div class="section-title">🏅 Достижения <span class="sub">${achieved} из ${badges.length}</span></div>
        <div class="badges-grid">${items}</div>
      `;
    }

    // ── Top interlocutors ──
    function getSorted(list) {
      const filtered = searchQuery
        ? list.filter(s => s.display_name.toLowerCase().includes(searchQuery) || (s.username||"").toLowerCase().includes(searchQuery))
        : list.slice();
      const sorters = {
        messages: (a,b) => b.message_count - a.message_count,
        recent:   (a,b) => new Date(b.last_message_at||0) - new Date(a.last_message_at||0),
        streaks:  (a,b) => b.streak_days - a.streak_days || b.longest_streak - a.longest_streak,
        edited:   (a,b) => b.edited_count - a.edited_count,
      };
      return filtered.sort(sorters[sortMode] || sorters.messages);
    }

    function renderStreakBadge(s) {
      const level = streakLevel(s.streak_days);
      if (level === 0) return "";
      const cls = streakLevelClass(level);
      const emoji = streakEmoji(level);
      const atRisk = isAtRisk(s.streak_days, s.last_message_at);
      const riskMark = atRisk ? "⚡" : "";
      return `<div class="row-streak-badge ${cls}">${emoji}${riskMark} ${s.streak_days} дн</div>`;
    }

    function renderTop(stats) {
      if (!stats.top_interlocutors.length) {
        return `<div class="empty"><span class="big-emoji">💬</span>Пока нет сообщений для статистики.<br>Как только в подключённом Business-чате появятся сообщения — здесь будет топ собеседников.</div>`;
      }

      const sorted = getSorted(stats.top_interlocutors);
      const max = Math.max(...stats.top_interlocutors.map(s => s.message_count), 1);

      const controls = `
        <div class="search-box">
          <span>🔍</span>
          <input id="searchInput" type="text" placeholder="Найти собеседника…" value="${searchQuery}" />
        </div>
        <div class="segmented" id="sortTabs">
          <button data-sort="messages" class="${sortMode==="messages"?"active":""}">По сообщениям</button>
          <button data-sort="streaks"  class="${sortMode==="streaks" ?"active":""}">🔥 По серии</button>
          <button data-sort="recent"   class="${sortMode==="recent"  ?"active":""}">По активности</button>
          <button data-sort="edited"   class="${sortMode==="edited"  ?"active":""}">По правкам</button>
        </div>
      `;

      if (!sorted.length) {
        return controls + `<div class="empty"><span class="big-emoji">🔎</span>Никого не нашлось.</div>`;
      }

      const rows = sorted.map((s, i) => {
        const pct = max > 0 ? Math.max(5, Math.round((s.message_count / max) * 100)) : 0;
        const sub = s.username ? "@" + s.username : "личный контакт";
        const chips = [];
        if (s.mutual_connected) chips.push(`<span class="chip mutual">🤝 взаимный</span>`);
        if (s.edited_count)  chips.push(`<span class="chip edited">✏️ ${s.edited_count}</span>`);
        if (s.deleted_count) chips.push(`<span class="chip deleted">🗑 ${s.deleted_count}</span>`);
        const atRisk = isAtRisk(s.streak_days, s.last_message_at);
        if (atRisk) chips.push(`<span class="chip at-risk">⚡ серия горит</span>`);

        const longestNote = (s.longest_streak > s.streak_days && s.longest_streak > 2)
          ? `<span class="chip">💎 рекорд ${s.longest_streak} дн</span>` : "";

        const gameBtn = s.mutual_connected
          ? `<button class="game-btn" data-game-chat="${s.chat_id}" data-game-name="${s.display_name}">🎮 Игра</button>`
          : "";
        const remindBtn = (s.mutual_connected && s.streak_days >= 2)
          ? `<button class="remind-btn" data-remind-chat="${s.chat_id}" data-remind-streak="${s.streak_days}" data-remind-name="${s.display_name}">🔥 Напомнить о серии</button>`
          : "";

        return `
          <div class="row${s.username ? " clickable" : ""}"${s.username ? ` data-username="${s.username}"` : ""}>
            <div class="rank">${medal(i)}</div>
            <div class="avatar" style="background:${colorFor(s.display_name)}">${initials(s.display_name)}</div>
            <div class="row-main">
              <div class="row-name">${s.display_name}</div>
              <div class="row-sub">
                <span>${sub}</span>
                <span class="chip">${timeAgo(s.last_message_at)}</span>
                ${chips.join("")}
                ${longestNote}
              </div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
              <div class="row-action-btns">
                ${gameBtn}${remindBtn}
              </div>
            </div>
            <div class="row-right">
              <div class="row-count">${s.message_count}</div>
              ${renderStreakBadge(s)}
            </div>
            ${s.username ? '<div class="row-chevron">›</div>' : ""}
          </div>
        `;
      }).join("");

      return `
        ${controls}
        <div class="section-title">🏆 Топ собеседников <span class="sub">${sorted.length} из ${stats.top_interlocutors.length}</span></div>
        <div class="list">${rows}</div>
        <button class="share-btn" id="shareBtn">📋 Скопировать сводку</button>
        <button class="share-btn" id="downloadCardBtn">🖼 Скачать карточку</button>
      `;
    }

    function attachTopHandlers() {
      const input = document.getElementById("searchInput");
      if (input) {
        input.addEventListener("input", (e) => {
          searchQuery = e.target.value.toLowerCase();
          const caret = e.target.selectionStart;
          renderContent();
          const newInput = document.getElementById("searchInput");
          if (newInput) { newInput.focus(); newInput.setSelectionRange(caret, caret); }
        });
      }
      document.querySelectorAll("#sortTabs button").forEach(btn => {
        btn.addEventListener("click", () => {
          if (tg && tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
          sortMode = btn.dataset.sort;
          renderContent();
        });
      });
      document.querySelectorAll(".row.clickable").forEach(row => {
        row.addEventListener("click", () => {
          const username = row.dataset.username;
          if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
          if (tg && tg.openTelegramLink) tg.openTelegramLink(`https://t.me/${username}`);
          else window.open(`https://t.me/${username}`, "_blank");
        });
      });
      document.querySelectorAll(".game-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          openGamePicker(btn.dataset.gameChat, btn.dataset.gameName);
        });
      });
      document.querySelectorAll(".remind-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (btn.disabled) return;
          await sendStreakRemind(
            btn.dataset.remindChat,
            Number(btn.dataset.remindStreak),
            btn.dataset.remindName,
            btn
          );
        });
      });
      const shareBtn = document.getElementById("shareBtn");
      if (shareBtn) shareBtn.addEventListener("click", copySummary);
      const dlBtn = document.getElementById("downloadCardBtn");
      if (dlBtn) dlBtn.addEventListener("click", downloadShareCard);
    }

    function renderContent() {
      const el = document.getElementById("content");
      if (!lastStats) return;
      el.innerHTML =
        renderStreakBanner(lastStats) +
        renderCards(lastStats) +
        renderHeatmap(lastActivity) +
        renderBadges(lastStats.badges) +
        renderTop(lastStats);
      attachTopHandlers();
    }

    // ── Share card (Canvas) ──
    function downloadShareCard() {
      if (!lastStats) return;
      const canvas = document.createElement("canvas");
      canvas.width = 900; canvas.height = 1200;
      const ctx = canvas.getContext("2d");

      const grad = ctx.createLinearGradient(0, 0, 900, 1200);
      grad.addColorStop(0, "#1a1a2e");
      grad.addColorStop(0.5, "#16213e");
      grad.addColorStop(1, "#0f3460");
      ctx.fillStyle = grad; ctx.fillRect(0, 0, 900, 1200);

      // Glow circle
      const glow = ctx.createRadialGradient(450, 300, 50, 450, 300, 400);
      glow.addColorStop(0, "rgba(36,129,204,0.18)"); glow.addColorStop(1, "transparent");
      ctx.fillStyle = glow; ctx.fillRect(0, 0, 900, 1200);

      ctx.fillStyle = "#ffffff"; ctx.textAlign = "center";
      ctx.font = "bold 52px sans-serif"; ctx.fillText("📊 Моя статистика", 450, 120);
      ctx.font = "26px sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.fillText("Telegram Business Bot", 450, 162);

      const streak = lastStats.best_streak || 0;
      if (streak >= 2) {
        ctx.font = "bold 32px sans-serif"; ctx.fillStyle = "#ff6b00";
        ctx.fillText(`🔥 Серия ${streak} ${streak === 1 ? "день" : streak < 5 ? "дня" : "дней"} подряд!`, 450, 218);
      }

      const rows = [
        ["💬", lastStats.total_messages, "Сообщений"],
        ["👥", lastStats.total_chats, "Собеседников"],
        ["✏️", lastStats.edited_messages, "Правок"],
        ["🗑", lastStats.deleted_messages, "Удалений"],
      ];
      let y = 330;
      rows.forEach(([emoji, value, label]) => {
        ctx.textAlign = "left"; ctx.fillStyle = "#ffffff";
        ctx.font = "46px sans-serif"; ctx.fillText(emoji, 90, y);
        ctx.font = "bold 44px sans-serif"; ctx.fillText(String(value), 165, y);
        ctx.font = "27px sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fillText(label, 320, y);
        y += 96;
      });

      const top = (lastStats.top_interlocutors || []).slice(0, 3);
      if (top.length) {
        ctx.textAlign = "left"; ctx.fillStyle = "#ffffff";
        ctx.font = "bold 32px sans-serif"; ctx.fillText("🏆 Топ собеседников", 90, y + 30);
        y += 80;
        top.forEach((s, i) => {
          ctx.font = "28px sans-serif"; ctx.fillStyle = "#ffffff";
          const streak_info = s.streak_days >= 2 ? ` 🔥${s.streak_days}` : "";
          ctx.fillText(`${["🥇","🥈","🥉"][i]} ${s.display_name} — ${s.message_count} сообщ.${streak_info}`, 90, y);
          y += 52;
        });
      }

      ctx.textAlign = "center"; ctx.font = "22px sans-serif";
      ctx.fillStyle = "rgba(255,255,255,0.4)";
      ctx.fillText(new Date().toLocaleDateString("ru-RU"), 450, 1160);

      canvas.toBlob(blob => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "my-stats.png";
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        toastMessage("Карточка сохранена");
      }, "image/png");
    }

    // ── Game picker ──
    const GAMES = [
      {emoji:"🎲",label:"Кубик"},{emoji:"🎯",label:"Дартс"},{emoji:"🏀",label:"Баскетбол"},
      {emoji:"⚽",label:"Футбол"},{emoji:"🎳",label:"Боулинг"},{emoji:"🎰",label:"Слоты"},
    ];

    function openGamePicker(chatId, name) {
      const overlay = document.createElement("div");
      overlay.className = "game-overlay";
      overlay.innerHTML = `
        <div class="game-sheet">
          <div class="game-sheet-title">🎮 Отправить игру — ${name}</div>
          <div class="game-grid">
            ${GAMES.map(g => `<button class="game-pick" data-emoji="${g.emoji}"><span class="game-pick-emoji">${g.emoji}</span><span>${g.label}</span></button>`).join("")}
          </div>
          <button class="game-cancel">Отмена</button>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector(".game-cancel").addEventListener("click", () => overlay.remove());
      overlay.querySelectorAll(".game-pick").forEach(btn => {
        btn.addEventListener("click", async () => { overlay.remove(); await sendGame(chatId, btn.dataset.emoji); });
      });
    }

    async function sendGame(chatId, emoji) {
      try {
        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
        const res = await fetch("/app/api/game/send", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData, chatId: Number(chatId), emoji}),
        });
        if (!res.ok) throw new Error("failed");
        if (tg && tg.showAlert) tg.showAlert(`${emoji} Игра отправлена в чат!`);
      } catch {
        if (tg && tg.showAlert) tg.showAlert("Не удалось отправить игру.");
      }
    }

    // ── Streak remind ──
    async function sendStreakRemind(chatId, streakDays, name, btn) {
      btn.disabled = true;
      btn.textContent = "⏳ Отправляю…";
      try {
        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
        const res = await fetch("/app/api/streak/remind", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData, chatId: Number(chatId), streakDays}),
        });
        if (!res.ok) throw new Error("failed");
        btn.textContent = "✅ Отправлено!";
        btn.classList.add("sent");
        if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        toastMessage(`🔥 Напоминание отправлено ${name}!`);
      } catch {
        btn.disabled = false;
        btn.textContent = "🔥 Напомнить о серии";
        if (tg && tg.showAlert) tg.showAlert("Не удалось отправить напоминание. Попробуй ещё раз.");
      }
    }

    // ── Copy summary ──
    function buildSummaryText(stats) {
      const streak = stats.best_streak || 0;
      const lines = [
        "📊 Моя статистика — Telegram Business Bot",
        `💬 Сообщений: ${stats.total_messages}`,
        `👥 Собеседников: ${stats.total_chats}`,
        `✏️ Правок: ${stats.edited_messages}`,
        `🗑 Удалений: ${stats.deleted_messages}`,
      ];
      if (streak >= 2) lines.push(`🔥 Лучшая серия: ${streak} дн подряд`);
      const top = stats.top_interlocutors.slice(0, 5);
      if (top.length) {
        lines.push("", "🏆 Топ собеседников:");
        top.forEach((s, i) => {
          const streak_info = s.streak_days >= 2 ? ` (🔥${s.streak_days} дн)` : "";
          lines.push(`${i+1}. ${s.display_name} — ${s.message_count} сообщ.${streak_info}`);
        });
      }
      return lines.join("\n");
    }

    async function copySummary() {
      if (!lastStats) return;
      const text = buildSummaryText(lastStats);
      try {
        await navigator.clipboard.writeText(text);
        if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
        toastMessage("Сводка скопирована");
      } catch { if (tg) tg.showAlert(text); }
    }

    function toastMessage(msg) {
      let t = document.getElementById("miniToast");
      if (!t) {
        t = document.createElement("div"); t.id = "miniToast"; t.className = "toast";
        document.body.appendChild(t);
      }
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2200);
    }

    // ── Load data ──
    async function loadStats(isRefresh) {
      const initData = tg ? tg.initData : "";
      currentInitData = initData;
      const subtitle = document.getElementById("subtitle");
      const content  = document.getElementById("content");

    function switchMainTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab-item").forEach(btn =>
        btn.classList.toggle("active", btn.dataset.tab === tab)
      );
      document.getElementById("content").style.display       = tab === "stats"  ? "" : "none";
      document.getElementById("casinoContent").style.display = tab === "casino" ? "" : "none";
      document.getElementById("questContent").style.display  = tab === "quests" ? "" : "none";
      document.getElementById("donateContent").style.display = tab === "donate" ? "" : "none";

      // Header refresh button — only on stats
      const headerActions = document.getElementById("headerActions");
      if (headerActions) headerActions.style.display = tab === "stats" ? "" : "none";

      // Update header avatar emoji per tab
      const avatarEl = document.getElementById("headerAvatar");
      if (avatarEl) avatarEl.textContent = TAB_HEADER_ICONS[tab] || "📊";

      if (tab === "casino") {
        if (!casinoLoaded && currentInitData) loadWallet();
        else if (casinoLoaded) renderCasino();

      if (tab === "quests") {
        if (!questsLoaded && currentInitData) loadQuestsLeaderboard();
        else if (questsLoaded) renderQuestsTab();
      }
      if (tab === "donate") renderDonate();
      if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
    }

    document.querySelectorAll(".tab-item").forEach(btn =>

    async function spinSlots() {
      const btn = document.getElementById("spinBtn");
      const resultEl = document.getElementById("slotsResult");
      if (!btn || btn.disabled) return;

      if ((walletData?.balance || 0) < 10) {
        toastMessage("Недостаточно монет! Получи ежедневную награду 🎁");
        return;
      }

      btn.disabled = true;
      if (resultEl) resultEl.innerHTML = "";
      const reels = [0,1,2].map(i => document.getElementById(`reel${i}`));
      const randomSym = () => SPIN_SYMBOLS[Math.floor(Math.random() * SPIN_SYMBOLS.length)];

      // Start spinning all reels
      reels.forEach(r => { r.classList.add("spinning"); r.textContent = randomSym(); });
      // Shuffle symbols during spin
      const shuffleInterval = setInterval(() => {
        reels.forEach(r => { if (r.classList.contains("spinning")) r.textContent = randomSym(); });
      }, 120);

      try {
        const res = await fetch("/app/api/wallet/slots", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData}),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();

        // Stop reels left → middle → right
        const stopReel = (idx, delay) => setTimeout(() => {
          clearInterval(shuffleInterval);
          const reel = reels[idx];
          reel.classList.remove("spinning");
          reel.classList.add("stop-anim");
          reel.textContent = data.reels[idx];
          if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
          setTimeout(() => reel.classList.remove("stop-anim"), 350);
        }, delay);

        stopReel(0, 400);
        stopReel(1, 800);
        stopReel(2, 1200);

        setTimeout(() => {
          walletData.total_spent = (walletData.total_spent || 0) + 10;
          if (data.payout > 0) walletData.total_earned = (walletData.total_earned || 0) + data.payout;
          updateBalanceDisplay(data.new_balance);

          if (data.is_jackpot) {
            resultEl.innerHTML = `<span class="slots-jackpot">💎 ДЖЕКПОТ! +${data.payout} 🪙</span>`;
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
          } else if (data.payout > 0) {
            resultEl.innerHTML = `<span class="slots-win">🎉 +${data.payout} 🪙 (итого ${data.net >= 0 ? "+" : ""}${data.net})</span>`;
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
          } else {
            resultEl.innerHTML = `<span class="slots-lose">Не повезло. -10 🪙</span>`;
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
          }
          btn.disabled = false;
        }, 1600);

      } catch {
        clearInterval(shuffleInterval);
        reels.forEach(r => { r.classList.remove("spinning"); r.textContent = "❓"; });
        if (resultEl) resultEl.textContent = "Ошибка. Попробуй ещё раз.";
        btn.disabled = false;
      }
    }

    async function doFlip(choice) {
      const betInput = document.getElementById("flipBet");
      const coinEl   = document.getElementById("flipCoin");
      const resultEl = document.getElementById("flipResult");
      const headsBtn = document.getElementById("flipHeadsBtn");
      const tailsBtn = document.getElementById("flipTailsBtn");
      const bet = Math.max(10, Math.min(Number(betInput?.value) || 50, walletData?.balance || 0));

      if ((walletData?.balance || 0) < bet) {
        toastMessage("Недостаточно монет!");
        return;
      }

      [headsBtn, tailsBtn].forEach(b => { if (b) b.disabled = true; });
      if (resultEl) resultEl.innerHTML = "";
      if (coinEl) { coinEl.classList.add("flipping"); coinEl.textContent = "🪙"; }

      try {
        const res = await fetch("/app/api/wallet/flip", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({initData: currentInitData, bet, choice}),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();

        setTimeout(() => {
          if (coinEl) {
            coinEl.classList.remove("flipping");
            coinEl.textContent = data.server_side === "heads" ? "🦅" : "🪙";
          }
          if (data.won) {
            walletData.total_earned = (walletData.total_earned || 0) + bet;
            resultEl.innerHTML = `<span class="flip-won">🎉 Угадал! +${bet} 🪙</span>`;
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
          } else {
            walletData.total_spent = (walletData.total_spent || 0) + bet;
            resultEl.innerHTML = `<span class="flip-lost">😔 Не угадал. -${bet} 🪙</span>`;
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
          }
          updateBalanceDisplay(data.new_balance);
          [headsBtn, tailsBtn].forEach(b => { if (b) b.disabled = false; });
          // Update max bet in input
          const maxBet = Math.min(500, data.new_balance);
          if (betInput) {
            betInput.max = maxBet;
            if (Number(betInput.value) > maxBet) betInput.value = maxBet;
          }
        }, 750);
      } catch {
        if (coinEl) { coinEl.classList.remove("flipping"); coinEl.textContent = "🪙"; }
        if (resultEl) resultEl.textContent = "Ошибка. Попробуй ещё раз.";
        [headsBtn, tailsBtn].forEach(b => { if (b) b.disabled = false; });
      }
    }

          fetch("/app/api/quests",      opts),

      attachQuestHandlers();

    function renderQuestsSection() {
      const earned = questData.quests.filter(q => q.claimed).reduce((s, q) => s + q.reward, 0);
      const total  = questData.quests.reduce((s, q) => s + q.reward, 0);

      const cards = questData.quests.map((q, i) => {
        const pct      = q.target > 0 ? Math.round(q.progress / q.target * 100) : 0;
        const canClaim = !q.claimed && q.progress >= q.target;
        const cls      = q.claimed ? "claimed" : canClaim ? "ready" : "";
        return `
          <div class="quest-card ${cls}" style="animation-delay:${i * 0.07}s">
            <div class="quest-emoji">${q.emoji}</div>
            <div class="quest-body">
              <div class="quest-title">${q.title}</div>
              <div class="quest-desc">${q.desc}</div>
              <div class="quest-prog-wrap">
                <div class="quest-prog-track">
                  <div class="quest-prog-fill" style="width:${pct}%"></div>
                </div>
                <span class="quest-prog-lbl">${q.progress}/${q.target}</span>
              </div>
            </div>
            <div class="quest-right">
              <span class="quest-reward">+${q.reward} 🪙</span>
              ${q.claimed
                ? `<span class="quest-done-badge">✅</span>`
                : `<button class="quest-claim-btn" data-quest-id="${q.id}" ${canClaim ? "" : "disabled"}>
                     ${canClaim ? "Забрать" : "В процессе"}
                   </button>`}
            </div>
          </div>`;
      }).join("");

      return `
        <div class="section-title">🎯 Задания дня
          <span class="sub">${earned}/${total} 🪙</span>
        </div>
        ${cards}`;
    }

    function renderLeaderboardSection() {
      const entries = lbData?.entries || [];
      const myRank  = lbData?.my_rank;
      const medals  = ["🥇","🥈","🥉"];

      const rows = entries.map((e, i) => `
        <div class="lb-entry${e.is_self ? " me" : ""}" style="animation-delay:${0.05 + i * 0.04}s">
          <div class="lb-rank">${medals[i] || ("#" + e.rank)}</div>
          <div class="lb-avatar" style="background:${colorFor(e.display_name)}">${initials(e.display_name)}</div>
          <div class="lb-name">${e.is_self ? "👤 Ты" : e.display_name}</div>
          <div class="lb-coins">${e.total_earned.toLocaleString("ru-RU")} 🪙</div>
        </div>`).join("");

      const myNote = (myRank && !entries.find(e => e.is_self))
        ? `<div class="lb-my-rank-note">Твоё место: #${myRank}</div>` : "";

      return `
        <div class="section-title" style="margin-top:8px">🏆 Рейтинг монет</div>
        ${rows || `<div class="empty" style="padding:20px 0"><span class="big-emoji">🪙</span>Пока никто не зарабатывал монеты.</div>`}
        ${myNote}`;
    }

    function attachQuestHandlers() {
      document.querySelectorAll(".quest-claim-btn:not([disabled])").forEach(btn => {
        btn.addEventListener("click", async () => {
          const questId = btn.dataset.questId;
          btn.disabled  = true;
          btn.textContent = "⏳";
          try {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
            const res = await fetch("/app/api/quests/claim", {
              method: "POST", headers: {"Content-Type":"application/json"},
              body: JSON.stringify({initData: currentInitData, questId}),
            });
            if (!res.ok) {
              const err = await res.json().catch(() => ({}));
              if (err.detail === "already_claimed") {
                toastMessage("Задание уже выполнено ✅");
                await loadQuestsLeaderboard();
                return;
              }
              throw new Error(err.detail || "error");
            }
            const data = await res.json();
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
            updateBalanceDisplay(data.new_balance);
            toastMessage(`🎉 +${data.reward} монет получено!`);
            // Refresh quests & lb to show claimed state
            await loadQuestsLeaderboard();
          } catch {
            btn.disabled    = false;
            btn.textContent = "Забрать";
            toastMessage("Ошибка. Попробуй позже.");
          }
        });
      });
    }

    document.getElementById("refreshBtn").addEventListener("click", () => loadStats(true));
    loadStats(false);

  </script>
</body>
</html>
